# OPT-IN overlay for RHPDS / pre-provisioned OpenShift AI 3 sandboxes.
#
# Use when Service Mesh is already installed on channel `stable` (v3.1.x)
# and the pattern's default `stable-3.2` causes OLM ResolutionFailed.
#
# Also skips OperatorGroup creation for namespaces that the RHPDS catalog
# ("Red Hat OpenShift AI 3") already provisions with their own OperatorGroup
# (openshift-nfd, nvidia-gpu-operator, redhat-ods-operator) -- otherwise the
# pattern's clustergroup chart creates a SECOND OperatorGroup in each of
# these namespaces, and OLM immediately marks every CSV there (nfd,
# gpu-operator-certified, rhods-operator) Failed/TooManyOperatorGroups,
# since it can't automatically pick a namespace scope with two present.
#
# Also pins the ZTunnel CR version to match the Istio version actually
# supported by whatever servicemeshoperator3 build is currently installed
# from RHPDS's preinstalled channel `stable` (a floating channel -- the
# exact CSV varies by RHPDS catalog snapshot). Originally pinned to v1.26.2
# for v3.1.0 (its CRD rejected the pattern's default v1.28.8 with
# "Unsupported value" on spec.version); bumped to v1.28.8 once RHPDS's
# `stable` channel had auto-upgraded to v3.3.5 (whose default/native Istio
# version IS v1.28.8 -- verify with `oc get csv -n openshift-operators
# -l operators.coreos.com/servicemeshoperator3.openshift-operators` and
# `oc get crd istios.sailoperator.io -o jsonpath='{.spec.versions[-1]
# .schema.openAPIV3Schema.properties.spec.properties.version.default}'`
# before assuming this value is still correct on a different snapshot).
#
# NOTE: the Gateway API data plane (data-science-gateway-class, used by
# native MaaS and KServe raw-deployment inference) runs on a SEPARATE Istio
# revision named "openshift-gateway" (namespace openshift-ingress), owned
# by its GatewayClass (not by this chart or any Application) and reset by
# the Sail operator's own GatewayClass controller on every reconcile --
# this override has NO effect on it. On RHCL (Kuadrant) 1.4.1, that
# revision's hardcoded v1.26.2 Envoy proxy rejects the WASM plugin config
# field `allow_on_headers_stop_iteration` that RHCL 1.4.1's WASM shim
# generates ("Unknown field ... invalid JSON"), so the Kuadrant filter
# fails to load and every authenticated request through that Gateway class
# (native MaaS `/maas-api/*`, the "Models as a Service could not be
# loaded" dashboard error) gets a generic Envoy 500 instead of being
# proxied. Not fixable from this repo -- `oc patch istio openshift-gateway
# --type merge -p '{"spec":{"version":"v1.28.8"}}'` is silently reverted by
# the GatewayClass controller within seconds. Track as a RHOAI/RHCL
# platform compatibility bug on RHPDS; workaround is disabling the
# Kuadrant AuthPolicy on this Gateway (loses auth enforcement) or waiting
# for the RHPDS catalog to align both operators' Istio versions.
#
# Also exposes the RHOAI catalog's pre-installed "llama-32-3b-instruct" demo
# model (KServe/vLLM in the my-first-model namespace) through the workshop
# Kuadrant API gateway, alongside httpbin/REST Countries/MCP -- same
# API-key + PlanPolicy UX, bypassing the RHOAI-native inference gateway's
# own (separate, MaaS-specific) auth chain. Only enable on clusters where
# this InferenceService actually exists.
#
# Pattern CR example:
#   extraValueFiles:
#     - /values-hub-gpu.yaml
#     - /values-hub-single-node.yaml
#     - /values-hub-rhpds.yaml
#     - /values-hub-only.yaml

global:
  options:
    # RHPDS pre-provisions Subscriptions with Manual InstallPlan approval.
    # Enables the clustergroup built-in CronJob that auto-approves RequiresApproval plans.
    autoApproveManualInstallPlans: true

clusterGroup:
  subscriptions:
    servicemesh:
      channel: stable

  namespaces:
    openshift-nfd:
      operatorGroup: false
    nvidia-gpu-operator:
      operatorGroup: false
    redhat-ods-operator:
      operatorGroup: false

  applications:
    istio-ztunnel:
      overrides:
        - name: version
          value: v1.28.8

    # RHPDS's preinstalled Kuadrant/Connectivity Link deploys Authorino into
    # the standard kuadrant-system namespace, not redhat-connectivity-link-
    # operator (the pattern chart's assumption for a from-scratch multi-node
    # install where RHCL provisions its own namespace-scoped instance).
    # Without this override, models-as-a-service tries to patch a Service
    # that only exists in kuadrant-system, and OLM's SSA falls back to
    # creating a new (incomplete, ports-less) Service in the wrong
    # namespace, failing with "spec.ports: Required value".
    # NOTE: userCount here must match values-hub-single-node.yaml's
    # models-as-a-service override ("5") when both overlays are composed
    # together (the documented RHPDS stack) -- Helm replaces an
    # application's overrides list wholesale, not merged by item, and this
    # file loads after values-hub-single-node.yaml.
    models-as-a-service:
      overrides:
        - name: userCount
          value: "5"
        - name: clusterRole
          value: hub
        - name: authorino.serviceNamespace
          value: kuadrant-system
        - name: authorino.deploymentNamespace
          value: kuadrant-system

    workshop-kuadrant-apis:
      overrides:
        - name: apis.mcp.enabled
          value: "false"
        - name: apis.maas.host
          value: "maas-rhdp.apps.maas.redhatworkshops.io"
        - name: maas.authorinoTls
          value: "true"
        - name: apis.llama.enabled
          value: "true"

    # RHPDS's "Red Hat OpenShift AI 3" catalog pre-provisions its own,
    # completely unrelated Keycloak+RHBK-operator stack (namespace
    # "keycloak", not managed by this pattern -- verify with `oc get keycloak
    # -A` and `oc get all -n keycloak`) that already claims the default
    # "sso.<apps-domain>" Route hostname before this pattern is even
    # installed. developer-hub's own route-sso.yaml (the ONLY chart that
    # actually creates this Route) then fails to be Admitted
    # (HostAlreadyClaimed), which blocks its Argo CD sync from ever
    # progressing past that resource's sync wave -- Backstage's own
    # Deployment (a later wave) never gets created, and developer-hub stays
    # permanently Degraded.
    #
    # Every chart that references this pattern's shared SSO hostname reads
    # a "ssoHostPrefix" value (default "sso", portable across clusters/
    # domains -- see rhbk-iam/values.yaml for the full explanation). All six
    # MUST be overridden to the SAME prefix together, or whichever chart(s)
    # are missed will keep pointing at the old (now Route-less) hostname:
    #   - developer-hub   (owns the actual Route)
    #   - rhbk-iam        (computes the canonical issuerUrl for realm clients)
    #   - neuroface-gateway (Kuadrant OIDC/AuthPolicy realms)
    #   - workshop-registration (Keycloak admin API calls)
    #   - devspaces       (OpenShift Dev Spaces OIDC identity provider)
    #   - console-links   (cosmetic "Keycloak (SSO)" link only)
    developer-hub:
      overrides:
        - name: ssoHostPrefix
          value: rhdh-sso

    rhbk-iam:
      overrides:
        - name: keycloak.ssoHostPrefix
          value: rhdh-sso

    neuroface-gateway:
      overrides:
        - name: kuadrant.ssoHostPrefix
          value: rhdh-sso

    workshop-registration:
      overrides:
        - name: keycloak.ssoHostPrefix
          value: rhdh-sso

    devspaces:
      overrides:
        - name: keycloakOidc.ssoHostPrefix
          value: rhdh-sso

    console-links:
      overrides:
        - name: ssoHostPrefix
          value: rhdh-sso
