# OPT-IN overlay for RHPDS / pre-provisioned OpenShift AI 3 sandboxes.
#
# Use when Service Mesh is already installed on channel `stable` (v3.1.x)
# and the pattern's default `stable-3.2` causes OLM ResolutionFailed.
#
# Also skips OperatorGroup creation for namespaces that the RHPDS catalog
# ("Red Hat OpenShift AI 3") already provisions with their own OperatorGroup
# (openshift-nfd, nvidia-gpu-operator, redhat-ods-operator) -- otherwise the
# pattern's clustergroup chart creates a SECOND OperatorGroup in each of
# these namespaces, and OLM immediately marks every CSV there (nfd,
# gpu-operator-certified, rhods-operator) Failed/TooManyOperatorGroups,
# since it can't automatically pick a namespace scope with two present.
#
# Also pins the ZTunnel CR version to match the Istio version that
# servicemeshoperator3 v3.1.0 (RHPDS's preinstalled channel `stable`)
# actually supports -- the pattern's default v1.28.8 is rejected by that
# older operator's CRD validation ("Unsupported value" on spec.version).
#
# Also exposes the RHOAI catalog's pre-installed "llama-32-3b-instruct" demo
# model (KServe/vLLM in the my-first-model namespace) through the workshop
# Kuadrant API gateway, alongside httpbin/REST Countries/MCP -- same
# API-key + PlanPolicy UX, bypassing the RHOAI-native inference gateway's
# own (separate, MaaS-specific) auth chain. Only enable on clusters where
# this InferenceService actually exists.
#
# Pattern CR example:
#   extraValueFiles:
#     - /values-hub-gpu.yaml
#     - /values-hub-single-node.yaml
#     - /values-hub-rhpds.yaml
#     - /values-hub-only.yaml

clusterGroup:
  subscriptions:
    servicemesh:
      channel: stable

  namespaces:
    openshift-nfd:
      operatorGroup: false
    nvidia-gpu-operator:
      operatorGroup: false
    redhat-ods-operator:
      operatorGroup: false

  applications:
    istio-ztunnel:
      overrides:
        - name: version
          value: v1.26.2

    workshop-kuadrant-apis:
      overrides:
        - name: apis.mcp.enabled
          value: "false"
        - name: apis.maas.host
          value: "maas-rhdp.apps.maas.redhatworkshops.io"
        - name: maas.authorinoTls
          value: "true"
        - name: apis.llama.enabled
          value: "true"
