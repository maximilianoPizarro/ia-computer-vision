metadata_version: "1.0"
name: ia-computer-vision
pattern_version: "1.0"
description: >
  Multi-cluster AI computer vision at the edge with hub-spoke GitOps,
  NeuroFace inference, Skupper connectivity, and centralized observability.
display_name: AI Computer Vision
repo_url: https://github.com/maximilianoPizarro/ia-computer-vision
docs_repo_url: https://github.com/maximilianoPizarro/ia-computer-vision
issues_url: https://github.com/maximilianoPizarro/ia-computer-vision/issues
docs_url: https://maximilianopizarro.github.io/ia-computer-vision/patterns/ia-computer-vision/
ci_url: https://github.com/maximilianoPizarro/ia-computer-vision/actions
logo: https://maximilianopizarro.github.io/ia-computer-vision/images/ia-computer-vision/architecture-hub-spoke.png
tier: sandbox
org: maximilianoPizarro
owners:
  - maximilianoPizarro
clustergroupname: hub
maintainers:
  - name: Maximiliano Pizarro
    email: mapizarr@redhat.com
    role: Specialist Solution Architect
minOCPVersion: "4.20"
gitBranch: main
industries:
  - manufacturing
  - retail
  - energy
useCases:
  - ai-ml
  - edge-computing
  - devops
products:
  - name: Red Hat OpenShift Container Platform
    version: "4.20"
  - name: Red Hat Advanced Cluster Management
    version: "2.16"
  - name: Red Hat OpenShift AI
    version: "3.4"
  - name: Red Hat Advanced Cluster Security
    version: "4.x"
  - name: Red Hat Connectivity Link
    version: stable
  - name: Red Hat OpenShift Service Mesh
    version: "3.2"
  - name: Red Hat Developer Hub
    version: fast
  - name: Red Hat OpenShift Lightspeed
    version: stable
  - name: Red Hat Build of Keycloak
    version: "26.4"
  - name: Red Hat OpenShift GitOps
    version: "1.14"
  - name: OpenShift DevSpaces
    version: stable
  - name: External Secrets Operator
    version: stable-v1
requirements:
  hub:
    controlPlane:
      platform:
        aws:
          replicas: 3
          type: m6a.2xlarge
    compute:
      platform:
        aws:
          replicas: 3
          type: m6a.4xlarge
  spoke:
    controlPlane:
      platform:
        aws:
          replicas: 3
          type: m6a.2xlarge
    compute:
      platform:
        aws:
          replicas: 3
          type: m6a.2xlarge
extra_features:
  spoke_support: true
  hypershift_support: false
external_requirements:
  cluster_sizing_note: >
    This pattern requires 3 clusters (hub + east spoke + west spoke).
    CPU-only inference is the default. For GPU-accelerated inference,
    use g4dn.xlarge (T4) or g5.2xlarge (A10G) worker nodes on spokes.
