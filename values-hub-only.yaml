# OPT-IN overlay for hub-only installs without east/west spokes.
#
# Disables Skupper, hub-interconnect, skupper-network-observer, and
# acm-hub-spoke to avoid Missing/Degraded apps and reduce pod count.
#
# Also deploys the upstream neuroface chart on the hub and routes the standard
# workshop DNS names (neuroface.apps.* / neuroface-cv.apps.*) via
# neuroface-gateway hubLocal mode — no east/west Skupper backends required.
#
# Also runs Kafka (Strimzi) and the Kafka Streams Console locally on the hub
# (spoke-neuroface-cv's kafka.enabled + charts/all/kafka-console), with
# mailpit's Camel (JBang) route reading the "plain" listener directly via a
# scoped NetworkPolicy — no Skupper VAN needed to deliver PPE violation
# events to the email alert consumer, unlike the hub+spokes topology.
#
# Pattern CR example:
#   extraValueFiles:
#     - /values-hub-gpu.yaml
#     - /values-hub-single-node.yaml
#     - /values-hub-rhpds.yaml
#     - /values-hub-only.yaml

clusterGroup:
  subscriptions:
    skupper:
      disabled: true
    # Strimzi/AMQ Streams operator + console operator (provides the Kafka/
    # KafkaNodePool/KafkaTopic CRDs used by spoke-neuroface-cv's local Kafka
    # cluster below). Normally only installed on east/west spokes
    # (values-east.yaml / values-west.yaml) -- hub-only needs it too since
    # Kafka now runs locally on the hub for PPE violation alerts.
    amq-streams:
      name: amq-streams
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    amq-streams-console:
      name: amq-streams-console
      namespace: openshift-operators
      channel: stable
      source: redhat-operators

  namespaces:
    neuroface-hub: {}
    neuroface-cv: {}

  applications:
    hub-interconnect:
      disabled: true
    skupper-network-observer:
      disabled: true
    acm-hub-spoke:
      disabled: true

    neuroface-gateway:
      overrides:
        - name: hubLocal.enabled
          value: "true"
        - name: hubLocal.appService
          value: neuroface-frontend.neuroface-hub.svc.cluster.local
        - name: hubLocal.cvService
          value: yolo-ppe-serving.neuroface-cv.svc.cluster.local
        - name: gateway.replicas
          value: "1"
        - name: kuadrant.enabled
          value: "true"
        - name: kuadrant.realms[0].name
          value: cv
        - name: kuadrant.realms[0].httpRoute
          value: neuroface-cv-lb
        - name: kuadrant.realms[0].redirectAuth
          value: "false"

    spoke-neuroface-cv:
      name: spoke-neuroface-cv
      namespace: neuroface-cv
      argoProject: ai
      path: charts/all/spoke-neuroface-cv
      syncWave: "6"
      overrides:
        - name: clusterName
          value: hub
        - name: skupper.enabled
          value: "false"
        # Kafka (Strimzi) runs locally on the hub -- no Skupper VAN needed to
        # forward PPE detection events to a spoke's consumer, since the
        # consumer (mailpit's Camel route) also runs on the hub. Console and
        # NetworkPolicy for direct (non-Skupper) access are set below.
        - name: kafka.enabled
          value: "true"
        - name: kafka.directAccessNamespaces[0]
          value: mailpit
        - name: modelSeed.enabled
          value: "true"
        - name: yoloPpeServing.modelStorage.endpoint
          value: http://gitlab-minio-svc.gitlab-system.svc:9000
        - name: yoloPpeServing.hpa.minReplicas
          value: "1"
        - name: yoloPpeServing.hpa.maxReplicas
          value: "1"

    kafka-console:
      name: kafka-console
      namespace: neuroface-cv
      argoProject: ai
      path: charts/all/kafka-console
      syncWave: "7"

    neuroface-hub:
      name: neuroface-hub
      namespace: neuroface-hub
      argoProject: mesh
      repoURL: https://maximilianopizarro.github.io/neuroface/
      chart: neuroface
      chartVersion: 1.4.*
      syncWave: "7"
      overrides:
        - name: fullnameOverride
          value: neuroface
        - name: backend.image.tag
          value: v1.5.1
        - name: frontend.image.tag
          value: v1.5.1
        - name: chat.enabled
          value: "true"
        - name: chat.modelEndpoint
          value: "http://qwen2-5-coder-7b-instruct-predictor.gpu-models.svc.cluster.local:8080"
        - name: chat.modelName
          value: qwen2-5-coder-7b-instruct
        - name: chat.apiKey
          value: ""
        - name: chat.autoServiceAccount
          value: "false"
        - name: chat.maxTokens
          value: "512"
        - name: chat.systemPrompt
          value: "You are NeuroFace, a helpful AI assistant running on the AI Computer Vision pattern's hub cluster. Be concise and informative."
        - name: ovms.enabled
          value: "false"
        - name: litellm.enabled
          value: "false"
        # PPE detection uses the local spoke-neuroface-cv YOLO InferenceService
        # deployed above (namespace neuroface-cv) instead of the chart's own
        # bundled ppe.serving sidecar (unused/not referenced by this chart
        # version -- ppe.enabled only toggles ConfigMap env vars, no extra pod).
        - name: ppe.enabled
          value: "true"
        - name: ppe.endpoint
          value: "http://yolo-ppe-serving-predictor.neuroface-cv.svc.cluster.local:8080"
        - name: route.enabled
          value: "false"
        - name: persistence.enabled
          value: "true"
        - name: persistence.size
          value: 1Gi

    mailpit:
      overrides:
        # No Skupper VAN on hub-only -- read the local Kafka broker's "plain"
        # listener directly (see spoke-neuroface-cv's kafka.directAccessNamespaces
        # NetworkPolicy allowance above, which permits this namespace).
        - name: ppeKafkaMailpit.kafkaBootstrap
          value: cv-kafka-kafka-bootstrap.neuroface-cv.svc.cluster.local:9092

    developer-hub:
      overrides:
        - name: userCount
          value: "5"
        - name: kubernetesSpokes.enabled
          value: "false"
        - name: spokeTokenSync.enabled
          value: "false"
        - name: applicationSet.enabled
          value: "false"

    argocd-mcp:
      overrides:
        - name: spokeSync.enabled
          value: "false"

    openshift-lightspeed:
      overrides:
        - name: llm.providerName
          value: gpu-vllm-local
        - name: llm.url
          value: "http://qwen2-5-coder-7b-instruct-predictor.gpu-models.svc.cluster.local:8080/v1"
        - name: llm.model
          value: qwen2-5-coder-7b-instruct
        - name: llm.credentialsEnabled
          value: "false"
        # Must match openshift-ai-hub gpu.models[].maxModelLen / vLLM --max-model-len.
        - name: llm.contextWindowSize
          value: "8192"
        - name: llm.maxTokensForResponse
          value: "1024"
        - name: llm.toolBudgetRatio
          value: "0.35"

    observability:
      overrides:
        - name: multiCluster.enabled
          value: "false"

    console-links:
      overrides:
        - name: clusterRole
          value: hub
        # Skupper stack is disabled above — hide the console link (Route 503 otherwise).
        - name: skupperConsole.enabled
          value: "false"
        # Kafka runs locally on the hub in this overlay — show the Kafka Console link.
        - name: kafkaConsole.enabled
          value: "true"
