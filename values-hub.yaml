main:
  clusterGroupName: hub
  multiSourceConfig:
    enabled: true
    clusterGroupChartVersion: "0.9.*"
    helmRepoUrl: https://charts.validatedpatterns.io

clusterGroup:
  name: hub
  namespaces:
    open-cluster-management: {}
    vault: {}
    argocd-mcp: {}
    external-secrets-operator:
      operatorGroup: true
      targetNamespaces: []
    external-secrets: {}
    # stackrox: {}  # ACS disabled by default to save resources
    neuroface-gateway-system:
      labels:
        istio.io/rev: default
    redhat-connectivity-link-operator:
      operatorGroup: true
      targetNamespaces: []
    gitlab-system:
      operatorGroup: true
      targetNamespaces:
        - gitlab-system
    gitlab-runner: {}
    rhdh-operator:
      operatorGroup: true
      targetNamespaces: []
    developer-hub: {}
    workshop-kuadrant-apis: {}
    ai-gateway-system: {}
    keycloak-system: {}
    mailpit: {}
    showroom: {}
    redhat-ods-operator:
      operatorGroup: true
      targetNamespaces: []
    redhat-ods-applications: {}
    models-as-a-service: {}
    devspaces: {}
    openshift-cluster-observability-operator:
      operatorGroup: true
      targetNamespaces: []
    openshift-opentelemetry: {}
    istio-system: {}
    istio-cni: {}
    ztunnel: {}
    service-interconnect: {}

  subscriptions:
    acm:
      name: advanced-cluster-management
      namespace: open-cluster-management
      channel: release-2.16
      source: redhat-operators
    eso:
      name: openshift-external-secrets-operator
      namespace: external-secrets-operator
      channel: stable-v1
    # rhacs:  # ACS disabled by default to save resources
    #   name: rhacs-operator
    #   namespace: openshift-operators
    #   channel: stable
    #   source: redhat-operators
    rhcl:
      name: rhcl-operator
      namespace: redhat-connectivity-link-operator
      channel: stable
      source: redhat-operators
    cluster-observability-operator:
      name: cluster-observability-operator
      namespace: openshift-cluster-observability-operator
      channel: stable
      source: redhat-operators
    grafana:
      name: grafana-operator
      namespace: openshift-operators
      channel: v5
      source: community-operators
    kiali:
      name: kiali-ossm
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    opentelemetry:
      name: opentelemetry-product
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    servicemesh:
      name: servicemeshoperator3
      namespace: openshift-operators
      channel: stable-3.2
      source: redhat-operators
    skupper:
      name: skupper-operator
      namespace: openshift-operators
      channel: stable-2
      source: redhat-operators
    # gitlab: intentionally NOT declared here. charts/all/gitlab-operator/templates/subscriptions.yaml
    # creates this Subscription itself (with a controllerResources override — the OLM CSV default of
    # 300Mi OOMs the operator while reconciling the full GitLab chart). Declaring it here too caused
    # the clustergroup chart (which has no config.resources support) to win the object and silently
    # strip the override on every sync, leaving the operator to OOMKill/CrashLoopBackOff.
    rhdh:
      name: rhdh
      namespace: openshift-operators
      channel: fast
      source: redhat-operators
    rhbk:
      name: rhbk-operator
      namespace: keycloak-system
      channel: stable-v26.4
      source: redhat-operators
    pipelines:
      name: openshift-pipelines-operator-rh
      namespace: openshift-operators
      channel: latest
      source: redhat-operators
    rhods:
      name: rhods-operator
      namespace: redhat-ods-operator
      channel: stable-3.4
      source: redhat-operators
    devspaces:
      name: devspaces
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    # Optional TSSC stack (uncomment to enable Trusted Artifact Signer)
    # rhtas:
    #   name: rhtas-operator
    #   namespace: openshift-operators
    #   channel: alpha
    #   source: redhat-operators
    # rhtpa:
    #   name: rhtpa-operator
    #   namespace: openshift-operators
    #   channel: alpha
    #   source: redhat-operators
    # cert-manager:
    #   name: openshift-cert-manager-operator
    #   namespace: cert-manager-operator
    #   channel: stable-v1
    #   source: redhat-operators

  argoProjects:
    - hub
    - platform
    - security
    - mesh
    - observability
    - ai
    - workshop
    - external-secrets

  sharedValueFiles:
    - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
    - '/overrides/values-{{ $.Values.global.clusterVersion }}-{{ $.Values.clusterGroup.name }}.yaml'

  applications:
    openshift-gitops:
      name: openshift-gitops
      namespace: openshift-gitops
      argoProject: platform
      path: charts/all/openshift-gitops
      syncWave: "0"
      overrides:
        - name: clusterRole
          value: hub
        # Sole owner of ArgoCD/vp-gitops spec.rbac + spec.localUsers on the
        # hub — do NOT also deploy charts/all/argocd-local-users here (SSA
        # field-ownership race, see charts/all/openshift-gitops/templates/argocd.yaml).
        - name: argocdLocalUser.enabled
          value: "true"

    platform-users:
      name: platform-users
      namespace: openshift-gitops
      argoProject: platform
      path: charts/all/platform-users
      syncWave: "0"
      overrides:
        - name: userCount
          value: "30"
        - name: clusterRole
          value: hub

    observability:
      name: observability
      namespace: openshift-cluster-observability-operator
      argoProject: observability
      path: charts/all/observability
      syncWave: "1"
      overrides:
        - name: clusterRole
          value: hub

    acm:
      name: acm
      namespace: open-cluster-management
      argoProject: hub
      chart: acm
      chartVersion: 0.2.*
      syncWave: "1"

    vault:
      name: vault
      namespace: vault
      argoProject: external-secrets
      chart: hashicorp-vault
      chartVersion: 0.1.*
      syncWave: "2"

    openshift-external-secrets:
      name: openshift-external-secrets
      namespace: external-secrets
      argoProject: external-secrets
      chart: openshift-external-secrets
      chartVersion: 0.0.*
      syncWave: "2"

    argocd-mcp:
      name: argocd-mcp
      namespace: argocd-mcp
      argoProject: hub
      path: charts/all/argocd-mcp
      syncWave: "3"
      overrides:
        - name: clusterRole
          value: hub

    rhbk:
      name: rhbk
      namespace: keycloak-system
      argoProject: workshop
      chart: rhbk
      chartVersion: 0.1.*
      syncWave: "2"
      overrides:
        - name: keycloak.adminUser.passwordVaultKey
          value: secret/data/hub/rhbk-credentials
        - name: keycloak.postgresqlDb.passwordVaultKey
          value: secret/data/hub/rhbk-credentials
        - name: keycloak.hostname
          value: sso

    rhbk-iam:
      name: rhbk-iam
      namespace: keycloak-system
      argoProject: workshop
      path: charts/all/rhbk-iam
      syncWave: "2"
      overrides:
        - name: userCount
          value: "30"
        - name: realms[0].name
          value: neuroface
        - name: realms[0].displayName
          value: NeuroFace API
        - name: realms[1].name
          value: maas
        - name: realms[1].displayName
          value: Model as a Service
        - name: realms[2].name
          value: cv
        - name: realms[2].displayName
          value: Computer Vision

    gitlab-operator:
      name: gitlab-operator
      namespace: gitlab-system
      argoProject: workshop
      path: charts/all/gitlab-operator
      syncWave: "3"
      overrides:
        - name: userCount
          value: "30"

    developer-hub:
      name: developer-hub
      namespace: developer-hub
      argoProject: workshop
      path: charts/all/developer-hub
      syncWave: "4"
      overrides:
        - name: userCount
          value: "30"
        - name: plugins.kuadrant.enabled
          value: "true"
        - name: plugins.ocm.enabled
          value: "true"
        - name: plugins.kiali.enabled
          value: "true"
        - name: plugins.notificationsEmail.enabled
          value: "true"
        # Lightspeed sidecars (llama-stack 0.1.4 + lightspeed-core 0.4.0), preconfigured
        # with the Argo CD MCP server (charts/all/argocd-mcp) via lightspeed-stack.yaml's
        # mcp_servers block. Verified running stable on the hub (Jul 2026) -- re-check after
        # any RHDH/lightspeed-stack image bump before relying on this in a fresh install.
        - name: plugins.lightspeed.enabled
          value: "true"
        - name: spokeTokenSync.enabled
          value: "true"
        - name: kubernetesSpokes.enabled
          value: "true"
        - name: applicationSet.enabled
          value: "true"
        - name: iamCatalog.enabled
          value: "true"
        # Spoke domains for AI CV template: derived from Pattern CR extraParameters
        # spokeCredentials.clusters.east.apiUrl / west.apiUrl (same as acm-hub-spoke)

    openshift-ai-hub:
      name: openshift-ai-hub
      namespace: redhat-ods-applications
      argoProject: ai
      path: charts/all/openshift-ai-hub
      syncWave: "5"
      overrides:
        - name: userCount
          value: "30"
        - name: maas.endpoint
          value: "https://maas-rhdp.apps.maas.redhatworkshops.io"
        - name: maas.native.enabled
          value: "true"

    models-as-a-service:
      name: models-as-a-service
      namespace: models-as-a-service
      argoProject: ai
      path: charts/all/models-as-a-service
      syncWave: "6"
      overrides:
        - name: userCount
          value: "30"
        - name: clusterRole
          value: hub

    workshop-registration:
      name: workshop-registration
      namespace: showroom
      argoProject: workshop
      path: charts/all/workshop-registration
      syncWave: "5"
      overrides:
        - name: registration.maxUsers
          value: "30"
        - name: registration.enabled
          value: "true"

    showroom:
      name: showroom
      namespace: showroom
      argoProject: workshop
      path: charts/all/showroom
      syncWave: "5"
      overrides:
        - name: showroom.terminal.userCount
          value: "30"

    mailpit:
      name: mailpit
      namespace: mailpit
      argoProject: workshop
      path: charts/all/mailpit
      syncWave: "5"

    servicemesh-config:
      name: servicemesh-config
      namespace: istio-system
      argoProject: mesh
      chart: servicemesh
      chartVersion: 0.1.*
      syncWave: "5"
      overrides:
        - name: servicemesh.profile
          value: ambient
        - name: servicemesh.istio.name
          value: default
        - name: servicemesh.kiali.spec.deployment.cluster_wide_access
          value: "true"

    istio-ztunnel:
      name: istio-ztunnel
      namespace: istio-system
      argoProject: mesh
      path: charts/all/istio-ztunnel
      syncWave: "6"

    hub-interconnect:
      name: hub-interconnect
      namespace: service-interconnect
      argoProject: mesh
      path: charts/all/hub-interconnect
      syncWave: "5"

    skupper-network-observer:
      name: skupper-network-observer
      namespace: service-interconnect
      argoProject: mesh
      path: charts/all/skupper-network-observer
      syncWave: "5"

    neuroface-gateway:
      name: neuroface-gateway
      namespace: neuroface-gateway-system
      argoProject: mesh
      path: charts/all/neuroface-gateway
      syncWave: "6"
      overrides:
        - name: clusters.east.domain
          value: "east"
        - name: clusters.west.domain
          value: "west"
        - name: gateway.weights.east
          value: "50"
        - name: gateway.weights.west
          value: "50"
        # neuroface-cv (PPE/CV route) only, independent from the weights above
        # (main NeuroFace app, which is healthy on both spokes). The east
        # spoke's neuroface-cv backend is down due to a pre-existing,
        # cluster-level GitOps/OLM issue on that spoke (missing Subscriptions,
        # unstable argocd-application-controller -- unrelated to this pattern's
        # own config) -- route 100% to west until that's resolved and east's
        # backend is confirmed healthy again, then revert to 50/50.
        - name: gateway.cvWeights.east
          value: "0"
        - name: gateway.cvWeights.west
          value: "100"
        - name: gateway.replicas
          value: "2"
        - name: kuadrant.enabled
          value: "true"
        - name: kuadrant.realms[0].name
          value: cv
        - name: kuadrant.realms[0].httpRoute
          value: neuroface-cv-lb
        # NOTE: this --set on an array index REPLACES the whole
        # kuadrant.realms list (Helm doesn't merge --set-provided lists
        # element-wise with the chart's default values.yaml list), so the
        # chart's default 2nd entry (realm "neuroface") and its
        # redirectAuth flag never actually apply here -- only what's set
        # right here, at index 0, ends up live. neuroface-cv-lb serves no
        # browsable frontend, so it uses a plain AuthPolicy+jwt (no
        # redirect-to-login) instead of OIDCPolicy; redirectAuth must be
        # re-declared here or this silently reverts to OIDCPolicy on cv,
        # which both breaks CORS preflight (OIDCPolicy has no `when`
        # exemption) and hits a real issuer mismatch (see chart's
        # oidcpolicy-realms.yaml comments).
        - name: kuadrant.realms[0].redirectAuth
          value: "false"

    workshop-kuadrant-apis:
      name: workshop-kuadrant-apis
      namespace: workshop-kuadrant-apis
      argoProject: workshop
      path: charts/all/workshop-kuadrant-apis
      syncWave: "6"
      overrides:
        - name: apis.mcp.enabled
          value: "false"
        - name: apis.maas.host
          value: "maas-rhdp.apps.maas.redhatworkshops.io"
        - name: maas.authorinoTls
          value: "true"

    acm-hub-spoke:
      name: acm-hub-spoke
      namespace: openshift-gitops
      argoProject: hub
      path: charts/all/acm-hub-spoke
      syncWave: "6"
      overrides:
        # --- ACM Auto-Import mode ---
        # vault   — Vault/ESO injects spoke-credentials (default VP flow)
        # inline  — Pattern CR extraParameters provides tokens (no Vault)
        # secret  — user pre-creates K8s Secret spoke-credentials
        #
        # To use inline mode, set these via Pattern CR > Extra Parameters:
        #   spokeCredentials.mode                   = inline
        #   spokeCredentials.clusters.east.token     = <east SA token>
        #   spokeCredentials.clusters.east.apiUrl    = https://api.<east>:6443
        #   spokeCredentials.clusters.west.token     = <west SA token>
        #   spokeCredentials.clusters.west.apiUrl    = https://api.<west>:6443
        - name: spokeCredentials.mode
          value: inline
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .status

    # acs-init-bundle-sync:  # ACS disabled by default to save resources
    #   name: acs-init-bundle-sync
    #   namespace: stackrox
    #   argoProject: security
    #   path: charts/all/acs-init-bundle-sync
    #   syncWave: "7"

    devspaces:
      name: devspaces
      namespace: devspaces
      argoProject: workshop
      path: charts/all/devspaces
      syncWave: "7"
      overrides:
        - name: userCount
          value: "30"

    console-links:
      name: console-links
      namespace: openshift-gitops
      argoProject: workshop
      path: charts/all/console-links
      syncWave: "10"
      overrides:
        - name: clusterRole
          value: hub

  managedClusterGroups:
    east:
      name: east
      acmlabels:
        - name: clusterGroup
          value: east
    west:
      name: west
      acmlabels:
        - name: clusterGroup
          value: west
