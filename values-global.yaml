---
global:
  pattern: ia-computer-vision
  singleArgoCD: true
  argoNamespace: vp-gitops
  options:
    useCSV: false
    syncPolicy: Automatic
    installPlanApproval: Automatic
main:
  gitops:
    # Requires patterns-operator with gitops.argoRBAC (PR #754) + pattern-install-chart PR #46.
    # Sole owner of spec.rbac on the hub singleton ArgoCD CR — do NOT patch rbac via chart SSA.
    argoRBAC: |
      defaultPolicy: role:readonly
      policy: |-
        g, system:cluster-admins, role:admin
        g, system:masters, role:admin
        g, cluster-admins, role:admin
        g, admin, role:admin
        p, role:ai-agent, applications, get, */*, allow
        p, role:ai-agent, applications, sync, */*, allow
        p, role:ai-agent, logs, get, */*, allow
        g, ai-agent, role:ai-agent
      scopes: '[groups]'
  clusterGroupName: hub
  multiSourceConfig:
    enabled: true
    clusterGroupChartVersion: "0.9.*"
    helmRepoUrl: https://charts.validatedpatterns.io
