# See docs/validatedpatterns-docs/troubleshooting.md#argocd-unknown-sync-status-acm-216
acmArgocdOpenapiFix:
  enabled: true
  schedule: "*/15 * * * *"
  image: registry.redhat.io/openshift4/ose-cli:latest
