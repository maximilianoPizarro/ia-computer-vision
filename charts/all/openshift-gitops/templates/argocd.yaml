{{- $argoNs := "vp-gitops" -}}
{{- if .Values.global -}}
{{- $argoNs = .Values.global.vpArgoNamespace | default $argoNs -}}
{{- end -}}
{{- $localUser := .Values.argocdLocalUser | default dict -}}
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  # The VP Operator names the single-ArgoCD instance after its namespace
  # (global.argoNamespace, "vp-gitops" for this pattern) — NOT "openshift-gitops".
  name: {{ $argoNs }}
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  server:
    autoscale:
      enabled: false
    grpc:
      ingress:
        enabled: false
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 125m
        memory: 128Mi
    route:
      enabled: true
  controller:
    processors:
      operation: 25
      status: 50
    env:
      - name: ARGOCD_APPLICATION_CONTROLLER_KUBECTL_PARALLELISM_LIMIT
        value: "20"
    resources:
      limits:
        cpu: "4"
        memory: 12Gi
      requests:
        cpu: "1"
        memory: 6Gi
  resourceExclusions: |
    - apiGroups:
      - tekton.dev
      clusters:
      - '*'
      kinds:
      - TaskRun
      - PipelineRun
    - apiGroups:
      - clusterview.open-cluster-management.io
      clusters:
      - '*'
      kinds:
      - '*'
    - apiGroups:
      - internal.open-cluster-management.io
      clusters:
      - '*'
      kinds:
      - '*'
  applicationSet:
    resources:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
  sso:
    provider: dex
    dex:
      openShiftOAuth: true
  # NOTE on spec.rbac: do NOT set it here. When global.singleArgoCD=true,
  # the VP-published `clustergroup` chart (charts.validatedpatterns.io,
  # v0.9.50+) is itself the renderer/owner of the singleton ArgoCD CR and
  # applies spec.rbac from its own `clusterGroup.argoCD.rbac` values key on
  # effectively every sync of the top-level clustergroup Application --
  # which syncs very frequently (the Validated Patterns Operator's Pattern
  # controller touches its Helm parameters roughly every 10-15s as part of
  # its own periodic drift-correction). Setting spec.rbac from this chart's
  # own Application (even with ServerSideApply=true) just loses that race
  # almost every time with no error anywhere -- confirmed live via
  # `--show-managed-fields`: a generic "manager" identity re-applies
  # clusterGroup.argoCD.rbac's value within the same second as any other
  # write to spec.rbac. Set the desired policy via
  # `clusterGroup.argoCD.rbac` in values-hub.yaml instead (top-level
  # clusterGroup key, not an application override) -- see its "ai-agent"
  # rbac policy lines there for the argocd-mcp local user.
  #
  # spec.localUsers has no clustergroup-chart equivalent key, so this chart
  # remains the correct (and uncontested) place to set it on the hub. On
  # east/west spokes, this chart is not deployed at all, so
  # charts/all/argocd-local-users remains the sole owner of both fields
  # there (singleArgoCD's clustergroup-chart RBAC ownership is a hub-only
  # concern since only the hub renders the actual singleton CR there).
  {{- if $localUser.enabled }}
  localUsers:
    - name: {{ $localUser.name | default "ai-agent" }}
      apiKey: {{ $localUser.apiKey | default true }}
      login: {{ $localUser.login | default false }}
      tokenLifetime: {{ $localUser.tokenLifetime | default "720h" | quote }}
      autoRenewToken: {{ $localUser.autoRenewToken | default true }}
  {{- end }}
  redis:
    resources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
  repo:
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 512Mi
  resourceHealthChecks:
    - group: operators.coreos.com
      kind: Subscription
      check: |
        hs = {}
        hs.status = "Healthy"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "CatalogSourcesUnhealthy" then
                if condition.status == "True" then
                  hs.status = "Degraded"
                  hs.message = condition.message
                end
              end
            end
          end
        end
        return hs
    - group: platform.stackrox.io
      kind: Central
      check: |
        hs = {}
        if obj.status ~= nil and obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "Deployed" and condition.status == "True" then
              hs.status = "Healthy"
              return hs
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for Central to be deployed"
        return hs
    - group: operator.open-cluster-management.io
      kind: MultiClusterHub
      check: |
        hs = {}
        if obj.status ~= nil and obj.status.phase == "Running" then
          hs.status = "Healthy"
        else
          hs.status = "Progressing"
        end
        return hs
