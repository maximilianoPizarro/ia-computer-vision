{{- $argoNs := "vp-gitops" -}}
{{- if .Values.global -}}
{{- $argoNs = .Values.global.vpArgoNamespace | default $argoNs -}}
{{- end -}}
{{- $localUser := .Values.argocdLocalUser | default dict -}}
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  # The VP Operator names the single-ArgoCD instance after its namespace
  # (global.argoNamespace, "vp-gitops" for this pattern) — NOT "openshift-gitops".
  name: {{ $argoNs }}
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  server:
    autoscale:
      enabled: false
    grpc:
      ingress:
        enabled: false
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 125m
        memory: 128Mi
    route:
      enabled: true
  controller:
    processors:
      operation: 25
      status: 50
    env:
      - name: ARGOCD_APPLICATION_CONTROLLER_KUBECTL_PARALLELISM_LIMIT
        value: "20"
    resources:
      limits:
        cpu: "4"
        memory: 12Gi
      requests:
        cpu: "1"
        memory: 6Gi
  resourceExclusions: |
    - apiGroups:
      - tekton.dev
      clusters:
      - '*'
      kinds:
      - TaskRun
      - PipelineRun
    - apiGroups:
      - clusterview.open-cluster-management.io
      clusters:
      - '*'
      kinds:
      - '*'
    - apiGroups:
      - internal.open-cluster-management.io
      clusters:
      - '*'
      kinds:
      - '*'
  applicationSet:
    resources:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
  sso:
    provider: dex
    dex:
      openShiftOAuth: true
  # NOTE: this chart is the SOLE owner of spec.rbac and spec.localUsers on
  # the hub's singleton ArgoCD/vp-gitops CR. Do NOT add a second chart that
  # server-side-applies these fields on the hub (e.g. argocd-local-users) --
  # both Applications share the same field manager identity for SSA on this
  # object, so whichever syncs last silently wins/truncates the other's
  # values (localUsers disappearing, rbac.policy lines dropped) with no
  # error surfaced anywhere. Same failure class as the Kuadrant/Kiali
  # singleton pitfalls documented in the vp-pattern-dev skill. On east/west
  # spokes, this chart is NOT deployed, so charts/all/argocd-local-users
  # remains the sole (and safe) owner there.
  rbac:
    defaultPolicy: role:admin
    policy: |
      g, system:cluster-admins, role:admin
      g, system:masters, role:admin
      g, admin, role:admin
      {{- if $localUser.enabled }}
      p, role:ai-agent, applications, get, */*, allow
      p, role:ai-agent, applications, sync, */*, allow
      p, role:ai-agent, logs, get, */*, allow
      g, {{ $localUser.name | default "ai-agent" }}, role:ai-agent
      {{- end }}
    scopes: '[groups]'
  {{- if $localUser.enabled }}
  localUsers:
    - name: {{ $localUser.name | default "ai-agent" }}
      apiKey: {{ $localUser.apiKey | default true }}
      login: {{ $localUser.login | default false }}
      tokenLifetime: {{ $localUser.tokenLifetime | default "720h" | quote }}
      autoRenewToken: {{ $localUser.autoRenewToken | default true }}
  {{- end }}
  redis:
    resources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
  repo:
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 512Mi
  resourceHealthChecks:
    - group: operators.coreos.com
      kind: Subscription
      check: |
        hs = {}
        hs.status = "Healthy"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "CatalogSourcesUnhealthy" then
                if condition.status == "True" then
                  hs.status = "Degraded"
                  hs.message = condition.message
                end
              end
            end
          end
        end
        return hs
    - group: platform.stackrox.io
      kind: Central
      check: |
        hs = {}
        if obj.status ~= nil and obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "Deployed" and condition.status == "True" then
              hs.status = "Healthy"
              return hs
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for Central to be deployed"
        return hs
    - group: operator.open-cluster-management.io
      kind: MultiClusterHub
      check: |
        hs = {}
        if obj.status ~= nil and obj.status.phase == "Running" then
          hs.status = "Healthy"
        else
          hs.status = "Progressing"
        end
        return hs
