{{- $argoNs := "vp-gitops" -}}
{{- if .Values.global -}}
{{- $argoNs = .Values.global.vpArgoNamespace | default $argoNs -}}
{{- end -}}
{{- $localUser := .Values.argocdLocalUser | default dict -}}
{{- if $localUser.enabled }}
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  # The VP Operator names the single-ArgoCD instance after its namespace
  # (global.argoNamespace, "vp-gitops" for this pattern) — NOT "openshift-gitops".
  name: {{ $argoNs }}
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  # ONLY spec.localUsers is set here. Every other field (server/controller/
  # applicationSet/redis/repo/sso resources, resourceExclusions,
  # resourceHealthChecks, rbac, ...) is deliberately left out.
  #
  # CONFIRMED root cause (via live --show-managed-fields plus reading the
  # actual charts.validatedpatterns.io sources, not just their READMEs):
  # with global.singleArgoCD=true, this singleton ArgoCD CR is not rendered
  # by any local chart or by clustergroup-chart (its own argocd.yaml has an
  # empty singleArgoCD=true branch -- it defers entirely to ACM). It is
  # instead rendered AND CONTINUOUSLY RE-ENFORCED by the `acm` chart's
  # templates/policies/ocp-gitops-policy.yaml, an ACM governance
  # ConfigurationPolicy with `complianceType: mustonlyhave` +
  # `remediationAction: enforce` that hardcodes a full spec (server,
  # controller, applicationSet, redis, repo, sso, resourceExclusions,
  # resourceHealthChecks, rbac -- with NO values override hook in any
  # published chart version through 0.2.8).
  #
  # This chart previously ALSO set most of those same fields (different
  # resource limits, extra resourceHealthChecks for Central/MultiClusterHub,
  # extra resourceExclusions for ACM clusterview/internal APIs, etc.).
  # Because ACM's controller re-enforces its own hardcoded values on a fast
  # evaluation cycle while this chart's own Application sync re-applied
  # ours via ServerSideApply=true, the two fought over every shared field
  # continuously -- confirmed live in openshift-gitops-operator logs
  # showing "Updating StatefulSet ... updating volumes"/"container
  # resources" etc. on effectively every reconcile (every ~15-30s), each
  # one restarting the corresponding Deployment/StatefulSet pod. Dropping
  # every field ACM already owns stops that thrashing; ACM's hardcoded
  # values (documented in the vp-pattern-dev skill) are perfectly adequate
  # defaults, just not independently tunable today.
  #
  # spec.rbac specifically: local users authenticate fine but fall through
  # to ACM's hardcoded `defaultPolicy: role:readonly` (cannot sync) unless
  # bound by name to one of its hardcoded groups (system:cluster-admins,
  # cluster-admins, admin) -- see the vp-pattern-dev skill for full writeup
  # and mitigation options. spec.localUsers has no ACM-policy equivalent,
  # so it is NOT touched by ACM and is safe (and necessary) to set here.
  #
  # On east/west spokes, this chart is not deployed at all --
  # charts/all/argocd-local-users remains the sole owner of both fields
  # there (the ACM policy above only targets the hub's singleton instance).
  localUsers:
    - name: {{ $localUser.name | default "ai-agent" }}
      apiKey: {{ $localUser.apiKey | default true }}
      login: {{ $localUser.login | default false }}
      tokenLifetime: {{ $localUser.tokenLifetime | default "720h" | quote }}
      autoRenewToken: {{ $localUser.autoRenewToken | default true }}
{{- end }}
