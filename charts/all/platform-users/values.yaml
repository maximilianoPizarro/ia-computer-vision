# Workshop user scale (profiles: 30, 50, 100, 200)
userCount: 30
defaultPassword: "Welcome123!"
# Hub + spokes — view ACM, Kiali, Skupper, Grafana console links without cluster-admin
grantClusterReader: true
htpasswdSecretName: workshop-users
identityProviderName: workshop-users
# ose-cli lacks htpasswd; httpd image generates bcrypt hashes for OAuth.
htpasswdImage: registry.access.redhat.com/ubi9/httpd-24:latest
# hub | spoke — selects namespace view RoleBinding list
clusterRole: ""
# ACS/StackRox is disabled by default across every values-*.yaml in this repo
# ("ACS disabled by default to save resources") -- the stackrox namespace only
# exists when a values file explicitly re-enables the rhacs-operator
# subscription. Without this flag, the workshop-users-view RoleBinding for
# "stackrox" targets a namespace that doesn't exist, and the API server
# rejects it (RoleBindings can't be created in a missing namespace), leaving
# this Application permanently OutOfSync/Missing for every default install.
acsEnabled: false
viewNamespacesHub:
  - developer-hub
  - showroom
  - redhat-ods-applications
  - openshift-gitops
  - gitlab-system
  - mailpit
  - vault
  - redhat-connectivity-link-operator
  - openshift-cluster-observability-operator
  - neuroface-gateway-system
viewNamespacesSpoke:
  - neuroface
  - neuroface-cv
  - service-interconnect
  - redhat-ods-applications
  - openshift-gitops
  - devspaces
  - openshift-cluster-observability-operator
  - redhat-connectivity-link-operator
