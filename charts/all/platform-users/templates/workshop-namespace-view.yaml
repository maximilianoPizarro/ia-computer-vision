{{- $count := int .Values.userCount }}
{{- $namespaces := .Values.viewNamespacesHub | default list }}
{{- if eq .Values.clusterRole "spoke" }}
{{- $namespaces = .Values.viewNamespacesSpoke | default list }}
{{- end }}
{{- range $ns := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workshop-users-view
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
{{- range $i := until $count }}
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ printf "user%d" (add $i 1) | quote }}
{{- end }}
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: admin
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: platformadmin
{{- end }}
