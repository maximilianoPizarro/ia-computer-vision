{{- if eq .Values.clusterRole "spoke" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: acm-import
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: acm-import-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: acm-import
    namespace: kube-system
{{- end }}
