{{- $cn := include "spoke-neuroface-cv.clusterName" . }}
{{- if eq $cn "east" }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: cv-kafka-broker
  namespace: neuroface-cv
  labels:
    strimzi.io/cluster: cv-kafka
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: cv-kafka
  namespace: neuroface-cv
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
    argocd.argoproj.io/sync-wave: "3"
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: skupper
        port: 9093
        type: internal
        tls: false
        configuration:
          brokers:
            - broker: 0
              advertisedHost: kafka-east-tst.service-interconnect.svc.cluster.local
              advertisedPort: 9092
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
  entityOperator:
    topicOperator: {}
    template:
      pod:
        metadata:
          labels:
            istio.io/dataplane-mode: none
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: cv-ppe-detections
  namespace: neuroface-cv
  labels:
    strimzi.io/cluster: cv-kafka
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  topicName: cv.ppe.detections
  partitions: 3
  replicas: 1
  config:
    retention.ms: "604800000"
{{- end }}
