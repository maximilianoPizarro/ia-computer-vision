{{- if ne (.Values.kafka.enabled | toString | default "true") "false" }}
{{- $cn := include "spoke-neuroface-cv.clusterName" . }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: cv-kafka-broker
  namespace: neuroface-cv
  labels:
    strimzi.io/cluster: cv-kafka
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: cv-kafka
  namespace: neuroface-cv
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
    argocd.argoproj.io/sync-wave: "3"
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: skupper
        port: 9093
        type: internal
        tls: false
        configuration:
          brokers:
            - broker: 0
              advertisedHost: kafka-{{ $cn }}-tst.service-interconnect.svc.cluster.local
              advertisedPort: 9092
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
  entityOperator:
    topicOperator: {}
    template:
      pod:
        metadata:
          labels:
            istio.io/dataplane-mode: none
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: cv-ppe-detections
  namespace: neuroface-cv
  labels:
    strimzi.io/cluster: cv-kafka
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  topicName: cv.ppe.detections
  partitions: 3
  replicas: 1
  config:
    retention.ms: "604800000"
{{- range $ns := .Values.kafka.directAccessNamespaces | default list }}
---
# Allows a same-cluster consumer in another namespace (e.g. mailpit's PPE
# alert route on a hub-only install, where there is no Skupper VAN to
# forward Kafka traffic) to reach this broker's "plain" listener directly.
# On east/west spokes this is unused (empty list) -- there, mailpit reaches
# Kafka on the hub via the Skupper Connector (skupper-connector-kafka.yaml)
# and never connects to this broker directly.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cv-kafka-allow-{{ $ns }}
  namespace: neuroface-cv
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: cv-kafka
      strimzi.io/kind: Kafka
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $ns }}
      ports:
        - port: 9092
          protocol: TCP
{{- end }}
{{- end }}
