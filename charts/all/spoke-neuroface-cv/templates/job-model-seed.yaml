{{- if eq (.Values.modelSeed.enabled | toString | default "false") "true" }}
{{- $ms := .Values.modelSeed -}}
---
# Grants the gitlab-system default ServiceAccount read access to the Vault
# root token secret that this pattern's own vault-operator/imperative bootstrap
# always writes to imperative/vaultkeys (standard Validated Patterns
# convention -- see docs/content/patterns/ia-computer-vision/
# scaffolding-and-secrets.adoc). Needed because this cluster's Vault has no
# "kubernetes/" auth mount + "secret-manager" role (only a read-only "hub/"
# mount used by External Secrets Operator) -- writing to Vault therefore
# requires the root token, not a Kubernetes-auth login.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ppe-model-seed-vaultkeys-reader
  namespace: imperative
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vaultkeys"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ppe-model-seed-vaultkeys-reader
  namespace: imperative
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ppe-model-seed-vaultkeys-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: gitlab-system
---
# Read gitlab-minio-secret via the API (not secretKeyRef) so the Job pod can
# start before GitLab MinIO exists. secretKeyRef would leave the pod in
# CreateContainerConfigError and block the PostSync hook until a manual refresh.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ppe-model-seed-minio-reader
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gitlab-minio-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ppe-model-seed-minio-reader
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ppe-model-seed-minio-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: gitlab-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ppe-model-seed
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 8
  activeDeadlineSeconds: 1200
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: seed
          image: {{ $ms.image | default "registry.redhat.io/ubi9/python-311:latest" | quote }}
          command:
            - bash
            - -c
            - |
              pip install -q boto3 2>&1 | tail -1
              python3 << 'PYEOF'
              import boto3, urllib.request, os, sys, subprocess, json as j, base64, time

              endpoint = os.environ["S3_ENDPOINT"]
              bucket = os.environ.get("S3_BUCKET", "models")
              obj_key = os.environ.get("S3_OBJECT_KEY", "ppe-detection/model/best.pt")
              model_url = os.environ.get("MODEL_URL", "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt")

              k8s_token = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
              k8s_ca = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              minio_api = ("https://kubernetes.default.svc/api/v1/namespaces/"
                           "gitlab-system/secrets/gitlab-minio-secret")

              print("Waiting for Secret/gitlab-minio-secret...")
              key = secret = None
              for i in range(1, 91):
                  r = subprocess.run(["curl", "-sS", "--cacert", k8s_ca,
                      "-H", "Authorization: Bearer " + k8s_token, minio_api],
                      capture_output=True, text=True, timeout=15)
                  if r.returncode == 0:
                      try:
                          data = j.loads(r.stdout).get("data") or {}
                          if "accesskey" in data and "secretkey" in data:
                              key = base64.b64decode(data["accesskey"]).decode()
                              secret = base64.b64decode(data["secretkey"]).decode()
                              print("gitlab-minio-secret ready (attempt %d)." % i)
                              break
                      except Exception as e:
                          print("  attempt %d/90: parse error: %s" % (i, e))
                  else:
                      print("  attempt %d/90: curl rc=%s" % (i, r.returncode))
                  time.sleep(10)
              if not key or not secret:
                  print("ERROR: gitlab-minio-secret not ready after 15 minutes")
                  sys.exit(1)

              s3 = boto3.client("s3", endpoint_url=endpoint,
                  aws_access_key_id=key, aws_secret_access_key=secret,
                  region_name="us-east-1")

              try:
                  s3.head_object(Bucket=bucket, Key=obj_key)
                  print("Model already exists at s3://%s/%s -- skip" % (bucket, obj_key))
                  sys.exit(0)
              except s3.exceptions.ClientError:
                  pass

              try:
                  s3.head_bucket(Bucket=bucket)
              except s3.exceptions.ClientError:
                  s3.create_bucket(Bucket=bucket)
                  print("Created bucket %s" % bucket)

              print("Downloading %s ..." % model_url)
              urllib.request.urlretrieve(model_url, "/tmp/model.pt")
              sz = os.path.getsize("/tmp/model.pt")
              print("Downloaded: %.1f MB" % (sz / 1024 / 1024))

              s3.upload_file("/tmp/model.pt", bucket, obj_key)
              resp = s3.head_object(Bucket=bucket, Key=obj_key)
              print("Uploaded s3://%s/%s (%.1f MB)" % (bucket, obj_key, resp["ContentLength"] / 1024 / 1024))

              # Sync MinIO creds to Vault so the yolo-ppe-serving InferenceService's
              # ExternalSecret (aws-connection-ppe-models, key secret/data/hub/
              # minio-credentials) can actually download this model -- without this,
              # ESO keeps serving the random placeholder written by vault-secrets-
              # bootstrap and KServe's storage-initializer fails with S3 403 Forbidden.
              vault_addr = "https://vault.vault.svc:8200"
              try:
                  api = ("https://kubernetes.default.svc/api/v1/namespaces/"
                         "imperative/secrets/vaultkeys")
                  r = subprocess.run(["curl", "-sS", "--cacert", k8s_ca,
                      "-H", "Authorization: Bearer " + k8s_token, api],
                      capture_output=True, text=True, timeout=15, check=True)
                  vault_keys_secret = j.loads(r.stdout)
                  raw = vault_keys_secret["data"]["vault_data_json"]
                  vault_data = j.loads(base64.b64decode(raw))
                  root_token = vault_data.get("root_token")
                  if root_token:
                      payload = {"data": {"accesskey": key, "secretkey": secret}}
                      r = subprocess.run(["curl", "-sk", "-X", "POST",
                          vault_addr + "/v1/secret/data/hub/minio-credentials",
                          "-H", "X-Vault-Token: " + root_token,
                          "-d", j.dumps(payload)],
                          capture_output=True, text=True, timeout=10)
                      print("Vault minio-credentials: synced" if "version" in r.stdout else "Vault sync: %s" % r.stdout[:200])
                      # ESO may still serve the placeholder secret written before this job
                      # ran; force a reconcile so yolo-ppe-serving's storage-initializer
                      # picks up the real gitlab-minio credentials.
                      subprocess.run(["curl", "-sS", "--cacert", k8s_ca,
                          "-X", "PATCH",
                          "-H", "Authorization: Bearer " + k8s_token,
                          "-H", "Content-Type: application/merge-patch+json",
                          "-d", j.dumps({"metadata":{"annotations":{"force-sync": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())}}}),
                          "https://kubernetes.default.svc/apis/external-secrets.io/v1/namespaces/neuroface-cv/externalsecrets/aws-connection-ppe-models"],
                          capture_output=True, text=True, timeout=15)
                      print("Triggered force-sync on ExternalSecret/aws-connection-ppe-models")
                  else:
                      print("Vault root token not found in imperative/vaultkeys -- skipping sync")
              except Exception as e:
                  print("Vault sync skipped: %s" % e)
              PYEOF
          env:
            - name: S3_ENDPOINT
              value: "http://gitlab-minio-svc.gitlab-system.svc:9000"
            - name: S3_BUCKET
              value: {{ $ms.bucket | default "models" | quote }}
            - name: S3_OBJECT_KEY
              value: {{ $ms.objectKey | default "ppe-detection/model/best.pt" | quote }}
            - name: MODEL_URL
              value: {{ $ms.modelUrl | default "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt" | quote }}
{{- end }}
