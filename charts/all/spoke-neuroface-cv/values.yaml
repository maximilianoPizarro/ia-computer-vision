clusterName: ""

skupper:
  enabled: true

kafka:
  enabled: true

modelSeed:
  enabled: false
  bucket: models
  objectKey: ppe-detection/model/best.pt
  modelUrl: "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt"
  image: registry.redhat.io/ubi9/python-311:latest

yoloPpeServing:
  image: quay.io/maximilianopizarro/neuroface-ppe-serving:v1.5.0
  modelFile: best.pt
  storageSecretName: aws-connection-ppe-models
  storagePath: ppe-detection/model
  modelStorage:
    useVault: true
    vaultKey: secret/data/hub/minio-credentials
    region: us-east-1
    bucket: models
    endpoint: http://minio-hub.service-interconnect.svc:9000
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi
  hpa:
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilization: 70
