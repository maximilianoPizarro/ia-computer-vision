# Showroom Lab Guide Configuration
showroom:
  enabled: true
  namespace: showroom
  name: showroom

  # Lab guide Git repository
  content:
    repoUrl: "https://github.com/maximilianoPizarro/showroom-ia-computer-vision.git"
    repoRef: "main"
    antoraPlaybook: "site.yml"
    image: "quay.io/rhpds/showroom-content:v1.3.1"

  nookbag:
    enabled: false

  # Terminal configuration
  terminal:
    enabled: true
    image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
    # Match platform-users.userCount for workshop-lab-reader bindings
    userCount: 30
    # Namespaces lab modules inspect with oc (Showroom SA + userN after hub-login)
    # Hub list — do not include spoke-only namespaces (neuroface, neuroface-cv)
    workshopNamespacesHub:
      - developer-hub
      - keycloak-system
      - neuroface-gateway-system
      - vault
      - openshift-gitops
      - gitlab-system
      - mailpit
      - redhat-connectivity-link-operator
      - service-interconnect
      - redhat-ods-applications
    workshopNamespacesSpoke:
      - neuroface
      - neuroface-cv
      - service-interconnect
      - redhat-ods-applications
      - openshift-gitops
      - stackrox
      - devspaces
    workshopNamespaces: []
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

clusterDomain: ""
hubClusterDomain: ""
clusterRole: hub

clusters:
  east:
    domain: ""
    apiUrl: ""
  west:
    domain: ""
    apiUrl: ""

# Fallback for terminal east-login/west-login (same schema as acm-hub-spoke / developer-hub).
spokeCredentials:
  clusters:
    east:
      apiUrl: ""
    west:
      apiUrl: ""

registration:
  url: ""

demo:
  namespace: "neuroface"
  appName: "neuroface"
