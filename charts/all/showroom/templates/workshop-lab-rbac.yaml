{{- if .Values.showroom.enabled }}
{{- $count := int (.Values.showroom.terminal.userCount | default 50) }}
{{- $workshopNs := .Values.showroom.terminal.workshopNamespaces | default list }}
{{- if not $workshopNs }}
{{- if eq (.Values.clusterRole | default "hub") "spoke" }}
{{- $workshopNs = .Values.showroom.terminal.workshopNamespacesSpoke | default list }}
{{- else }}
{{- $workshopNs = .Values.showroom.terminal.workshopNamespacesHub | default list }}
{{- end }}
{{- end }}
---
# Read-only lab access for Showroom terminal SA and workshop htpasswd users:
# Kuadrant APIProducts, Gateway API HTTPRoutes, and standard workload resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workshop-lab-reader
  labels:
    app.kubernetes.io/name: {{ .Values.showroom.name }}
    app.kubernetes.io/component: showroom-terminal
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events", "persistentvolumeclaims", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "grpcroutes", "referencegrants"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kuadrant.io"]
    resources: ["authpolicies", "ratelimitpolicies", "tokenratelimitpolicies", "dnspolicies", "tlspolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["planpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apiproducts", "apikeys"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workshop-lab-reader
  labels:
    app.kubernetes.io/name: {{ .Values.showroom.name }}
    app.kubernetes.io/component: showroom-terminal
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workshop-lab-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.showroom.name }}
    namespace: {{ .Values.showroom.namespace }}
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: platformadmin
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: admin
{{- range $i := until $count }}
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ printf "user%d" (add $i 1) | quote }}
{{- end }}
{{- range $workshopNs }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: showroom-secret-reader
  namespace: {{ . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-secret-reader
  namespace: {{ . }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: showroom-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.showroom.name }}
    namespace: {{ $.Values.showroom.namespace }}
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: platformadmin
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: admin
{{- range $i := until $count }}
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: {{ printf "user%d" (add $i 1) | quote }}
{{- end }}
{{- end }}
{{- end }}
