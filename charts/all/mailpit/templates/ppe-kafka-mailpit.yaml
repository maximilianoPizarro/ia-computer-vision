{{- if .Values.ppeKafkaMailpit.enabled }}
{{- $cfg := .Values.ppeKafkaMailpit -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ppe-kafka-mailpit-route
  namespace: mailpit
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  # Apache Camel YAML DSL route: consumes PPE violation events from Kafka and
  # sends an HTML email alert via SMTP to Mailpit. Run with Camel JBang (see
  # deployment below) -- no custom image build required, consistent with
  # this pattern's GitOps-only (no CI) philosophy.
  #
  # Kafka message body (JSON, produced by NeuroFace's YOLO PPE detector):
  #   {"ppe_status": "violation"|"no_persons"|"compliant", "missing_ppe": [...],
  #    "present_ppe": [...], "person_count": N, "timestamp": "..."}
  ppe-alert-route.camel.yaml: |
    - route:
        id: ppe-kafka-alert-route
        from:
          uri: "kafka:{{ "{{" }}env:KAFKA_TOPIC{{ "}}" }}"
          parameters:
            brokers: "{{ "{{" }}env:KAFKA_BOOTSTRAP{{ "}}" }}"
            groupId: "{{ "{{" }}env:KAFKA_GROUP{{ "}}" }}"
            autoOffsetReset: latest
        steps:
          - unmarshal:
              json:
                library: Jackson
          - choice:
              when:
                - simple: "${body[ppe_status]} == 'violation' || ${body[ppe_status]} == 'no_persons'"
                  steps:
                    - setProperty:
                        name: ppeStatus
                        simple: "${body[ppe_status]}"
                    - setProperty:
                        name: missingPpe
                        simple: "${body[missing_ppe]}"
                    - setProperty:
                        name: presentPpe
                        simple: "${body[present_ppe]}"
                    - setProperty:
                        name: personCount
                        simple: "${body[person_count]}"
                    - setProperty:
                        name: eventTs
                        simple: "${body[timestamp]}"
                    - log:
                        message: "PPE alert: ${exchangeProperty.ppeStatus} missing=${exchangeProperty.missingPpe}"
                    - setBody:
                        simple: |-
                          <html><body>
                          <h2>PPE Detection: ${exchangeProperty.ppeStatus.toUpperCase()}</h2>
                          <ul>
                          <li>Persons detected: ${exchangeProperty.personCount}</li>
                          <li>Present PPE: ${exchangeProperty.presentPpe}</li>
                          <li>Missing PPE: ${exchangeProperty.missingPpe}</li>
                          <li>Timestamp: ${exchangeProperty.eventTs}</li>
                          </ul>
                          <p><a href="{{ "{{" }}env:NEUROFACE_URL{{ "}}" }}">Open NeuroFace</a></p>
                          </body></html>
                    - setHeader:
                        name: Subject
                        simple: "PPE ${exchangeProperty.ppeStatus.toUpperCase()}: ${exchangeProperty.missingPpe}"
                    - setHeader:
                        name: Content-Type
                        constant: "text/html; charset=UTF-8"
                    - to:
                        uri: "smtp://{{ "{{" }}env:SMTP_HOST{{ "}}" }}:{{ "{{" }}env:SMTP_PORT{{ "}}" }}"
                        parameters:
                          to: "{{ "{{" }}env:MAIL_TO{{ "}}" }}"
                          from: "{{ "{{" }}env:MAIL_FROM{{ "}}" }}"
                          contentType: "text/html"
              otherwise:
                steps:
                  - log:
                      message: "Skipped ${body[ppe_status]} event"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppe-kafka-mailpit
  namespace: mailpit
  labels:
    app.kubernetes.io/part-of: neuroface
    app.kubernetes.io/component: ppe-kafka-consumer
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ppe-kafka-mailpit
  template:
    metadata:
      labels:
        app: ppe-kafka-mailpit
    spec:
      containers:
        - name: camel-route
          image: {{ $cfg.camelImage | default "registry.access.redhat.com/ubi9/openjdk-21:latest" | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              export HOME=/tmp
              if [ ! -x "$HOME/.jbang/bin/jbang" ]; then
                curl -Ls https://sh.jbang.dev | bash -s - app setup
              fi
              export PATH="$HOME/.jbang/bin:$PATH"
              jbang trust add https://github.com/apache/ --quiet || true
              exec jbang -Dcamel.jbang.version={{ $cfg.camelVersion | default "4.8.0" }} \
                camel@apache/camel run /etc/camel/ppe-alert-route.camel.yaml
          env:
            - name: KAFKA_BOOTSTRAP
              value: {{ $cfg.kafkaBootstrap | quote }}
            - name: KAFKA_TOPIC
              value: {{ $cfg.kafkaTopic | quote }}
            - name: KAFKA_GROUP
              value: {{ $cfg.kafkaGroup | quote }}
            - name: SMTP_HOST
              value: {{ $cfg.smtpHost | quote }}
            - name: SMTP_PORT
              value: {{ $cfg.smtpPort | quote }}
            - name: MAIL_FROM
              value: {{ $cfg.mailFrom | quote }}
            - name: MAIL_TO
              value: {{ $cfg.mailTo | quote }}
            - name: NEUROFACE_URL
              value: {{ include "mailpit.neurofaceUrl" . | quote }}
          volumeMounts:
            - name: route
              mountPath: /etc/camel
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: route
          configMap:
            name: ppe-kafka-mailpit-route
{{- end }}
