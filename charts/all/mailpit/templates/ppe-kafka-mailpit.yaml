{{- if .Values.ppeKafkaMailpit.enabled }}
{{- $cfg := .Values.ppeKafkaMailpit -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ppe-kafka-mailpit-route
  namespace: mailpit
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  # Apache Camel YAML DSL route: consumes PPE violation events from Kafka and
  # sends an HTML email alert via SMTP to Mailpit. Run with Camel JBang (see
  # deployment below) -- no custom image build required, consistent with
  # this pattern's GitOps-only (no CI) philosophy. Values are baked in
  # directly by Helm (not resolved from env vars at runtime by Camel) to
  # avoid depending on Camel property-placeholder/env-lookup behavior.
  #
  # Kafka message body (JSON, produced by NeuroFace's YOLO PPE detector):
  #   {"ppe_status": "violation"|"no_persons"|"compliant", "missing_ppe": [...],
  #    "present_ppe": [...], "person_count": N, "timestamp": "..."}
  ppe-alert-route.camel.yaml: |
    - route:
        id: ppe-kafka-alert-route
        from:
          uri: "kafka:{{ $cfg.kafkaTopic }}?brokers={{ $cfg.kafkaBootstrap }}&groupId={{ $cfg.kafkaGroup }}&autoOffsetReset=latest"
          steps:
          - unmarshal:
              json:
                library: Jackson
          - choice:
              when:
                - simple: "${body[ppe_status]} == 'violation' || ${body[ppe_status]} == 'no_persons'"
                  steps:
                    - setProperty:
                        name: ppeStatus
                        simple: "${body[ppe_status]}"
                    - setProperty:
                        name: missingPpe
                        simple: "${body[missing_ppe]}"
                    - setProperty:
                        name: presentPpe
                        simple: "${body[present_ppe]}"
                    - setProperty:
                        name: personCount
                        simple: "${body[person_count]}"
                    - setProperty:
                        name: eventTs
                        simple: "${body[timestamp]}"
                    - log:
                        message: "PPE alert: ${exchangeProperty.ppeStatus} missing=${exchangeProperty.missingPpe}"
                    - setBody:
                        simple: |-
                          <!DOCTYPE html>
                          <html lang="en">
                          <head>
                            <meta charset="UTF-8"/>
                            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
                            <title>PPE Alert</title>
                            <style type="text/css">
                              body { margin: 0; padding: 0; background: #f4f5f7; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1f2937; }
                              .wrap { max-width: 560px; margin: 24px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
                              .banner { background: linear-gradient(135deg, #b91c1c 0%, #ea580c 100%); color: #fff; padding: 24px 28px; }
                              .banner.no_persons { background: linear-gradient(135deg, #1d4ed8 0%, #0369a1 100%); }
                              .banner h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.02em; }
                              .banner p { margin: 8px 0 0; opacity: 0.92; font-size: 14px; }
                              .body { padding: 24px 28px 8px; }
                              .row { display: flex; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
                              .row:last-child { border-bottom: none; }
                              .label { color: #6b7280; font-weight: 600; min-width: 120px; }
                              .value { text-align: right; font-weight: 500; color: #111827; word-break: break-word; }
                              .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; background: #fee2e2; color: #991b1b; }
                              .pill.ok { background: #dcfce7; color: #166534; }
                              .cta { padding: 8px 28px 28px; }
                              .btn { display: inline-block; background: #111827; color: #ffffff !important; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; }
                              .foot { padding: 0 28px 24px; font-size: 12px; color: #9ca3af; }
                            </style>
                          </head>
                          <body>
                            <div class="wrap">
                              <div class="banner ${exchangeProperty.ppeStatus}">
                                <h1>PPE ${exchangeProperty.ppeStatus.toUpperCase()}</h1>
                                <p>Computer Vision safety alert from NeuroFace</p>
                              </div>
                              <div class="body">
                                <div class="row"><span class="label">Status</span><span class="value"><span class="pill">${exchangeProperty.ppeStatus}</span></span></div>
                                <div class="row"><span class="label">Persons</span><span class="value">${exchangeProperty.personCount}</span></div>
                                <div class="row"><span class="label">Present PPE</span><span class="value">${exchangeProperty.presentPpe}</span></div>
                                <div class="row"><span class="label">Missing PPE</span><span class="value">${exchangeProperty.missingPpe}</span></div>
                                <div class="row"><span class="label">Timestamp</span><span class="value">${exchangeProperty.eventTs}</span></div>
                              </div>
                              <div class="cta">
                                <a class="btn" href="{{ include "mailpit.neurofaceUrl" . }}">Open NeuroFace dashboard</a>
                              </div>
                              <div class="foot">Sent by ppe-kafka-mailpit &middot; Mailpit workshop sink</div>
                            </div>
                          </body>
                          </html>
                    - setHeader:
                        name: Subject
                        simple: "PPE ${exchangeProperty.ppeStatus.toUpperCase()}: ${exchangeProperty.missingPpe}"
                    - setHeader:
                        name: Content-Type
                        constant: "text/html; charset=UTF-8"
                    - to:
                        uri: "smtp://{{ $cfg.smtpHost }}:{{ $cfg.smtpPort }}?to={{ $cfg.mailTo }}&from={{ $cfg.mailFrom }}&contentType=text/html"
              otherwise:
                steps:
                  - log:
                      message: "Skipped ${body[ppe_status]} event"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppe-kafka-mailpit
  namespace: mailpit
  labels:
    app.kubernetes.io/part-of: neuroface
    app.kubernetes.io/component: ppe-kafka-consumer
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ppe-kafka-mailpit
  template:
    metadata:
      labels:
        app: ppe-kafka-mailpit
    spec:
      containers:
        # First start (or any pod restart, since $HOME is ephemeral) takes
        # ~1-2 minutes: installs JBang, then Camel JBang resolves and
        # downloads camel-kafka/camel-mail/camel-jackson (+ transitive deps)
        # from Maven Central. Expected/one-time cost per pod lifetime,
        # consistent with this pattern's "no custom image build" philosophy
        # (same trade-off the old Python/pip-based consumer made).
        - name: camel-route
          image: {{ $cfg.camelImage | default "registry.access.redhat.com/ubi9/openjdk-21:latest" | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              export HOME=/tmp
              if [ ! -x "$HOME/.jbang/bin/jbang" ]; then
                curl -Ls https://sh.jbang.dev | bash -s - app setup
              fi
              export PATH="$HOME/.jbang/bin:$PATH"
              jbang trust add https://github.com/apache/ --quiet || true
              exec jbang -Dcamel.jbang.version={{ $cfg.camelVersion | default "4.8.0" }} \
                camel@apache/camel run /etc/camel/ppe-alert-route.camel.yaml
          volumeMounts:
            - name: route
              mountPath: /etc/camel
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: route
          configMap:
            name: ppe-kafka-mailpit-route
{{- end }}
