apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: mailpit
  labels:
    app: mailpit
    app.kubernetes.io/part-of: mailpit
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: {{ .Values.mailpit.image | quote }}
          ports:
            - containerPort: 8025
              name: http
            - containerPort: 1025
              name: smtp
          env:
            - name: MP_UI_BIND_ADDR
              value: "0.0.0.0:8025"
            - name: MP_SMTP_BIND_ADDR
              value: "0.0.0.0:1025"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /livez
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8025
            initialDelaySeconds: 3
            periodSeconds: 10
