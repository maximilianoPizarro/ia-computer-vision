# See templates/gpu-vllm-models.yaml and the `gpu:` block near the bottom of
# this file for the opt-in, hub-only GPU model serving alternative (never
# enabled by values-hub.yaml itself -- see values-hub-gpu.yaml at repo root).
clusterDomain: ""
userCount: 30
userProjects:
  enabled: false
  notebook:
    enabled: false
    deployCr: false
    image: quay.io/opendatahub-contrib/workbench-images:jupyter-minimal-elyra-py311-ubi9
    cpu: "250m"
    memory: 1Gi
  # KServe InferenceService (CPU sklearn on hub MinIO) — RawDeployment, no Serverless/Knative.
  inferenceService:
    enabled: false
    name: workshop-sklearn
    displayName: Workshop sklearn (CPU / MinIO)
    modelFormat: sklearn
    runtime: mlserver-1.x
    storageSecretName: aws-connection-models
    storagePath: anomaly-detection/model
# S3 connection for OpenShift AI dashboard + KServe (hub MinIO; spokes use Skupper minio-hub).
modelStorage:
  enabled: true
  accessKeyId: minio
  secretAccessKey: minio123
  region: us-east-1
  bucket: models
  endpoint: http://minio.industrial-edge-ml-workspace.svc:9000
dashboardExtensions:
  enabled: true
modelServing:
  # RawDeployment: KServe without OpenShift Serverless / Knative (recommended for this pattern).
  modelMeshEnabled: false
  serverlessEnabled: false
  defaultDeploymentMode: RawDeployment
maas:
  endpoint: ""
  # Set via values override or Vault. Example: https://maas-rhdp.apps.maas.redhatworkshops.io
  apiKey: ""
  # Native RHOAI 3.4 Models-as-a-Service (Tenant/ExternalModel/MaaSSubscription).
  native:
    enabled: false
  credentialsSecretName: openshift-ai-maas-credentials
  credentialsSecretKey: api-key
  models:
    - id: llama-scout-17b
      displayName: Llama Scout 17B (workshop default)
      secretKey: api-key
    - id: granite-3-2-8b-instruct
      displayName: Granite 3.2 8B Instruct (Lightspeed default)
      secretKey: granite-api-key
    - id: deepseek-r1-distill-qwen-14b
      displayName: DeepSeek R1 Distill Qwen 14B
      secretKey: deepseek-api-key
    - id: codellama-7b-instruct
      displayName: CodeLlama 7B Instruct
      secretKey: api-key
# RHOAI 3.4 Gen AI Studio Playground + MCP tab require BOTH:
#   1. OdhDashboardConfig genAiStudio/modelAsService (charts/all/models-as-a-service)
#   2. Llama Stack Operator Managed in DataScienceCluster (this chart, gated below)
# Users create playgrounds from Gen AI studio > Playground > Create playground,
# picking models with an AI asset endpoint (GPU InferenceServices or native MaaS
# ExternalModels). MCP servers are registered via mcp.servers ConfigMap below.
genAiStudio:
  # When true (default), sets spec.components.llamastackoperator.managementState=Managed.
  llamaStackOperator: true
playground:
  enabled: true
# Model Context Protocol (MCP) tool servers for the Gen AI Studio Playground's
# "MCP" tab (Testing with MCP servers, RHOAI 3.4 docs). RHOAI reads a
# ConfigMap named EXACTLY `gen-ai-aa-mcp-servers` in `redhat-ods-applications`
# -- one key per server, value is a JSON string {"url", "description"}. This
# is unrelated to (and was previously confused with) the CPU MaaS proxy-stub
# InferenceServices above; MCP servers provide callable TOOLS, not models.
mcp:
  enabled: true
  servers:
    - name: ArgoCD-GitOps-MCP
      url: http://argocd-mcp.argocd-mcp.svc.cluster.local:3000/mcp
      description: >-
        Query and sync Argo CD Applications across the hub (and east/west
        spokes, if configured) -- GitOps sync status, health, logs. See
        charts/all/argocd-mcp.

# Real local GPU-backed model serving (vLLM downloads weights from Hugging
# Face into a PVC-backed cache) -- OFF by default. This is an ALTERNATIVE
# for a GPU-enabled hub-only install (no spokes needed); it does not touch
# or replace the default CPU proxy-stub "maas-workshop" InferenceServices
# above. Enable via the values-hub-gpu.yaml overlay, never in values-hub.yaml
# directly, so the default (CPU, current) install is completely unaffected.
# See docs/content/patterns/ia-computer-vision/ideas-for-customization.adoc
# ("Enabling GPU workers on the hub") for full instructions.
#
# Model list uses official, Red Hat-validated FP8-quantized checkpoints from
# https://huggingface.co/RedHatAI (LLM Compressor + vLLM, ~50% smaller than
# fp16 with ~97-101% accuracy recovery per Red Hat's published benchmarks)
# instead of community/upstream repos -- same model families as the
# maas.models list above, swapped for their RedHatAI FP8-dynamic variants.
gpu:
  enabled: false
  # When true, deploy only the first entry in gpu.models (single-node sandboxes).
  singleNodeProfile: false
  namespace: gpu-models
  runtimeImage: "registry.redhat.io/rhaii/vllm-cuda-rhel9:3.4.0"
  # Sized for AWS g6.12xlarge (4x NVIDIA L4, 24 GiB VRAM each). FP8 halves
  # VRAM vs fp16, so all three now fit one L4 each (3 of 4 GPUs used) --
  # verify actual headroom (--max-model-len, --gpu-memory-utilization)
  # against your instance before relying on these for anything but a demo.
  models:
    - name: qwen2-5-coder-7b-instruct
      huggingFaceId: RedHatAI/Qwen2.5-Coder-7B-Instruct-FP8-dynamic
      gpuCount: 1
      storage: 20Gi
      maxModelLen: 8192
    - name: granite-3-1-8b-instruct
      huggingFaceId: RedHatAI/granite-3.1-8b-instruct-FP8-dynamic
      gpuCount: 1
      storage: 20Gi
      maxModelLen: 8192
    - name: deepseek-r1-distill-qwen-14b
      huggingFaceId: RedHatAI/DeepSeek-R1-Distill-Qwen-14B-FP8-dynamic
      # FP8 brings this down to ~14Gi -- fits a single 24Gi L4 (no tensor
      # parallelism needed, unlike the unquantized fp16 checkpoint).
      gpuCount: 1
      storage: 30Gi
      maxModelLen: 8192
