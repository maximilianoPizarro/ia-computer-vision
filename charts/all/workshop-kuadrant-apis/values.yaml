clusterDomain: ""

# Native RHOAI MaaS (Connectivity Link): enable TLS on the singleton Authorino CR.
maas:
  authorinoTls: false

workshopGateway:
  namespace: workshop-kuadrant-apis
  name: workshop-apis-gateway
  hostname: "" # default workshop-apis.<clusterDomain>

aiGateway:
  namespace: ai-gateway-system
  name: ai-gateway
  hostname: "" # default ai-gateway.<clusterDomain>

# Public web APIs — ExternalName + ServiceEntry + Kuadrant APIProduct
apis:
  httpbin:
    enabled: true
    host: httpbin.org
    port: 443
    pathPrefix: /httpbin
    rewritePathPrefix: /
    displayName: Workshop httpbin (httpbin.org)
  restcountries:
    enabled: true
    # restcountries.com v3.1 is deprecated; countriesnow.space is a stable free JSON API.
    host: countriesnow.space
    port: 443
    pathPrefix: /countries
    rewritePathPrefix: /api/v0.1/countries
    displayName: Workshop Countries API (countriesnow.space)
  mcp:
    enabled: false
    # In-cluster MCP gateway (Kuadrant MCP CRDs); exposed via workshop-apis with API key
    serviceName: mcp-gateway-istio
    serviceNamespace: mcp-system
    port: 8080
    pathPrefix: /mcp
    rewritePathPrefix: /mcp
    displayName: Workshop MCP Gateway (ArgoCD + k8s tools)
  llama:
    enabled: false
    # RHOAI catalog pre-installed demo model (KServe/vLLM), served directly from
    # its predictor Service -- bypasses the RHOAI-native openshift-ai-inference
    # Gateway/AuthPolicy chain entirely (that path requires its own MaaS identity
    # setup, separate from this workshop's Kuadrant API-key tiers). Only enable
    # on clusters where this InferenceService actually exists (e.g. RHPDS
    # "Red Hat OpenShift AI 3" catalog installs) -- see values-hub-rhpds.yaml.
    serviceName: llama-32-3b-instruct-predictor
    serviceNamespace: my-first-model
    port: 80
    pathPrefix: /llama
    rewritePathPrefix: /v1/completions
    displayName: Llama 3.2 3B Instruct (RHOAI catalog pre-installed)
  maas:
    enabled: true
    host: maas-rhdp.apps.maas.redhatworkshops.io
    port: 443
    pathPrefix: /v1
    rewritePathPrefix: /v1
    apiKey: "" # inject via litemaas.apiKey at deploy (never commit)
    displayName: AI Gateway — MaaS LLM (TokenRateLimit)
    # Dual auth on route ai-maas: APIKEY (above) OR a Keycloak realm-maas JWT.
    # The realm and its client-maas-userN clients already exist via the
    # rhbk-iam chart — no separate client secret sync needed here, Authorino
    # only validates the JWT signature/issuer against issuerHost.
    oidc:
      enabled: true
      realm: maas
      issuerHost: "" # default keycloak.<clusterDomain> (Keycloak's canonical issuer, not sso.<domain>)

approvalMode: automatic # workshop: instant API keys for userN (use manual in production)

plans:
  tiers:
    - bronze
    - silver
    - gold
  limits:
    bronze:
      custom:
        - limit: 5
          window: 1m
    silver:
      custom:
        - limit: 15
          window: 1m
    gold:
      custom:
        - limit: 60
          window: 1m

tokenRateLimit:
  free:
    limit: 50
    window: 1m
  gold:
    limit: 200
    window: 1m

vault:
  maasSecretPath: secret/workshop/maas
  platformApiKeyPath: secret/data/hub/ai-gateway-platform-keys
  kuadrantKeysPathPrefix: secret/workshop/kuadrant
  keycloakRealmsPathPrefix: secret/data/hub/keycloak/realms

# PostSync hook: restart RHCL Kuadrant operator after Istio GatewayClass exists (detection is at pod startup)
kuadrantOperatorRestart:
  image: registry.redhat.io/openshift4/ose-cli:latest
  operatorNamespace: redhat-connectivity-link-operator
  deployment: kuadrant-operator-controller-manager

# PostSync Job + CronJob: Authorino only loads apiKey identity Secrets at its
# own pod startup (no live pickup of newly-created matching Secrets -- see
# authorino-apikey-secret-resync.yaml). Restarts Authorino, but only when a
# kuadrant.io/apikey=true Secret postdates its current pod's startup, so keys
# minted via the Developer Hub apikey-self-service template become usable
# within one CronJob tick instead of needing a manual restart every time.
authorinoApikeySecretResync:
  image: registry.redhat.io/openshift4/ose-cli:latest
  namespace: kuadrant-system
  deployment: authorino
  podSelector: authorino-resource=authorino
  schedule: "*/2 * * * *"
