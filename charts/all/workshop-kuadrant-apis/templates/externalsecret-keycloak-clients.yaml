{{- if .Values.keycloak.realms.enabled | default false }}
{{- $count := int (.Values.keycloak.realms.userCount | default 30) -}}
{{- $vaultPrefix := .Values.keycloak.realms.vaultPathPrefix | default "secret/data/hub/keycloak/realms" -}}
{{- range $realm := .Values.keycloak.realms.names | default (list "maas") }}
{{- range $i := until $count }}
{{- $userNum := add $i 1 }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-client-{{ $realm }}-user{{ $userNum }}
  namespace: {{ $.Values.workshopGateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: keycloak-client-{{ $realm }}-user{{ $userNum }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        clientId: {{ printf "client-%s-user%d" $realm $userNum | quote }}
        clientSecret: "{{`{{ .clientSecret }}`}}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: {{ printf "%s/%s/user%d" $vaultPrefix $realm $userNum }}
        property: clientSecret
{{- end }}
{{- end }}
{{- end }}
