{{- /*
  Patch APIKey CRD for Kuadrant Backstage plugin compatibility:
  1. Remove secretRef from required fields (plugin creates Secret separately).
  2. Add status.phase/reviewedBy/reviewedAt — plugin v0.2.1 reads phase for UI;
     developer-portal-controller approves via conditions only unless phase is set.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apikey-crd-patch
  namespace: {{ .Values.workshopGateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apikey-crd-patch
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    resourceNames: ["apikeys.devportal.kuadrant.io"]
    verbs: ["get", "patch"]
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apikey-crd-patch
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apikey-crd-patch
subjects:
  - kind: ServiceAccount
    name: apikey-crd-patch
    namespace: {{ .Values.workshopGateway.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: apikey-crd-patch
  namespace: {{ .Values.workshopGateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: apikey-crd-patch
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
            - |
              REQUIRED=$(oc get crd apikeys.devportal.kuadrant.io \
                -o jsonpath='{.spec.versions[0].schema.openAPIV3Schema.properties.spec.required}')
              if echo "$REQUIRED" | grep -q secretRef; then
                oc patch crd apikeys.devportal.kuadrant.io --type json \
                  -p '[{"op":"replace","path":"/spec/versions/0/schema/openAPIV3Schema/properties/spec/required","value":["apiProductRef","planTier","requestedBy"]}]'
                echo "Patched: removed secretRef from required"
              else
                echo "Already patched: secretRef not in required"
              fi

              PHASE=$(oc get crd apikeys.devportal.kuadrant.io \
                -o jsonpath='{.spec.versions[0].schema.openAPIV3Schema.properties.status.properties.phase}' 2>/dev/null || true)
              if [ -z "$PHASE" ]; then
                oc patch crd apikeys.devportal.kuadrant.io --type json -p '[
                  {"op":"add","path":"/spec/versions/0/schema/openAPIV3Schema/properties/status/properties/phase","value":{"type":"string","enum":["Pending","Approved","Rejected"],"description":"Backstage plugin lifecycle phase"}},
                  {"op":"add","path":"/spec/versions/0/schema/openAPIV3Schema/properties/status/properties/reviewedBy","value":{"type":"string","description":"Who approved or rejected the request"}},
                  {"op":"add","path":"/spec/versions/0/schema/openAPIV3Schema/properties/status/properties/reviewedAt","value":{"type":"string","format":"date-time","description":"When the request was reviewed"}}
                ]'
                echo "Patched: added status.phase fields for Backstage plugin"
              else
                echo "Already patched: status.phase present in CRD"
              fi
              # Do NOT patch status.phase on APIKey objects — developer-portal-controller
              # treats unexpected phase as drift and resets the key to Pending.
