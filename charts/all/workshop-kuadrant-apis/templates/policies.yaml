{{- $workshopNs := .Values.workshopGateway.namespace }}
{{- $aiNs := .Values.aiGateway.namespace }}
{{- $planPredicate := `has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "%s"` }}
{{- if .Values.apis.httpbin.enabled }}
---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: workshop-httpbin-auth
  namespace: {{ $workshopNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: workshop-httpbin
  rules:
    authentication:
      api-key-users:
        apiKey:
          allNamespaces: true
          selector:
            {{- include "workshop-kuadrant-apis.workshopApiKeySelector" . | nindent 12 }}
        credentials:
          authorizationHeader:
            prefix: APIKEY
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: PlanPolicy
metadata:
  name: workshop-httpbin-plans
  namespace: {{ $workshopNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: workshop-httpbin
  plans:
    {{- range $tier := .Values.plans.tiers }}
    - tier: {{ $tier }}
      predicate: |
        {{ printf $planPredicate $tier }}
      limits:
        {{- toYaml (index $.Values.plans.limits $tier) | nindent 8 }}
    {{- end }}
{{- end }}
