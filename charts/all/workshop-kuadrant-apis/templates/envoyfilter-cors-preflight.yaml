{{- /*
  Same fix as neuroface-gateway-cors-preflight.yaml, needed for the same
  reason: the AuthPolicy `when: request.method != "OPTIONS"` exemption
  already lets an unauthenticated preflight through Authorino, and each
  HTTPRoute's own ResponseHeaderModifier (workshop-kuadrant-apis.corsFilter)
  already sets Access-Control-Allow-* -- but a browser preflight still needs
  a 2xx *status*, and these routes' upstreams are all external
  ExternalName/ServiceEntry backends (countriesnow.space, httpbin.org, the
  RHOAI catalog Llama predictor) that either don't implement OPTIONS at all
  or reset the connection for it (observed: 503 "upstream connect error ...
  reset reason: connection termination" for OPTIONS specifically, even
  though real GET/POST requests succeed). Gateway API HTTPRoute filters have
  no "direct response" action to fix this at the routing layer (see the
  neuroface fix's own comment for the full filter-type list), so this
  answers OPTIONS directly at the Istio/Envoy layer, before it ever reaches
  the external backend.
*/ -}}
{{- $workshopNs := .Values.workshopGateway.namespace }}
{{- $workshopGw := .Values.workshopGateway.name }}
{{- $aiNs := .Values.aiGateway.namespace }}
{{- $aiGw := .Values.aiGateway.name }}
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: workshop-apis-gateway-cors-preflight
  namespace: {{ $workshopNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ $workshopGw }}
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua.cors_preflight
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inlineCode: |
              -- Only short-circuits the status/method here. The actual
              -- Access-Control-Allow-* headers still come from each
              -- HTTPRoute's own ResponseHeaderModifier filter (route
              -- matching still runs and decorates the response even for
              -- this locally-generated reply) -- setting them here too
              -- would just duplicate them.
              function envoy_on_request(request_handle)
                local headers = request_handle:headers()
                if headers:get(":method") == "OPTIONS" then
                  request_handle:respond({[":status"] = "204"}, "")
                end
              end
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: ai-gateway-cors-preflight
  namespace: {{ $aiNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ $aiGw }}
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua.cors_preflight
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inlineCode: |
              function envoy_on_request(request_handle)
                local headers = request_handle:headers()
                if headers:get(":method") == "OPTIONS" then
                  request_handle:respond({[":status"] = "204"}, "")
                end
              end
