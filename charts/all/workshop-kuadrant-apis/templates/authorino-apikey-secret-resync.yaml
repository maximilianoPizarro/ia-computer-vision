{{- /*
  Authorino's apiKey identity (AuthConfig `identity.apiKey.selector`, a live
  Kubernetes label selector -- see workshop-*-auth AuthPolicies) is only
  populated from a List() at controller/AuthConfig reconcile time (pod
  startup, or when the owning AuthPolicy/AuthConfig itself changes). New
  Secrets matching the selector that are created *while Authorino is already
  running* -- e.g. every key minted by the Developer Hub apikey-self-service
  scaffolder template -- are NOT picked up by any live watch/informer event:
  confirmed empirically (three separate restart cycles, including one with
  `watch` already granted on secrets -- see below) that only an Authorino
  restart makes a newly-created key start authenticating; live creation and
  even a Secret update (touching an unrelated annotation) do not.

  This Job/CronJob pair closes that gap without needing a human to notice a
  "pending" key and manually run `oc rollout restart deployment/authorino`:
  restart Authorino, but ONLY when a `kuadrant.io/apikey=true` Secret exists
  that's newer than Authorino's own pod start time -- avoids disrupting every
  OTHER AuthPolicy this single Authorino instance also enforces (neuroface,
  maas, httpbin, mcp, ...) on every tick when there's nothing new to pick up.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authorino-apikey-secret-resync
  namespace: {{ .Values.workshopGateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: authorino-apikey-secret-resync
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  # kuadrant.io/apikey=true Secrets live in every namespace an API's
  # workload/gateway does (workshop-kuadrant-apis, ai-gateway-system, ...).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  # To idempotently add the (necessary, if empirically insufficient alone --
  # see the header comment) "watch" verb to authorino-manager-role, an
  # OLM/authorino-operator-owned ClusterRole this chart doesn't otherwise own.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    resourceNames: ["authorino-manager-role"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: authorino-apikey-secret-resync
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: authorino-apikey-secret-resync
subjects:
  - kind: ServiceAccount
    name: authorino-apikey-secret-resync
    namespace: {{ .Values.workshopGateway.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: authorino-apikey-secret-resync-hook
  namespace: {{ .Values.workshopGateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 180
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: authorino-apikey-secret-resync
      containers:
        - name: resync
          image: {{ .Values.authorinoApikeySecretResync.image | default "registry.redhat.io/openshift4/ose-cli:latest" | quote }}
          command:
            - /bin/bash
            - -ec
            - |
{{ include "workshop-kuadrant-apis.authorinoResyncScript" . | indent 14 }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: authorino-apikey-secret-resync
  namespace: {{ .Values.workshopGateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  schedule: {{ .Values.authorinoApikeySecretResync.schedule | default "*/2 * * * *" | quote }}
  # Same accumulation incident as acm-argocd-openapi-fix.yaml (354 stuck Jobs
  # over 3.5 days from a missing ServiceAccount with no deadline) -- always
  # pair a CronJob against a live cluster with concurrencyPolicy/
  # startingDeadlineSeconds/activeDeadlineSeconds, not just backoffLimit.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: authorino-apikey-secret-resync
          containers:
            - name: resync
              image: {{ .Values.authorinoApikeySecretResync.image | default "registry.redhat.io/openshift4/ose-cli:latest" | quote }}
              command:
                - /bin/bash
                - -ec
                - |
{{ include "workshop-kuadrant-apis.authorinoResyncScript" . | indent 18 }}
