{{- $argoNs := include "argocd-local-users.argoNamespace" . -}}
{{- $user := .Values.localUser | default dict -}}
{{- $userName := $user.name | default "ai-agent" -}}
---
# Patches the singleton ArgoCD CR (vp-gitops) with a scoped ai-agent local user.
# spec.rbac is owned by ACM ConfigurationPolicy on spokes — do NOT set it here (race + churn).
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: {{ $argoNs }}
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  # No `| default true` on apiKey/autoRenewToken: Sprig's default() treats
  # boolean false as empty and silently replaces it with the fallback.
  # This chart's own values.yaml already defaults both to true.
  localUsers:
    - name: {{ $userName }}
      apiKey: {{ $user.apiKey }}
      login: {{ $user.login | default false }}
      tokenLifetime: {{ $user.tokenLifetime | default "720h" | quote }}
      autoRenewToken: {{ $user.autoRenewToken }}
