{{- /* No `| default true`: Sprig's default() treats boolean false as
       empty and silently replaces it with the fallback, making an
       explicit modelSeed.enabled=false override a no-op. This chart's
       own values.yaml already defaults it to true. */ -}}
{{- if .Values.modelSeed.enabled }}
{{- $ms := .Values.modelSeed -}}
---
# Grants the gitlab-system default ServiceAccount read access to the Vault
# root token secret that this pattern's own vault-operator/imperative bootstrap
# always writes to imperative/vaultkeys (standard Validated Patterns
# convention). Needed because Vault may have no "kubernetes/" auth mount +
# "secret-manager" role (only a read-only "hub/" mount used by External
# Secrets Operator) -- writing to Vault then requires the root token, not a
# Kubernetes-auth login. See docs/content/patterns/ia-computer-vision/
# scaffolding-and-secrets.adoc.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ppe-model-seed-vaultkeys-reader
  namespace: imperative
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vaultkeys"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ppe-model-seed-vaultkeys-reader
  namespace: imperative
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ppe-model-seed-vaultkeys-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: gitlab-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ppe-model-seed
  namespace: gitlab-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: seed
          image: {{ $ms.image | default "registry.redhat.io/ubi9/python-311:latest" | quote }}
          command:
            - bash
            - -c
            - |
              pip install -q boto3 2>&1 | tail -1
              python3 << 'PYEOF'
              import boto3, urllib.request, os, sys

              endpoint = os.environ["S3_ENDPOINT"]
              key = os.environ["S3_ACCESS_KEY"]
              secret = os.environ["S3_SECRET_KEY"]
              bucket = os.environ.get("S3_BUCKET", "models")
              obj_key = os.environ.get("S3_OBJECT_KEY", "ppe-detection/model/best.pt")
              model_url = os.environ.get("MODEL_URL", "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt")

              s3 = boto3.client("s3", endpoint_url=endpoint,
                  aws_access_key_id=key, aws_secret_access_key=secret,
                  region_name="us-east-1")

              try:
                  s3.head_object(Bucket=bucket, Key=obj_key)
                  print("Model already exists at s3://%s/%s -- skip" % (bucket, obj_key))
                  sys.exit(0)
              except s3.exceptions.ClientError:
                  pass

              try:
                  s3.head_bucket(Bucket=bucket)
              except s3.exceptions.ClientError:
                  s3.create_bucket(Bucket=bucket)
                  print("Created bucket %s" % bucket)

              print("Downloading %s ..." % model_url)
              urllib.request.urlretrieve(model_url, "/tmp/model.pt")
              sz = os.path.getsize("/tmp/model.pt")
              print("Downloaded: %.1f MB" % (sz / 1024 / 1024))

              s3.upload_file("/tmp/model.pt", bucket, obj_key)
              resp = s3.head_object(Bucket=bucket, Key=obj_key)
              print("Uploaded s3://%s/%s (%.1f MB)" % (bucket, obj_key, resp["ContentLength"] / 1024 / 1024))

              # Sync MinIO creds to Vault so spokes can read them via ESO.
              # Uses the root token from imperative/vaultkeys (standard VP
              # location) instead of Kubernetes-auth login -- this cluster's
              # Vault may only have a read-only "hub/" auth mount (used by
              # ESO itself), with no write-capable "kubernetes/" mount/role.
              import subprocess, json as j, base64
              vault_addr = "https://vault.vault.svc:8200"
              try:
                  k8s_token = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
                  k8s_ca = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  api = ("https://kubernetes.default.svc/api/v1/namespaces/"
                         "imperative/secrets/vaultkeys")
                  r = subprocess.run(["curl", "-sS", "--cacert", k8s_ca,
                      "-H", "Authorization: Bearer " + k8s_token, api],
                      capture_output=True, text=True, timeout=15, check=True)
                  vault_keys_secret = j.loads(r.stdout)
                  raw = vault_keys_secret["data"]["vault_data_json"]
                  vault_data = j.loads(base64.b64decode(raw))
                  root_token = vault_data.get("root_token")
                  if root_token:
                      data = {"data": {"accesskey": key, "secretkey": secret}}
                      r = subprocess.run(["curl", "-sk", "-X", "POST",
                          vault_addr + "/v1/secret/data/hub/minio-credentials",
                          "-H", "X-Vault-Token: " + root_token,
                          "-d", j.dumps(data)],
                          capture_output=True, text=True, timeout=10)
                      print("Vault minio-credentials: synced" if "version" in r.stdout else "Vault sync: %s" % r.stdout[:200])
                  else:
                      print("Vault root token not found in imperative/vaultkeys -- skipping sync")
              except Exception as e:
                  print("Vault sync skipped: %s" % e)
              PYEOF
          env:
            - name: S3_ENDPOINT
              value: {{ $ms.s3Endpoint | default "http://gitlab-minio-svc.gitlab-system.svc:9000" | quote }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $ms.s3SecretName | default "gitlab-minio-secret" | quote }}
                  key: accesskey
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $ms.s3SecretName | default "gitlab-minio-secret" | quote }}
                  key: secretkey
            - name: S3_BUCKET
              value: {{ $ms.bucket | default "models" | quote }}
            - name: S3_OBJECT_KEY
              value: {{ $ms.objectKey | default "ppe-detection/model/best.pt" | quote }}
            - name: MODEL_URL
              value: {{ $ms.modelUrl | default "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt" | quote }}
{{- end }}
