apiVersion: skupper.io/v2alpha1
kind: AccessGrant
metadata:
  name: spoke-link
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Each spoke link consumes one redemption; sync retries must not exhaust the grant.
  redemptionsAllowed: 50
  expirationWindow: 720h
