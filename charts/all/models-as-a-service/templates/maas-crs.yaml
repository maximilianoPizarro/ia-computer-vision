{{- $ext := .Values.externalModel | default dict -}}
{{- $models := $ext.models | default list -}}
{{- $credSecret := $ext.credentialSecretName | default "maas-rhdp-api-key" -}}
{{- $group := (.Values.maasGroup | default dict).name | default "maas-workshop-users" -}}
{{- $sub := .Values.subscription | default dict -}}
{{- $policy := .Values.authPolicy | default dict -}}
{{- $trl := .Values.tokenRateLimit | default dict -}}
{{- $ns := .Values.namespace -}}
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: Tenant
metadata:
  name: default-tenant
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  telemetry:
    enabled: false
---
{{- range $m := $models }}
{{- $resourceName := include "models-as-a-service.modelResourceName" $m.id -}}
apiVersion: maas.opendatahub.io/v1alpha1
kind: ExternalModel
metadata:
  name: {{ $resourceName }}
  namespace: {{ $ns }}
  labels:
    maas.redhat.com/model-id: {{ $m.id | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider: {{ $ext.provider | default "openai" | quote }}
  endpoint: {{ $ext.endpoint | quote }}
  targetModel: {{ $m.id | quote }}
  credentialRef:
    name: {{ $credSecret }}
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSModelRef
metadata:
  name: {{ $resourceName }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  modelRef:
    kind: ExternalModel
    name: {{ $resourceName }}
---
{{- end }}
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: {{ $sub.name | default "maas-workshop-subscription" }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  owner:
    groups:
      - name: {{ $group | quote }}
    users: []
  modelRefs:
{{- range $m := $models }}
    - name: {{ include "models-as-a-service.modelResourceName" $m.id }}
      namespace: {{ $ns }}
      tokenRateLimits:
        - limit: {{ $trl.limit | default 50 }}
          window: {{ $trl.window | default "1m" | quote }}
{{- end }}
  priority: {{ $sub.priority | default 10 }}
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSAuthPolicy
metadata:
  name: {{ $policy.name | default "maas-workshop-auth-policy" }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  subjects:
    groups:
      - name: {{ $group | quote }}
    users: []
  modelRefs:
{{- range $m := $models }}
    - name: {{ include "models-as-a-service.modelResourceName" $m.id }}
      namespace: {{ $ns }}
{{- end }}
