{{- /*
  Patch Authorino's Deployment with OpenShift service-CA env vars so TLS
  to the MaaS gateway works. Authorino may live in kuadrant-system (RHCL
  managed instance) or redhat-connectivity-link-operator depending on the
  install path -- discover at runtime instead of hard-failing on the wrong ns.
*/ -}}
{{- $auth := .Values.authorino | default dict -}}
{{- $preferredNs := $auth.deploymentNamespace | default "kuadrant-system" -}}
{{- $deployName := $auth.deploymentName | default "authorino" -}}
{{- $image := $auth.tlsEnvJobImage | default "registry.redhat.io/openshift4/ose-cli:latest" -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authorino-tls-env
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: models-as-a-service-authorino-tls-env
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: models-as-a-service-authorino-tls-env
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: models-as-a-service-authorino-tls-env
subjects:
  - kind: ServiceAccount
    name: authorino-tls-env
    namespace: {{ .Values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: authorino-tls-env
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "8"
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 900
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: authorino-tls-env
      containers:
        - name: patch
          image: {{ $image | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              DEPLOY_NAME="{{ $deployName }}"
              PREFERRED_NS="{{ $preferredNs }}"
              CANDIDATES="${PREFERRED_NS} kuadrant-system redhat-connectivity-link-operator"
              echo "Waiting for Deployment/${DEPLOY_NAME} (Authorino)..."
              FOUND_NS=""
              for i in $(seq 1 60); do
                for ns in ${CANDIDATES}; do
                  if oc get "deployment/${DEPLOY_NAME}" -n "${ns}" >/dev/null 2>&1; then
                    FOUND_NS="${ns}"
                    break 2
                  fi
                done
                echo "  attempt ${i}/60: not found yet"
                sleep 10
              done
              if [ -z "${FOUND_NS}" ]; then
                echo "ERROR: deployment/${DEPLOY_NAME} not found in: ${CANDIDATES}"
                exit 1
              fi
              CA=/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt
              echo "Setting Authorino TLS env vars on deployment/${DEPLOY_NAME} in ${FOUND_NS}..."
              oc set env "deployment/${DEPLOY_NAME}" \
                -n "${FOUND_NS}" \
                SSL_CERT_FILE="${CA}" \
                REQUESTS_CA_BUNDLE="${CA}"
              echo "authorino-tls-env complete."
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: authorino-tls-env
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: authorino-tls-env
          containers:
            - name: patch
              image: {{ $image | quote }}
              command:
                - /bin/bash
                - -ec
                - |
                  DEPLOY_NAME="{{ $deployName }}"
                  PREFERRED_NS="{{ $preferredNs }}"
                  CANDIDATES="${PREFERRED_NS} kuadrant-system redhat-connectivity-link-operator"
                  FOUND_NS=""
                  for ns in ${CANDIDATES}; do
                    if oc get "deployment/${DEPLOY_NAME}" -n "${ns}" >/dev/null 2>&1; then
                      FOUND_NS="${ns}"
                      break
                    fi
                  done
                  [ -z "${FOUND_NS}" ] && exit 0
                  CA=/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt
                  oc set env "deployment/${DEPLOY_NAME}" \
                    -n "${FOUND_NS}" \
                    SSL_CERT_FILE="${CA}" \
                    REQUESTS_CA_BUNDLE="${CA}" \
                    >/dev/null 2>&1 || true
