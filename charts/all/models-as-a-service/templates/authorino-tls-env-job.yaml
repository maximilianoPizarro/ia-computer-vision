{{- /*
  Make Authorino trust OpenShift ingress (router-ca) and service-CA certs.

  Kuadrant mTLS / this Job set:
    SSL_CERT_FILE=/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt
  but nothing historically mounted that path, so Authorino failed TLS when
  fetching OIDC discovery from https://sso.<apps-domain>/realms/... (route
  cert signed by ingress-operator router-ca). Swagger "Try it out" then
  surfaces Authorino 401s as a generic browser CORS "Failed to fetch".

  This Job:
  1. Builds a PEM bundle (container system CAs + router-ca + service-ca)
  2. Stores it in ConfigMap authorino-trusted-ca
  3. Patches the live Authorino CR volumes to mount the bundle at the
     SSL_CERT_FILE path above
  4. Ensures the Deployment env vars still point at that path

  Authorino may live in kuadrant-system (RHCL managed) or
  redhat-connectivity-link-operator — discover at runtime.
*/ -}}
{{- $auth := .Values.authorino | default dict -}}
{{- $preferredNs := $auth.deploymentNamespace | default "kuadrant-system" -}}
{{- $deployName := $auth.deploymentName | default "authorino" -}}
{{- $image := $auth.tlsEnvJobImage | default "registry.redhat.io/openshift4/ose-cli:latest" -}}
{{- $script := include "models-as-a-service.authorinoTlsEnvScript" . -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authorino-tls-env
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: models-as-a-service-authorino-tls-env
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["operator.authorino.kuadrant.io"]
    resources: ["authorinos"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: models-as-a-service-authorino-tls-env
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: models-as-a-service-authorino-tls-env
subjects:
  - kind: ServiceAccount
    name: authorino-tls-env
    namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: models-as-a-service-authorino-tls-env-router-ca
  namespace: openshift-ingress-operator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["router-ca"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: models-as-a-service-authorino-tls-env-router-ca
  namespace: openshift-ingress-operator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: models-as-a-service-authorino-tls-env-router-ca
subjects:
  - kind: ServiceAccount
    name: authorino-tls-env
    namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: models-as-a-service-authorino-tls-env-service-ca
  namespace: openshift-config-managed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
    resourceNames: ["openshift-service-ca.crt"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: models-as-a-service-authorino-tls-env-service-ca
  namespace: openshift-config-managed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: models-as-a-service-authorino-tls-env-service-ca
subjects:
  - kind: ServiceAccount
    name: authorino-tls-env
    namespace: {{ .Values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: authorino-tls-env
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded,HookFailed
    argocd.argoproj.io/sync-wave: "8"
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 900
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: authorino-tls-env
      containers:
        - name: patch
          image: {{ $image | quote }}
          command:
            - /bin/bash
            - -ec
            - |
{{ $script | indent 14 }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: authorino-tls-env
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: authorino-tls-env
          containers:
            - name: patch
              image: {{ $image | quote }}
              command:
                - /bin/bash
                - -ec
                - |
{{ $script | indent 18 }}
