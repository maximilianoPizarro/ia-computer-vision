{{- $vault := .Values.vault | default dict -}}
{{- $dbPath := $vault.dbSecretPath | default "secret/data/hub/models-as-a-service-db" -}}
{{- $platformPath := $vault.platformApiKeyPath | default "secret/data/hub/ai-gateway-platform-keys" -}}
{{- $ext := .Values.externalModel | default dict -}}
{{- $credSecret := $ext.credentialSecretName | default "maas-rhdp-api-key" -}}
{{- $odh := .Values.odhDashboard | default dict -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: models-as-a-service-db-credentials
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: models-as-a-service-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ $dbPath | quote }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ $dbPath | quote }}
        property: password
    - secretKey: database
      remoteRef:
        key: {{ $dbPath | quote }}
        property: database
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: maas-db-config
  namespace: {{ $odh.namespace | default "redhat-ods-applications" }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: maas-db-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DB_CONNECTION_URL: 'postgresql://{{`{{ .username }}`}}:{{`{{ .password }}`}}@models-as-a-service-postgres.{{ .Values.namespace }}.svc:5432/{{`{{ .database }}`}}?sslmode=disable'
  data:
    - secretKey: username
      remoteRef:
        key: {{ $dbPath | quote }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ $dbPath | quote }}
        property: password
    - secretKey: database
      remoteRef:
        key: {{ $dbPath | quote }}
        property: database
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $credSecret }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: {{ $credSecret }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          inference.networking.k8s.io/bbr-managed: "true"
      data:
        api-key: "{{`{{ .platformApiKey }}`}}"
  data:
    - secretKey: platformApiKey
      remoteRef:
        key: {{ $platformPath | quote }}
        property: platformApiKey
