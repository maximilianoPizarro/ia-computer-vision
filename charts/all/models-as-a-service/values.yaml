clusterDomain: ""
userCount: 30

namespace: models-as-a-service

gateway:
  namespace: openshift-ingress
  name: maas-default-gateway
  gatewayClassName: data-science-gateway-class
  hostnamePrefix: maas
  # OpenShift default router cert (always present). Prefer this over a
  # cert-manager-managed secret that this pattern does not create.
  tlsSecretName: router-certs-default
  # RHCL 1.4.1 WASM shim vs data-science-gateway-class Envoy version skew (RHPDS).
  wasmFix:
    enabled: true
    injectMaasHeaders: true

authorino:
  # Preferred namespace for Authorino Service/Deployment. On fresh RHCL installs
  # the managed Authorino instance usually lands in kuadrant-system; some
  # layouts use redhat-connectivity-link-operator. PostSync jobs discover the
  # live namespace at runtime (preferred first, then both candidates) so a
  # wrong default never creates a ports-less Service via SSA.
  serviceNamespace: kuadrant-system
  serviceName: authorino-authorino-authorization
  deploymentNamespace: kuadrant-system
  deploymentName: authorino
  tlsEnvJobImage: registry.redhat.io/openshift4/ose-cli:latest

postgres:
  image: registry.redhat.io/rhel9/postgresql-16:latest
  storage: 2Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

vault:
  dbSecretPath: secret/data/hub/models-as-a-service-db
  platformApiKeyPath: secret/data/hub/ai-gateway-platform-keys

externalModel:
  provider: openai
  endpoint: maas-rhdp.apps.maas.redhatworkshops.io
  credentialSecretName: maas-rhdp-api-key
  models:
    - id: llama-scout-17b
      displayName: Llama Scout 17B (workshop default)
    - id: granite-3-2-8b-instruct
      displayName: Granite 3.2 8B Instruct (Lightspeed default)
    - id: deepseek-r1-distill-qwen-14b
      displayName: DeepSeek R1 Distill Qwen 14B
    - id: codellama-7b-instruct
      displayName: CodeLlama 7B Instruct

maasGroup:
  name: maas-workshop-users

subscription:
  name: maas-workshop-subscription
  priority: 10

authPolicy:
  name: maas-workshop-auth-policy

tokenRateLimit:
  limit: 50
  window: 1m

odhDashboard:
  namespace: redhat-ods-applications
  name: odh-dashboard-config
