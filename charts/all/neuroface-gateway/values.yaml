clusterDomain: ""
gateway:
  replicas: 2
clusters:
  east:
    domain: ""
  west:
    domain: ""
gateway:
  weights:
    east: 50
    west: 50
  circuitBreaking:
    enabled: true
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DO_NOT_UPGRADE
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 100

kuadrant:
  enabled: false
  oidc:
    enabled: false
  ssoHost: ""
  realm: backstage
  clientId: neuroface
  realms:
    - name: neuroface
      httpRoute: neuroface-app-lb
      clientId: client-neuroface-user1
    - name: cv
      httpRoute: neuroface-cv-lb
      clientId: client-cv-user1
  rateLimit:
    predictPerMinute: 120
