clusterDomain: ""
# Hub-only installs (no east/west spokes): route neuroface.apps / neuroface-cv.apps
# to in-cluster backends instead of Skupper external services.
hubLocal:
  enabled: false
  appService: neuroface-frontend.neuroface-hub.svc.cluster.local
  cvService: yolo-ppe-serving.neuroface-cv.svc.cluster.local
gateway:
  replicas: 2
clusters:
  east:
    domain: ""
  west:
    domain: ""
gateway:
  weights:
    east: 50
    west: 50
  # Independent from `weights` (used by neuroface-app-lb) so the CV/PPE route
  # can be steered away from a broken spoke backend without also pulling the
  # main NeuroFace demo away from a spoke that's actually healthy there.
  # Defaults to the same 50/50 split; override per-cluster-group as needed.
  cvWeights:
    east: 50
    west: 50
  circuitBreaking:
    enabled: true
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DO_NOT_UPGRADE
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 100

kuadrant:
  enabled: false
  oidc:
    enabled: false
  ssoHost: ""
  # Portable alternative to ssoHost above -- prefix only (default "sso"),
  # must match developer-hub.ssoHostPrefix and every other chart referencing
  # this pattern's shared SSO hostname (see rhbk-iam/values.yaml).
  ssoHostPrefix: "sso"
  realm: backstage
  clientId: neuroface
  realms:
    - name: neuroface
      httpRoute: neuroface-app-lb
      clientId: client-neuroface-user1
    - name: cv
      httpRoute: neuroface-cv-lb
      clientId: client-cv-user1
      # neuroface-cv-lb serves no browsable frontend (every rule rewrites to an
      # API path) -- it's consumed with a Bearer token, not an interactive
      # browser login. OIDCPolicy's redirect-to-login flow doesn't apply here
      # and its lack of a `when` field breaks CORS preflight for any
      # custom-header request (see workshop-kuadrant-apis' AuthPolicy `when`
      # exemptions for the equivalent fix on the other routes). Use a plain
      # AuthPolicy + identity.jwt instead: same issuer/JWKS validation, no
      # redirect, and it supports `when` to exempt OPTIONS.
      redirectAuth: false
  rateLimit:
    predictPerMinute: 120
