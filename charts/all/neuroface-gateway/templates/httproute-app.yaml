{{- if or .Values.clusters.east.domain .Values.clusters.west.domain }}
{{- $w := .Values.gateway.weights | default dict }}
{{- $host := printf "neuroface.%s" (include "neuroface-gateway.clusterDomain" .) }}
{{- $devHubOrigin := printf "https://developer-hub.%s" (include "neuroface-gateway.clusterDomain" .) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: neuroface-app-lb
  namespace: neuroface-gateway-system
  labels:
    backstage.io/kubernetes-id: neuroface-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: neuroface-gateway
      namespace: neuroface-gateway-system
  hostnames:
    - {{ $host }}
  rules:
    {{- if and .Values.clusters.east.domain .Values.clusters.west.domain }}
    - timeouts:
        request: 120s
        backendRequest: 120s
      # Lets the RHDH-embedded Swagger UI (served from developer-hub.<domain>) call
      # this cross-origin API via "Try it out". Covers CORS-safelisted ("simple")
      # requests only -- e.g. GET /health, GET / -- since Envoy just forwards
      # OPTIONS straight to the backend today instead of answering a real preflight.
      # Requests with custom headers (e.g. Authorization: Bearer on /api/v1/chat)
      # still need a real preflight responder to work from a browser.
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Access-Control-Allow-Origin
                value: {{ $devHubOrigin | quote }}
              - name: Access-Control-Allow-Methods
                value: "GET, POST, OPTIONS"
              - name: Access-Control-Allow-Headers
                value: "Authorization, Content-Type, Accept"
      backendRefs:
        - name: neuroface-app-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-app-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    {{- else if .Values.clusters.east.domain }}
    - timeouts:
        request: 120s
        backendRequest: 120s
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Access-Control-Allow-Origin
                value: {{ $devHubOrigin | quote }}
              - name: Access-Control-Allow-Methods
                value: "GET, POST, OPTIONS"
              - name: Access-Control-Allow-Headers
                value: "Authorization, Content-Type, Accept"
      backendRefs:
        - name: neuroface-app-east
          port: 8080
          weight: 100
    {{- else if .Values.clusters.west.domain }}
    - timeouts:
        request: 120s
        backendRequest: 120s
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Access-Control-Allow-Origin
                value: {{ $devHubOrigin | quote }}
              - name: Access-Control-Allow-Methods
                value: "GET, POST, OPTIONS"
              - name: Access-Control-Allow-Headers
                value: "Authorization, Content-Type, Accept"
      backendRefs:
        - name: neuroface-app-west
          port: 8080
          weight: 100
    {{- end }}
{{- end }}
