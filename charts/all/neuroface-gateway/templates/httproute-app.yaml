{{- if or .Values.clusters.east.domain .Values.clusters.west.domain }}
{{- $w := .Values.gateway.weights | default dict }}
{{- $host := printf "neuroface.%s" (include "neuroface-gateway.clusterDomain" .) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: neuroface-app-lb
  namespace: neuroface-gateway-system
  labels:
    backstage.io/kubernetes-id: neuroface-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: neuroface-gateway
      namespace: neuroface-gateway-system
  hostnames:
    - {{ $host }}
  rules:
    {{- if and .Values.clusters.east.domain .Values.clusters.west.domain }}
    - timeouts:
        request: 120s
        backendRequest: 120s
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-app-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-app-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    {{- else if .Values.clusters.east.domain }}
    - timeouts:
        request: 120s
        backendRequest: 120s
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-app-east
          port: 8080
          weight: 100
    {{- else if .Values.clusters.west.domain }}
    - timeouts:
        request: 120s
        backendRequest: 120s
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-app-west
          port: 8080
          weight: 100
    {{- end }}
{{- end }}
