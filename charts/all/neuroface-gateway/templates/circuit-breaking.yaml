{{- $cb := .Values.gateway.circuitBreaking | default dict }}
{{- if ne (toString (index $cb "enabled" | default true)) "false" }}
{{- $cp := $cb.connectionPool | default dict }}
{{- $cpTcp := $cp.tcp | default dict }}
{{- $cpHttp := $cp.http | default dict }}
{{- $od := $cb.outlierDetection | default dict }}

{{- $backends := list }}
{{- if .Values.clusters.east.domain }}
  {{- $backends = append $backends "neuroface-cv-east" }}
  {{- $backends = append $backends "neuroface-app-east" }}
{{- end }}
{{- if .Values.clusters.west.domain }}
  {{- $backends = append $backends "neuroface-cv-west" }}
  {{- $backends = append $backends "neuroface-app-west" }}
{{- end }}

{{- range $i, $svc := $backends }}
{{- if $i }}
---
{{- end }}
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: cb-{{ $svc }}
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  host: {{ $svc }}.service-interconnect.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
    connectionPool:
      tcp:
        maxConnections: {{ $cpTcp.maxConnections | default 100 }}
      http:
        h2UpgradePolicy: {{ $cpHttp.h2UpgradePolicy | default "DO_NOT_UPGRADE" }}
        maxRequestsPerConnection: {{ $cpHttp.maxRequestsPerConnection | default 10 }}
    outlierDetection:
      consecutive5xxErrors: {{ $od.consecutive5xxErrors | default 1 }}
      consecutiveGatewayErrors: {{ $od.consecutiveGatewayErrors | default 1 }}
      interval: {{ $od.interval | default "5s" }}
      baseEjectionTime: {{ $od.baseEjectionTime | default "60s" }}
      maxEjectionPercent: {{ $od.maxEjectionPercent | default 100 }}
{{- end }}
{{- end }}
