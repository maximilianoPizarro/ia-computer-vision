{{- $cb := .Values.gateway.circuitBreaking | default dict }}
{{- if ne (toString (index $cb "enabled" | default true)) "false" }}
{{- $cp := $cb.connectionPool | default dict }}
{{- $cpTcp := $cp.tcp | default dict }}
{{- $cpHttp := $cp.http | default dict }}
{{- $od := $cb.outlierDetection | default dict }}

{{- $backends := list }}
{{- if .Values.clusters.east.domain }}
  {{- $backends = append $backends "neuroface-cv-east" }}
  {{- $backends = append $backends "neuroface-app-east" }}
{{- end }}
{{- if .Values.clusters.west.domain }}
  {{- $backends = append $backends "neuroface-cv-west" }}
  {{- $backends = append $backends "neuroface-app-west" }}
{{- end }}

{{- range $i, $svc := $backends }}
{{- if $i }}
---
{{- end }}
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: cb-{{ $svc }}
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  host: {{ $svc }}.service-interconnect.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
    connectionPool:
      tcp:
        maxConnections: {{ $cpTcp.maxConnections | default 100 }}
      http:
        h2UpgradePolicy: {{ $cpHttp.h2UpgradePolicy | default "DO_NOT_UPGRADE" }}
        maxRequestsPerConnection: {{ $cpHttp.maxRequestsPerConnection | default 10 }}
    outlierDetection:
      # consecutive5xxErrors/consecutiveGatewayErrors: 1 + maxEjectionPercent:
      # 100 meant a SINGLE 5xx/gateway-error response (from either backend, on
      # any path, even a transient one) immediately ejected that host for a
      # full minute -- and with only 2 backends (east/west), both could end up
      # ejected around the same time, leaving zero healthy upstream ("503 no
      # healthy upstream") for the full baseEjectionTime, on every path
      # including /health. Require a few consecutive failures before ejecting
      # (filters out one-off blips) and cap ejection at 50% so at least one
      # backend always stays in rotation for a 2-replica setup.
      consecutive5xxErrors: {{ $od.consecutive5xxErrors | default 5 }}
      consecutiveGatewayErrors: {{ $od.consecutiveGatewayErrors | default 5 }}
      interval: {{ $od.interval | default "5s" }}
      baseEjectionTime: {{ $od.baseEjectionTime | default "30s" }}
      maxEjectionPercent: {{ $od.maxEjectionPercent | default 50 }}
{{- end }}
{{- end }}
