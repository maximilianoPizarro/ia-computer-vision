{{- if or .Values.clusters.east.domain .Values.clusters.west.domain }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: neuroface-cv-lb
  namespace: neuroface-gateway-system
  labels:
    backstage.io/kubernetes-id: neuroface-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: neuroface-gateway
      namespace: neuroface-gateway-system
  hostnames:
    - neuroface-cv.{{ include "neuroface-gateway.clusterDomain" . }}
  rules:
    {{- $w := .Values.gateway.cvWeights | default .Values.gateway.weights | default dict }}
    {{/* Sprig's "default" treats 0 as empty, so "$w.east | default 50" would
         wrongly turn an intentional weight of 0 back into 50 -- resolve once
         here with an explicit hasKey check instead. */}}
    {{- $eastWeight := 50 }}
    {{- if hasKey $w "east" }}{{- $eastWeight = $w.east }}{{- end }}
    {{- $westWeight := 50 }}
    {{- if hasKey $w "west" }}{{- $westWeight = $w.west }}{{- end }}
    {{- if and .Values.clusters.east.domain .Values.clusters.west.domain }}
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $eastWeight }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $westWeight }}
    - matches:
        - path:
            type: Exact
            value: /api/ppe/status
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $eastWeight }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $westWeight }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe/v1/predict
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/predict
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $eastWeight }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $westWeight }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $eastWeight }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $westWeight }}
    - matches:
        - path:
            type: PathPrefix
            value: /health
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $eastWeight }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $westWeight }}
    - matches:
        - path:
            type: PathPrefix
            value: /v1/predict
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $eastWeight }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $westWeight }}
    - filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $eastWeight }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $westWeight }}
    {{- else if .Values.clusters.east.domain }}
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    - matches:
        - path:
            type: Exact
            value: /api/ppe/status
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe/v1/predict
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/predict
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    - filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    {{- else if .Values.clusters.west.domain }}
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    - matches:
        - path:
            type: Exact
            value: /api/ppe/status
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe/v1/predict
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/predict
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    - filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    {{- end }}
{{- end }}
