{{- if or .Values.clusters.east.domain .Values.clusters.west.domain }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: neuroface-cv-lb
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: neuroface-gateway
      namespace: neuroface-gateway-system
  hostnames:
    - neuroface-cv.{{ include "neuroface-gateway.clusterDomain" . }}
  rules:
    {{- $w := .Values.gateway.weights | default dict }}
    {{- if and .Values.clusters.east.domain .Values.clusters.west.domain }}
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    - matches:
        - path:
            type: Exact
            value: /api/ppe/status
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe/v1/predict
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/predict
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    - matches:
        - path:
            type: PathPrefix
            value: /v1/predict
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    - backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: {{ $w.east | default 50 }}
        - name: neuroface-cv-west
          port: 8080
          weight: {{ $w.west | default 50 }}
    {{- else if .Values.clusters.east.domain }}
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    - matches:
        - path:
            type: Exact
            value: /api/ppe/status
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe/v1/predict
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/predict
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe
      backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    - backendRefs:
        - name: neuroface-cv-east
          port: 8080
          weight: 100
    {{- else if .Values.clusters.west.domain }}
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    - matches:
        - path:
            type: Exact
            value: /api/ppe/status
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe/v1/predict
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/predict
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    - matches:
        - path:
            type: PathPrefix
            value: /api/ppe
      backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    - backendRefs:
        - name: neuroface-cv-west
          port: 8080
          weight: 100
    {{- end }}
{{- end }}
