{{- if .Values.kuadrant.enabled | default false }}
{{- $ssoHost := .Values.kuadrant.ssoHost | default (printf "sso.%s" (include "neuroface-gateway.clusterDomain" .)) -}}
{{- $realm := .Values.kuadrant.realm | default "backstage" -}}
{{- $clientId := .Values.kuadrant.clientId | default "neuroface" -}}
{{- $appHost := printf "neuroface.%s" (include "neuroface-gateway.clusterDomain" .) -}}
apiVersion: extensions.kuadrant.io/v1alpha1
kind: OIDCPolicy
metadata:
  name: neuroface-oidc
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  provider:
    issuerURL: "https://{{ $ssoHost }}/realms/{{ $realm }}"
    clientID: {{ $clientId | quote }}
    {{- if .Values.kuadrant.clientSecret }}
    clientSecret: {{ .Values.kuadrant.clientSecret | quote }}
    {{- end }}
    authorizationEndpoint: "https://{{ $ssoHost }}/realms/{{ $realm }}/protocol/openid-connect/auth"
    tokenEndpoint: "https://{{ $ssoHost }}/realms/{{ $realm }}/protocol/openid-connect/token"
    redirectURI: "https://{{ $appHost }}/auth/callback"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuroface-app-lb
  auth:
    tokenSource:
      authorizationHeader:
        prefix: Bearer
        name: Authorization
      cookie:
        name: jwt
{{- end }}
