{{- if eq (.Values.hubLocal.enabled | toString | default "false") "true" }}
{{- $host := printf "neuroface.%s" (include "neuroface-gateway.clusterDomain" .) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: neuroface-app-lb
  namespace: neuroface-gateway-system
  labels:
    backstage.io/kubernetes-id: neuroface-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: neuroface-gateway
      namespace: neuroface-gateway-system
  hostnames:
    - {{ $host }}
  rules:
    - timeouts:
        request: 120s
        backendRequest: 120s
      filters:
        {{- include "neuroface-gateway.corsFilter" . | nindent 8 }}
      backendRefs:
        - name: neuroface-app-hub
          port: 8080
          weight: 100
{{- end }}
