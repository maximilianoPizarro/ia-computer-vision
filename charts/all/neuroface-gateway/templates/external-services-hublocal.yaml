{{- if eq (.Values.hubLocal.enabled | toString | default "false") "true" }}
apiVersion: v1
kind: Service
metadata:
  name: neuroface-app-hub
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ExternalName
  externalName: {{ .Values.hubLocal.appService | default "neuroface-frontend.neuroface-hub.svc.cluster.local" }}
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: neuroface-cv-hub
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ExternalName
  externalName: {{ .Values.hubLocal.cvService | default "yolo-ppe-serving.neuroface-cv.svc.cluster.local" }}
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
{{- end }}
