{{- if .Values.kuadrant.enabled | default false }}
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: neuroface-cv-ratelimit
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: neuroface-cv-lb
  limits:
    predict-free:
      when:
        - predicate: 'request.path.matches("^/v1/predict")'
        - predicate: 'has(auth.identity) && has(auth.identity.plan) && auth.identity.plan == "free"'
      counters:
        - expression: auth.identity.sub
      rates:
        - limit: 100
          window: 1h
    predict-gold:
      when:
        - predicate: 'request.path.matches("^/v1/predict")'
        - predicate: 'has(auth.identity) && has(auth.identity.plan) && auth.identity.plan == "gold"'
      counters:
        - expression: auth.identity.sub
      rates:
        - limit: 500
          window: 1h
    predict-default:
      when:
        - predicate: 'request.path.matches("^/v1/predict")'
        - predicate: '!(has(auth.identity) && has(auth.identity.plan))'
      counters:
        # Single quotes required: limitador's descriptor file serialization mangles a
        # nested double-quoted string literal inside a double-quoted CEL expression,
        # causing "Invalid limit file" parse errors and CrashLoopBackOff.
        - expression: request.headers['x-forwarded-for']
      rates:
        - limit: {{ .Values.kuadrant.rateLimit.predictPerMinute | default 30 }}
          window: 1m
{{- end }}
