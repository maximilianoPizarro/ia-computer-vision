{{- /*
  The Kuadrant Operator (rhcl-operator subscription, OLM-installed early and
  independently of Argo CD sync waves) checks ONCE at its own pod startup
  whether a Gateway API provider (Istio) is installed. On a from-scratch
  cluster the operator pod frequently starts before Service Mesh/Istio
  (servicemesh-config, sync-wave 5) has finished installing, and it does
  NOT re-check on its own -- every AuthPolicy/RateLimitPolicy in the cluster
  gets stuck "Invalid (Not Accepted)" with condition message:
    "[Gateway API provider (istio / envoy gateway)] is not installed,
     please restart Kuadrant Operator pod once dependency has been installed"
  This PostSync hook (running at neuroface-gateway's own sync-wave, after
  servicemesh-config) waits for the "istio" GatewayClass to be Accepted,
  then unconditionally rolls the Kuadrant + Limitador operator deployments
  so they redo their dependency check with Istio already present. This is
  a single cluster-wide fix -- it only needs to run from one app/wave, not
  from every app that creates AuthPolicy/RateLimitPolicy resources.

  Important: AuthPolicies from other apps may appear AFTER this hook starts.
  The verify loop waits for at least one AuthPolicy to exist, then retries
  operator restarts until all are Accepted (or deadline).
*/ -}}
{{- if eq (.Values.kuadrant.enabled | toString) "true" }}

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: neuroface-gateway-kuadrant-readiness
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kuadrant.io"]
    resources: ["authpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: neuroface-gateway-kuadrant-readiness
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: neuroface-gateway-kuadrant-readiness
subjects:
  - kind: ServiceAccount
    name: neuroface-gateway-kuadrant-readiness
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neuroface-gateway-kuadrant-readiness
  namespace: redhat-connectivity-link-operator
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neuroface-gateway-kuadrant-readiness
  namespace: redhat-connectivity-link-operator
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neuroface-gateway-kuadrant-readiness
subjects:
  - kind: ServiceAccount
    name: neuroface-gateway-kuadrant-readiness
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neuroface-gateway-kuadrant-readiness
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kuadrant-operator-readiness
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 1200
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      annotations:
        # Ambient mesh / sidecar would keep the Job "Running" after the
        # main container exits and break the verify loop retries.
        sidecar.istio.io/inject: "false"
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": false }'
    spec:
      serviceAccountName: neuroface-gateway-kuadrant-readiness
      restartPolicy: Never
      containers:
        - name: wait-and-restart
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              NS=redhat-connectivity-link-operator
              DEP=kuadrant-operator-controller-manager
              LIM=limitador-operator-controller-manager

              count_invalid_authpolicies() {
                # Prefer jq when present; fall back to python one-liner with NO leading indent
                # (YAML-indented python -c strings previously IndentationError'd every check).
                if command -v jq >/dev/null 2>&1; then
                  oc get authpolicy -A -o json 2>/dev/null | jq '[.items[] | select((.status.conditions // []) | map(select(.type=="Accepted")) | .[0].status != "True")] | length'
                else
                  # Must stay one physical line: a bare "for ..." at column 0 ends the YAML | block.
                  oc get authpolicy -A -o json 2>/dev/null | python3 -c 'import json,sys;d=json.load(sys.stdin);print(sum(1 for i in d.get("items",[]) if next((c for c in (i.get("status") or {}).get("conditions") or [] if c.get("type")=="Accepted"),{}).get("status")!="True"))'
                fi
              }

              count_authpolicies() {
                oc get authpolicy -A --no-headers 2>/dev/null | wc -l | tr -d ' '
              }

              restart_kuadrant() {
                echo "Restarting $DEP (+ $LIM) in $NS..."
                oc rollout restart "deployment/$DEP" -n "$NS" || true
                oc rollout restart "deployment/$LIM" -n "$NS" || true
                oc rollout status "deployment/$DEP" -n "$NS" --timeout=180s || true
              }

              echo "Waiting for Istio GatewayClass to be Accepted..."
              for i in $(seq 1 60); do
                STATUS=$(oc get gatewayclass istio -o jsonpath='{.status.conditions[?(@.type=="Accepted")].status}' 2>/dev/null || echo "")
                if [ "$STATUS" = "True" ]; then
                  echo "Istio GatewayClass Accepted."
                  break
                fi
                if [ "$i" -eq 60 ]; then
                  echo "Istio GatewayClass not Accepted after 10 minutes -- restarting Kuadrant anyway."
                fi
                sleep 10
              done

              restart_kuadrant

              echo "Waiting for AuthPolicy resources to appear (other apps may sync later)..."
              for i in $(seq 1 36); do
                TOTAL=$(count_authpolicies || echo 0)
                if [ "${TOTAL:-0}" -gt 0 ]; then
                  echo "Found $TOTAL AuthPolicy resource(s)."
                  break
                fi
                sleep 10
              done

              echo "Verifying AuthPolicy resources are Accepted (retry Kuadrant restart if needed)..."
              for attempt in $(seq 1 6); do
                sleep 20
                TOTAL=$(count_authpolicies || echo 0)
                if [ "${TOTAL:-0}" -eq 0 ]; then
                  echo "Attempt $attempt/6: no AuthPolicies yet -- waiting..."
                  continue
                fi
                INVALID=$(count_invalid_authpolicies 2>/dev/null || echo "999")
                # Strip whitespace/newlines
                INVALID=$(echo "$INVALID" | tr -d '[:space:]')
                if [ "$INVALID" = "0" ]; then
                  echo "All AuthPolicy resources Accepted."
                  oc get authpolicy -A -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name,ACCEPTED:.status.conditions[0].status,REASON:.status.conditions[0].reason || true
                  exit 0
                fi
                echo "Attempt $attempt/6: $INVALID/$TOTAL AuthPolicy(ies) not Accepted -- restarting Kuadrant only..."
                # Delete ONLY the kuadrant-operator pod (do not nuke authorino/dns/limitador via shared labels)
                oc delete pod -n "$NS" -l app.kubernetes.io/name=kuadrant-operator --ignore-not-found || \
                  oc get pods -n "$NS" -o name | grep kuadrant-operator-controller | xargs -r oc delete -n "$NS" --force --grace-period=0 || true
                oc rollout status "deployment/$DEP" -n "$NS" --timeout=180s || true
              done

              echo "WARNING: some AuthPolicy resources still not Accepted after retries."
              oc get authpolicy -A -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name,ACCEPTED:.status.conditions[0].status,REASON:.status.conditions[0].reason || true
              # Non-zero so Argo surfaces the hook failure; do not thrash (restartPolicy: Never).
              exit 1
{{- end }}
