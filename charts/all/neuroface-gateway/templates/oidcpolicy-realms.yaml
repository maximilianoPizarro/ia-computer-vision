{{- if .Values.kuadrant.enabled | default false }}
{{- $root := . -}}
{{- $ssoHost := .Values.kuadrant.ssoHost | default (printf "%s.%s" (.Values.kuadrant.ssoHostPrefix | default "sso") (include "neuroface-gateway.clusterDomain" .)) -}}
{{- range .Values.kuadrant.realms | default list }}
{{- if and (ne .redirectAuth false) (ne (printf "%v" .redirectAuth) "false") }}
{{- $realm := .name -}}
{{- $httpRoute := .httpRoute | default "neuroface-app-lb" -}}
{{- $clientId := .clientId | default (printf "client-%s-user1" $realm) -}}
{{- $appHost := printf "neuroface.%s" (include "neuroface-gateway.clusterDomain" $root) -}}
{{- if eq $realm "cv" }}
{{- $appHost = printf "neuroface-cv.%s" (include "neuroface-gateway.clusterDomain" $root) -}}
{{- end }}
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: OIDCPolicy
metadata:
  name: oidc-{{ $realm }}
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    issuerURL: "https://{{ $ssoHost }}/realms/{{ $realm }}"
    clientID: {{ $clientId | quote }}
    {{- if .clientSecret }}
    clientSecret: {{ .clientSecret | quote }}
    {{- end }}
    authorizationEndpoint: "https://{{ $ssoHost }}/realms/{{ $realm }}/protocol/openid-connect/auth"
    tokenEndpoint: "https://{{ $ssoHost }}/realms/{{ $realm }}/protocol/openid-connect/token"
    redirectURI: "https://{{ $appHost }}/auth/callback"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ $httpRoute }}
  auth:
    tokenSource:
      authorizationHeader:
        prefix: Bearer
        name: Authorization
      cookie:
        name: jwt
{{ end -}}
{{- end }}
{{- range .Values.kuadrant.realms | default list }}
{{- if or (eq .redirectAuth false) (eq (printf "%v" .redirectAuth) "false") }}
{{- $realm := .name -}}
{{- $httpRoute := .httpRoute | default "neuroface-app-lb" -}}
{{/*
  Authorino requires issuerUrl to equal the JWT "iss" claim exactly.
  Keycloak CR hostname is sso.<apps-domain> (values-hub:
  keycloak.ingress.hostname), so tokens carry iss=https://sso.../realms/<r>.
  Using keycloak.<domain> here rejects every valid SSO-issued token with 401
  (Swagger UI then surfaces it as a generic CORS "Failed to fetch").
  Override per-realm with .issuerHost only if you intentionally keep a
  different Keycloak canonical hostname.
*/}}
{{- $issuerHost := .issuerHost | default $ssoHost -}}
---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: authpolicy-{{ $realm }}
  namespace: neuroface-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ $httpRoute }}
  # Exempt CORS preflight from auth: browsers can't attach a Bearer token to
  # an OPTIONS preflight, and a non-2xx preflight response fails CORS
  # entirely (the real, authenticated request would never even be sent).
  when:
    - predicate: request.method != "OPTIONS"
  rules:
    authentication:
      jwt-users:
        jwt:
          issuerUrl: "https://{{ $issuerHost }}/realms/{{ $realm }}"
    response:
      success:
        headers:
          x-auth-client-id:
            plain:
              expression: "has(auth.identity.client_id) ? auth.identity.client_id : auth.identity.azp"
          x-auth-metadata:
            json:
              properties:
                client_id:
                  expression: "has(auth.identity.client_id) ? auth.identity.client_id : auth.identity.azp"
                sub:
                  expression: auth.identity.sub
                iss:
                  expression: auth.identity.iss
{{- end }}
{{- end }}
{{- end }}
