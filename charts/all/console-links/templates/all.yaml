    imageURL: {{ include "console-links.iconURL" (dict "root" . "icon" "kiali.svg") | quote }}
    section: "Platform AI Computer Vision"
  href: "https://kiali-istio-system.{{ $hubDomain }}"
  location: ApplicationMenu
  text: "Kiali Service Mesh"
{{- /*
Values.yaml already defaults skupperConsole.enabled to true -- do NOT wrap
this in `| default true`: Helm/Sprig's `default` treats the boolean `false`
as an empty value and silently replaces it back with `true`, which is
exactly the class of bug that made overriding this to `false` a no-op.
*/ -}}
{{- if .Values.skupperConsole.enabled }}
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: platform-skupper-console
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  applicationMenu:
    imageURL: {{ include "console-links.iconURL" (dict "root" . "icon" "skupper.svg") | quote }}
    section: "Platform AI Computer Vision"
  href: "https://skupper-network-observer-service-interconnect.{{ $domain }}"
  location: ApplicationMenu
  text: "Skupper Console (Network)"
{{- end }}
