{{- $g := .Values.global | default dict -}}
{{- $domain := .Values.clusterDomain | default $g.localClusterDomain | default $g.hubClusterDomain | default "apps.cluster.example.com" -}}
{{- $hubDomain := .Values.hubClusterDomain | default $g.hubClusterDomain | default $domain -}}
{{- $role := .Values.clusterRole -}}
{{- if not $role -}}
{{- if and $g.localClusterDomain $g.hubClusterDomain (ne $g.localClusterDomain $g.hubClusterDomain) -}}
{{- $role = "spoke" -}}
{{- else -}}
{{- $role = "hub" -}}
{{- end -}}
{{- end -}}
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: platform-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  applicationMenu:
    imageURL: {{ include "console-links.iconURL" (dict "root" . "icon" "grafana.svg") | quote }}
    section: "Platform AI Computer Vision"
  {{- if eq $role "hub" }}
  href: "https://grafana.{{ $hubDomain }}"
  {{- else }}
  href: "https://grafana.{{ $domain }}"
  {{- end }}
  location: ApplicationMenu
  text: "Grafana Dashboards"
