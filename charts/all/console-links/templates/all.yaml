{{- /*
No ConsoleLink is created here for the OpenShift AI dashboard: the RHOAI
operator auto-creates its own cluster-scoped ConsoleLink ("rhodslink",
owned by components.platform.opendatahub.io) pointing at the dashboard's
pretty route (rh-ai.apps.<domain>). Adding another one here just duplicated
the "OpenShift AI Dashboard" entry in the application launcher menu.
*/ -}}
{{- $g := .Values.global | default dict -}}
{{- $domain := include "console-links.clusterDomain" . -}}
{{- $hubDomain := .Values.hubClusterDomain | default $g.hubClusterDomain | default $domain -}}
{{- $domainBase := include "console-links.domainBase" . -}}
{{- $hubDomainBase := include "console-links.hubDomainBase" . -}}
{{- $role := .Values.clusterRole -}}
{{- if not $role -}}
{{- if and $g.localClusterDomain $g.hubClusterDomain (ne $g.localClusterDomain $g.hubClusterDomain) -}}
{{- $role = "spoke" -}}
{{- else -}}
{{- $role = "hub" -}}
{{- end -}}
{{- end -}}
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: platform-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  applicationMenu:
    imageURL: {{ include "console-links.iconURL" (dict "root" . "icon" "grafana.svg") | quote }}
    section: "Platform AI Computer Vision"
  {{- if eq $role "hub" }}
  href: "https://grafana.{{ $hubDomain }}"
  {{- else }}
  href: "https://grafana.{{ $domain }}"
  {{- end }}
  location: ApplicationMenu
  text: "Grafana Dashboards"
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: platform-kiali
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
