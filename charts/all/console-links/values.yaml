clusterDomain: ""
hubClusterDomain: ""
clusterRole: ""
# Skupper network observer Route (charts/all/skupper-network-observer). Disable
# when Skupper is not deployed (e.g. values-hub-only.yaml disables the observer).
skupperConsole:
  enabled: true
# Kafka Streams Console (charts/all/kafka-console). On the hub role this is
# only relevant for hub-only installs that run Kafka locally (values-hub-only.yaml
# sets this true); spokes always show it unconditionally (Kafka is always local there).
kafkaConsole:
  enabled: false
# Portable prefix (default "sso") for the "Keycloak (SSO)" link -- must match
# developer-hub.ssoHostPrefix and every other chart referencing this
# pattern's shared SSO hostname (see rhbk-iam/values.yaml).
ssoHostPrefix: "sso"
quay:
  enabled: false
