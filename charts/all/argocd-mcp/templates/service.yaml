{{- if eq (.Values.clusterRole | default "hub") "hub" }}
{{- $ns := .Values.namespace | default "argocd-mcp" -}}
{{- $port := (.Values.mcp | default dict).port | default 3000 -}}
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-mcp
  namespace: {{ $ns }}
  labels:
    app: argocd-mcp
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: ClusterIP
  selector:
    app: argocd-mcp
  ports:
    - name: http
      port: {{ $port }}
      targetPort: http
      protocol: TCP
{{- end }}
