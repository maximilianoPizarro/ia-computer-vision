{{- if eq (.Values.clusterRole | default "hub") "hub" }}
{{- $ns := .Values.namespace | default "argocd-mcp" -}}
{{- $vaultKey := (.Values.vault | default dict).tokensDataPath | default "secret/data/hub/argocd-mcp-tokens" -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-mcp-hub-creds
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: argocd-mcp-hub-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ARGOCD_BASE_URL: "{{`{{ .hubUrl }}`}}"
        ARGOCD_API_TOKEN: "{{`{{ .hubToken }}`}}"
  data:
    - secretKey: hubUrl
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: hub-url
    - secretKey: hubToken
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: hub-token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-mcp-token-registry
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: argocd-mcp-token-registry
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        token-registry.json: |
          [
            {"baseUrl": "{{`{{ .hubUrl }}`}}", "token": "{{`{{ .hubToken }}`}}"},
            {"baseUrl": "{{`{{ .eastUrl }}`}}", "token": "{{`{{ .eastToken }}`}}"},
            {"baseUrl": "{{`{{ .westUrl }}`}}", "token": "{{`{{ .westToken }}`}}"}
          ]
  data:
    - secretKey: hubUrl
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: hub-url
    - secretKey: hubToken
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: hub-token
    - secretKey: eastUrl
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: east-url
    - secretKey: eastToken
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: east-token
    - secretKey: westUrl
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: west-url
    - secretKey: westToken
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: west-token
{{- end }}
