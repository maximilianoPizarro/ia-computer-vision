{{- if eq (.Values.llm.credentialsEnabled | toString | default "true") "false" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.llm.localCredentialsSecretName | default "gpu-vllm-local-credentials" }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  # OLSConfig requires credentialsSecretRef; local vLLM needs no auth token.
  apitoken: ""
{{- end }}
