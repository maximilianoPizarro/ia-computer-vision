{{- $vaultKey := .Values.llm.vaultPlatformApiKeyPath | default "secret/data/hub/ai-gateway-platform-keys" -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: workshop-ai-gateway-credentials
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: workshop-ai-gateway-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # OLSConfig's Secret contract: the key must be literally "apitoken"
        # regardless of what the upstream LLM provider calls it.
        apitoken: "{{`{{ .platformApiKey }}`}}"
  data:
    - secretKey: platformApiKey
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: platformApiKey
