{{- $aiGatewayUrl := include "openshift-lightspeed.aiGatewayUrl" . -}}
{{- $providerName := .Values.llm.providerName | default "workshop-ai-gateway" -}}
{{- $model := .Values.llm.model | default "llama-scout-17b" -}}
{{- $credEnabled := ne (.Values.llm.credentialsEnabled | toString | default "true") "false" -}}
{{- $credSecret := .Values.llm.credentialsSecretName | default "workshop-ai-gateway-credentials" -}}
{{- if not $credEnabled -}}
{{- $credSecret = .Values.llm.localCredentialsSecretName | default "gpu-vllm-local-credentials" -}}
{{- end -}}
---
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  llm:
    providers:
      - name: {{ $providerName | quote }}
        type: openai
        credentialsSecretRef:
          name: {{ $credSecret | quote }}
        url: {{ $aiGatewayUrl | quote }}
        models:
          - name: {{ $model | quote }}
            {{- $ctxWin := int (.Values.llm.contextWindowSize | default 0) }}
            {{- if gt $ctxWin 0 }}
            contextWindowSize: {{ $ctxWin }}
            {{- end }}
            {{- $maxResp := int (.Values.llm.maxTokensForResponse | default 0) }}
            {{- $toolRatio := .Values.llm.toolBudgetRatio | default 0 }}
            {{- if or (gt $maxResp 0) (gt ($toolRatio | float) 0.0) }}
            parameters:
              {{- if gt $maxResp 0 }}
              maxTokensForResponse: {{ $maxResp }}
              {{- end }}
              {{- if gt ($toolRatio | float) 0.0 }}
              toolBudgetRatio: {{ $toolRatio }}
              {{- end }}
            {{- end }}
  ols:
    defaultProvider: {{ $providerName | quote }}
    defaultModel: {{ $model | quote }}
  # Argo CD MCP requires the MCPServer feature gate.
  featureGates:
    - MCPServer
  mcpServers:
{{- range $srv := .Values.mcpServers }}
    - name: {{ $srv.name | quote }}
      url: {{ $srv.url | quote }}
      {{- if $srv.timeout }}
      timeout: {{ $srv.timeout }}
      {{- end }}
{{- end }}
