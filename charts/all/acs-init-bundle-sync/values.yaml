clusterDomain: ""
initBundleSync:
  enabled: true
  centralEndpoint: central.stackrox.svc:443
  clusters: "hub,east,west"
  schedule: "0 */12 * * *"
  image: registry.redhat.io/advanced-cluster-security/rhacs-roxctl-rhel9:4.11.0
  cliImage: registry.redhat.io/rhel9/support-tools:latest
  maxRetries: 12
  retryInterval: 30
  # ACS Central auto-generated admin password secret.
  # Set passwordSecret.name to "acs-init-credentials" and .key to
  # "ROX_ADMIN_PASSWORD" to use a manually created secret instead.
  passwordSecret:
    name: central-htpasswd
    key: password
