{{- $ns := .Values.namespace -}}
{{- $ext := .Values.external | default dict -}}
{{- $redis := $ext.redis | default dict -}}
{{- $minio := $ext.minio | default dict -}}
{{- $redisBackend := $redis.backend | default "opstree" -}}
{{- $minioBackend := $minio.backend | default "chart" -}}
{{- $redisSecret := $redis.passwordSecret | default "gitlab-redis-secret" -}}
{{- $redisKey := $redis.passwordKey | default "password" -}}
{{- $minioSecret := $minio.secretName | default "gitlab-minio-secret" -}}
{{- $cliImage := $minio.cliImage | default "registry.redhat.io/openshift4/ose-cli:latest" -}}
{{- $dg := $redis.datagrid | default dict -}}
{{- $dgIdentities := $dg.identitiesSecret | default "gitlab-datagrid-identities" -}}
{{- $dgUser := $dg.username | default "default" -}}
# Idempotent secret bootstrap. CNPG generates its own <cluster>-app password.
# Redis/MinIO password secrets are created only for chart/opstree backends;
# ODF and Data Grid paths manage credentials in their own Jobs/CRs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-external-secrets
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-external-secrets
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-external-secrets
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitlab-external-secrets
subjects:
  - kind: ServiceAccount
    name: gitlab-external-secrets
    namespace: {{ $ns }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-external-secrets
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-external-secrets
    spec:
      serviceAccountName: gitlab-external-secrets
      restartPolicy: OnFailure
      containers:
        - name: ensure-secrets
          image: {{ $cliImage | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
            - |
              NS="{{ $ns }}"
              REDIS_BACKEND="{{ $redisBackend }}"
              MINIO_BACKEND="{{ $minioBackend }}"
              REDIS_SECRET="{{ $redisSecret }}"
              REDIS_KEY="{{ $redisKey }}"
              MINIO_SECRET="{{ $minioSecret }}"
              DG_IDENTITIES="{{ $dgIdentities }}"
              DG_USER="{{ $dgUser }}"

              if [ "${REDIS_BACKEND}" = "opstree" ]; then
                if ! oc get secret "${REDIS_SECRET}" -n "${NS}" >/dev/null 2>&1; then
                  PASS="$(openssl rand -hex 24)"
                  oc create secret generic "${REDIS_SECRET}" -n "${NS}" \
                    --from-literal="${REDIS_KEY}=${PASS}"
                  echo "Created ${REDIS_SECRET}"
                else
                  echo "${REDIS_SECRET} already exists — keeping"
                fi
              elif [ "${REDIS_BACKEND}" = "datagrid" ]; then
                # Shared password for Infinispan identities.yaml and GitLab redis.auth
                if ! oc get secret "${REDIS_SECRET}" -n "${NS}" >/dev/null 2>&1; then
                  PASS="$(openssl rand -hex 24)"
                  oc create secret generic "${REDIS_SECRET}" -n "${NS}" \
                    --from-literal="${REDIS_KEY}=${PASS}"
                  echo "Created ${REDIS_SECRET}"
                else
                  PASS="$(oc get secret "${REDIS_SECRET}" -n "${NS}" -o jsonpath="{.data.${REDIS_KEY}}" | base64 -d)"
                  echo "${REDIS_SECRET} already exists — keeping"
                fi
                if ! oc get secret "${DG_IDENTITIES}" -n "${NS}" >/dev/null 2>&1; then
                  cat >/tmp/identities.yaml <<EOF
              credentials:
              - username: ${DG_USER}
                password: ${PASS}
                roles:
                - admin
              EOF
                  sed -i 's/^[[:space:]]*//' /tmp/identities.yaml
                  oc create secret generic "${DG_IDENTITIES}" -n "${NS}" \
                    --from-file=identities.yaml=/tmp/identities.yaml
                  echo "Created ${DG_IDENTITIES}"
                else
                  echo "${DG_IDENTITIES} already exists — keeping"
                fi
              else
                echo "Unknown redis.backend=${REDIS_BACKEND}; skipping redis secrets"
              fi

              if [ "${MINIO_BACKEND}" = "chart" ]; then
                if ! oc get secret "${MINIO_SECRET}" -n "${NS}" >/dev/null 2>&1; then
                  ACCESS="$(openssl rand -hex 16)"
                  SECRET="$(openssl rand -hex 32)"
                  oc create secret generic "${MINIO_SECRET}" -n "${NS}" \
                    --from-literal=accesskey="${ACCESS}" \
                    --from-literal=secretkey="${SECRET}"
                  echo "Created ${MINIO_SECRET}"
                else
                  echo "${MINIO_SECRET} already exists — keeping"
                fi
              else
                echo "minio.backend=${MINIO_BACKEND}: credentials come from ODF setup Job — skipping"
              fi
