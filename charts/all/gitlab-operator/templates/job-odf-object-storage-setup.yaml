{{- $ns := .Values.namespace -}}
{{- $ext := .Values.external | default dict -}}
{{- $minio := $ext.minio | default dict -}}
{{- if eq ($minio.backend | default "chart") "odf" -}}
{{- $odf := $minio.odf | default dict -}}
{{- $nbNs := $odf.noobaaNamespace | default "openshift-storage" -}}
{{- $account := $odf.accountName | default "gitlab-s3" -}}
{{- $secret := $minio.secretName | default "gitlab-minio-secret" -}}
{{- $endpoint := $odf.endpoint | default "https://s3.openshift-storage.svc" -}}
{{- $secure := $odf.secure | default true -}}
{{- $objSecret := $minio.objectStorageSecret | default "gitlab-object-storage" -}}
{{- $regSecret := $minio.registryStorageSecret | default "gitlab-registry-storage" -}}
{{- $cliImage := $minio.cliImage | default "registry.redhat.io/openshift4/ose-cli:latest" -}}
{{- $mcImage := $minio.mcImage | default "quay.io/minio/mc:RELEASE.2024-11-17T19-35-25Z" -}}
# After NooBaaAccount is ready: copy keys into gitlab-minio-secret, create
# GitLab buckets, and write connection Secrets (same names as chart MinIO path).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-odf-object-storage-setup
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-odf-object-storage-setup
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitlab-odf-object-storage-setup
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["noobaa.io"]
    resources: ["noobaaaccounts"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-odf-object-storage-setup
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitlab-odf-object-storage-setup
subjects:
  - kind: ServiceAccount
    name: gitlab-odf-object-storage-setup
    namespace: {{ $ns }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitlab-odf-object-storage-setup
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitlab-odf-object-storage-setup
subjects:
  - kind: ServiceAccount
    name: gitlab-odf-object-storage-setup
    namespace: {{ $ns }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-odf-object-storage-setup
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-odf-object-storage-setup
    spec:
      serviceAccountName: gitlab-odf-object-storage-setup
      restartPolicy: OnFailure
      initContainers:
        - name: wait-and-copy-creds
          image: {{ $cliImage | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
            - |
              NB_NS="{{ $nbNs }}"
              ACCOUNT="{{ $account }}"
              NS="{{ $ns }}"
              MINIO_SECRET="{{ $secret }}"
              echo "Waiting for NooBaaAccount/${ACCOUNT} secret in ${NB_NS}..."
              # Operator creates Secret noobaa-account-<name> with AWS keys
              ACCT_SECRET=""
              for i in $(seq 1 90); do
                for cand in "noobaa-account-${ACCOUNT}" "${ACCOUNT}"; do
                  if oc get secret "${cand}" -n "${NB_NS}" >/dev/null 2>&1; then
                    if oc get secret "${cand}" -n "${NB_NS}" -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' 2>/dev/null | grep -q .; then
                      ACCT_SECRET="${cand}"
                      break 2
                    fi
                  fi
                done
                sleep 5
              done
              if [ -z "${ACCT_SECRET}" ]; then
                echo "ERROR: NooBaaAccount credentials secret not found after ~7.5 minutes"
                echo "Ensure ODF/MCG is installed and NooBaaAccount/${ACCOUNT} is Ready."
                exit 1
              fi
              ACCESS="$(oc get secret "${ACCT_SECRET}" -n "${NB_NS}" -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)"
              SECRET="$(oc get secret "${ACCT_SECRET}" -n "${NB_NS}" -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)"
              oc create secret generic "${MINIO_SECRET}" -n "${NS}" \
                --from-literal=accesskey="${ACCESS}" \
                --from-literal=secretkey="${SECRET}" \
                --dry-run=client -o yaml | oc apply -f -
              echo "Synced ${MINIO_SECRET} from ${NB_NS}/${ACCT_SECRET}"
        - name: create-buckets
          image: {{ $mcImage | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ACCESS
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: accesskey
            - name: MINIO_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: secretkey
            - name: MINIO_ENDPOINT
              value: {{ $endpoint | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              # MCG uses TLS; mc needs --insecure for the cluster service CA.
              mc alias set local "${MINIO_ENDPOINT}" "${MINIO_ACCESS}" "${MINIO_SECRET}" --insecure
              for b in \
                git-lfs \
                gitlab-artifacts \
                gitlab-backups \
                gitlab-ci-secure-files \
                gitlab-dependency-proxy \
                gitlab-mr-diffs \
                gitlab-packages \
                gitlab-pages \
                gitlab-terraform-state \
                gitlab-uploads \
                gitlab-agent-plan-content \
                registry \
                runner-cache \
                tmp \
                models; do
                mc mb --ignore-existing --insecure "local/${b}" || true
              done
              mc ls --insecure local/
              echo "Buckets ready on ODF/MCG"
      containers:
        - name: connection-secrets
          image: {{ $cliImage | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ACCESS
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: accesskey
            - name: MINIO_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: secretkey
            - name: MINIO_ENDPOINT
              value: {{ $endpoint | quote }}
            - name: OBJ_SECRET
              value: {{ $objSecret | quote }}
            - name: REG_SECRET
              value: {{ $regSecret | quote }}
            - name: BACKUP_SECRET
              value: {{ $minio.backupStorageSecret | default "gitlab-object-storage-s3cmd" | quote }}
            - name: NS
              value: {{ $ns | quote }}
            - name: USE_HTTPS
              value: {{ ternary "True" "False" ($secure | default true) | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              HOST="${MINIO_ENDPOINT#http://}"
              HOST="${HOST#https://}"
              SECURE_BOOL="false"
              S3CMD_HTTPS="False"
              if [ "${USE_HTTPS}" = "True" ] || [ "${USE_HTTPS}" = "true" ]; then
                SECURE_BOOL="true"
                S3CMD_HTTPS="True"
              fi
              cat >/tmp/object-storage.yaml <<EOF
              provider: AWS
              region: us-east-1
              aws_access_key_id: ${MINIO_ACCESS}
              aws_secret_access_key: ${MINIO_SECRET}
              aws_signature_version: 4
              host: ${HOST}
              endpoint: "${MINIO_ENDPOINT}"
              path_style: true
              EOF
              sed -i 's/^[[:space:]]*//' /tmp/object-storage.yaml

              cat >/tmp/registry-storage.yaml <<EOF
              s3:
                accesskey: ${MINIO_ACCESS}
                secretkey: ${MINIO_SECRET}
                bucket: registry
                region: us-east-1
                regionendpoint: ${MINIO_ENDPOINT}
                secure: ${SECURE_BOOL}
                v4auth: true
                pathstyle: true
              EOF
              sed -i 's/^[[:space:]]*//' /tmp/registry-storage.yaml

              cat >/tmp/s3cmd.cfg <<EOF
              [default]
              access_key = ${MINIO_ACCESS}
              secret_key = ${MINIO_SECRET}
              host_base = ${HOST}
              host_bucket = ${HOST}
              use_https = ${S3CMD_HTTPS}
              EOF
              sed -i 's/^[[:space:]]*//' /tmp/s3cmd.cfg

              oc create secret generic "${OBJ_SECRET}" -n "${NS}" \
                --from-file=config=/tmp/object-storage.yaml \
                --dry-run=client -o yaml | oc apply -f -
              oc create secret generic "${REG_SECRET}" -n "${NS}" \
                --from-file=config=/tmp/registry-storage.yaml \
                --dry-run=client -o yaml | oc apply -f -
              oc create secret generic "${BACKUP_SECRET}" -n "${NS}" \
                --from-file=config=/tmp/s3cmd.cfg \
                --dry-run=client -o yaml | oc apply -f -
              echo "Created/updated ${OBJ_SECRET}, ${REG_SECRET}, and ${BACKUP_SECRET} (ODF)"
{{- end }}
