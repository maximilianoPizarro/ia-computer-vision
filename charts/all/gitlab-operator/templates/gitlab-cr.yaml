{{- $appsDomain := include "gitlab-operator.appsDomain" . -}}
{{- $ws := .Values.gitlab.webservice | default dict -}}
{{- $sk := .Values.gitlab.sidekiq | default dict -}}
{{- $sh := .Values.gitlab.gitlabShell | default dict -}}
{{- $ext := .Values.external | default dict -}}
{{- $pg := $ext.postgresql | default dict -}}
{{- $redis := $ext.redis | default dict -}}
{{- $minio := $ext.minio | default dict -}}
{{- $pgCluster := $pg.clusterName | default "gitlab-rails-db" -}}
{{- $pgHost := printf "%s-rw" $pgCluster -}}
{{- $redisBackend := $redis.backend | default "opstree" -}}
{{- $dg := $redis.datagrid | default dict -}}
{{- $redisHost := ternary ($dg.name | default "gitlab-datagrid") ($redis.host | default ($redis.name | default "gitlab-redis")) (eq $redisBackend "datagrid") -}}
{{- $redisPort := ternary ($dg.port | default 11222) ($redis.port | default 6379) (eq $redisBackend "datagrid") -}}
{{- $redisUsername := ternary ($redis.username | default ($dg.username | default "default")) ($redis.username | default "") (eq $redisBackend "datagrid") -}}
apiVersion: apps.gitlab.com/v1beta1
kind: GitLab
metadata:
  name: gitlab
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  chart:
    version: {{ .Values.gitlab.chartVersion | quote }}
    values:
      # Chart 10.x removed bundled PostgreSQL, Redis, and MinIO — wire externals.
      postgresql:
        install: false
      redis:
        install: false
      global:
        hosts:
          domain: {{ $appsDomain | quote }}
          hostSuffix: gitlab
          https: true
          gitlab:
            name: {{ include "gitlab-operator.host" . | quote }}
        ingress:
          configureCertmanager: false
          class: openshift-default
          annotations:
            route.openshift.io/termination: edge
          tls:
            enabled: false
        openshift:
          enabled: true
          route:
            enabled: true
            tls:
              termination: edge
        psql:
          host: {{ $pgHost | quote }}
          password:
            secret: {{ $pg.passwordSecret | default (printf "%s-app" $pgCluster) | quote }}
            key: {{ $pg.passwordKey | default "password" | quote }}
        redis:
          host: {{ $redisHost | quote }}
          port: {{ $redisPort }}
          auth:
            enabled: true
            secret: {{ $redis.passwordSecret | default "gitlab-redis-secret" | quote }}
            key: {{ $redis.passwordKey | default "password" | quote }}
{{- if $redisUsername }}
            username: {{ $redisUsername | quote }}
{{- end }}
        appConfig:
          object_store:
            enabled: true
            proxy_download: true
            connection:
              secret: {{ $minio.objectStorageSecret | default "gitlab-object-storage" | quote }}
              key: config
          artifacts:
            bucket: gitlab-artifacts
          lfs:
            bucket: git-lfs
          uploads:
            bucket: gitlab-uploads
          packages:
            bucket: gitlab-packages
          externalDiffs:
            enabled: true
            bucket: gitlab-mr-diffs
          terraformState:
            enabled: true
            bucket: gitlab-terraform-state
          ciSecureFiles:
            enabled: true
            bucket: gitlab-ci-secure-files
          dependencyProxy:
            enabled: true
            bucket: gitlab-dependency-proxy
      certmanager:
        install: false
      installCertmanager: false
      nginx-ingress:
        enabled: false
      prometheus:
        install: false
      registry:
        enabled: {{ .Values.gitlab.registryEnabled }}
{{- if .Values.gitlab.registryEnabled }}
        storage:
          secret: {{ $minio.registryStorageSecret | default "gitlab-registry-storage" | quote }}
          key: config
          redirect:
            disable: true
{{- end }}
      gitlab:
        webservice:
          minReplicas: {{ $ws.minReplicas | default 3 }}
          maxReplicas: {{ $ws.maxReplicas | default 4 }}
          workerProcesses: {{ $ws.workerProcesses | default 4 }}
          resources:
            requests:
              cpu: {{ dig "resources" "requests" "cpu" "500m" $ws }}
              memory: {{ dig "resources" "requests" "memory" "2Gi" $ws }}
            limits:
              memory: {{ dig "resources" "limits" "memory" "4Gi" $ws }}
        sidekiq:
          minReplicas: {{ $sk.minReplicas | default 2 }}
          maxReplicas: {{ $sk.maxReplicas | default 3 }}
          resources:
            requests:
              cpu: {{ dig "resources" "requests" "cpu" "500m" $sk }}
              memory: {{ dig "resources" "requests" "memory" "2Gi" $sk }}
            limits:
              memory: {{ dig "resources" "limits" "memory" "4Gi" $sk }}
        gitaly:
          persistence:
            size: {{ .Values.gitlab.gitalyStorage | quote }}
        toolbox:
          backups:
            cron:
              enabled: false
            objectStorage:
              config:
                secret: {{ $minio.backupStorageSecret | default "gitlab-object-storage-s3cmd" | quote }}
                key: config
      gitlab-shell:
        minReplicas: {{ $sh.minReplicas | default 2 }}
        maxReplicas: {{ $sh.maxReplicas | default 2 }}
