{{- $ns := .Values.namespace -}}
{{- $ext := .Values.external | default dict -}}
{{- $minio := $ext.minio | default dict -}}
{{- if eq ($minio.backend | default "chart") "chart" -}}
{{- $name := $minio.name | default "gitlab-minio" -}}
{{- $svc := $minio.serviceName | default "gitlab-minio-svc" -}}
{{- $secret := $minio.secretName | default "gitlab-minio-secret" -}}
{{- $storage := $minio.storage | default "20Gi" -}}
# Chart-managed MinIO (S3) — GitLab chart 10 removed the bundled MinIO chart.
# Service/Secret names stay stable for ppe-model-seed + YOLO InferenceService.
# Skipped when external.minio.backend=odf (see odf-*.yaml + values-hub-odf-datagrid.yaml).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-data
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $storage | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: object-storage
spec:
  serviceName: {{ $svc }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/component: object-storage
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: minio
          image: {{ $minio.image | default "quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z" | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: accesskey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: secretkey
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $name }}-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: object-storage
spec:
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
{{- end }}
