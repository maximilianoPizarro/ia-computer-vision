{{- if eq .Values.clusterRole "spoke" }}
{{- /*
  RBAC for ACS init-bundle ManagedClusterAction Jobs on spokes.
  acs-init-bundle-sync creates a Job in stackrox using this ServiceAccount.
*/ -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: acs-init-bundle-apply
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: acs-init-bundle-apply
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: acs-init-bundle-apply
  namespace: stackrox
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: acs-init-bundle-apply
subjects:
  - kind: ServiceAccount
    name: acs-init-bundle-apply
    namespace: stackrox
{{- end }}
