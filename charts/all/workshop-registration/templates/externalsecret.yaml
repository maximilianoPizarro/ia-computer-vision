{{- if and (.Values.registration.enabled) (.Values.registration.useVault | default true) }}
{{- $reg := .Values.registration | default dict -}}
{{- $store := $reg.secretStoreRef | default (dict "name" "vault-backend" "kind" "ClusterSecretStore") -}}
{{- $kc := .Values.keycloak | default dict -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: workshop-registration-secrets
  namespace: showroom
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: workshop-registration-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ADMIN_TOKEN: "{{`{{ .adminToken }}`}}"
        KEYCLOAK_ADMIN_PASSWORD: "{{`{{ .keycloakAdminPassword }}`}}"
  data:
    - secretKey: adminToken
      remoteRef:
        key: {{ $reg.vaultKey | default "secret/data/hub/workshop-registration" | quote }}
        property: adminToken
    - secretKey: keycloakAdminPassword
      remoteRef:
        key: {{ $kc.passwordVaultKey | default "secret/data/hub/rhbk-credentials" | quote }}
        property: admin-password
{{- end }}
