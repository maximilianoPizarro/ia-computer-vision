{{- $count := int (.Values.userCount | default 30) -}}
{{- range $realm := .Values.realms }}
{{- range $i := until $count }}
{{- $userNum := add $i 1 }}
{{- $clientId := include "rhbk-iam.clientId" (dict "realm" $realm.name "userNum" $userNum) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-client-{{ $realm.name }}-user{{ $userNum }}
  namespace: {{ $.Values.keycloak.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.vault.secretStore }}
  target:
    name: keycloak-client-{{ $realm.name }}-user{{ $userNum }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        clientId: {{ $clientId | quote }}
        clientSecret: "{{`{{ .clientSecret }}`}}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: {{ include "rhbk-iam.vaultKey" (dict "Values" $.Values "realm" $realm.name "userNum" $userNum) }}
        property: clientSecret
{{- end }}
{{- end }}
