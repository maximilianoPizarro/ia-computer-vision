{{- $prov := .Values.backstageProvisioner | default dict -}}
{{- if $prov.enabled | default true }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-backstage-provisioner
  namespace: {{ .Values.keycloak.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.vault.secretStore }}
  target:
    name: keycloak-backstage-provisioner
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        clientId: {{ $prov.clientId | default "backstage-provisioner" | quote }}
        clientSecret: "{{`{{ .clientSecret }}`}}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: {{ $prov.vaultKey | default "secret/data/hub/keycloak/realms/cv/backstage-provisioner" | quote }}
        property: clientSecret
{{- end }}
