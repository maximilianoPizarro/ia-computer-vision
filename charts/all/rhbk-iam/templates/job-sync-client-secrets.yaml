{{- $count := int (.Values.userCount | default 30) -}}
{{- $kcNs := .Values.keycloak.namespace -}}
{{- /* Prefer SSO route — in-cluster :8443 often fails TLS/SNI vs Keycloak hostname. */ -}}
{{- $kcHost := printf "https://%s" (include "rhbk-iam.ssoHost" .) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhbk-iam-secret-sync
  namespace: {{ $kcNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rhbk-iam-secret-sync
  namespace: {{ $kcNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhbk-iam-secret-sync
  namespace: {{ $kcNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhbk-iam-secret-sync
subjects:
  - kind: ServiceAccount
    name: rhbk-iam-secret-sync
    namespace: {{ $kcNs }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rhbk-iam-sync-client-secrets
  namespace: {{ $kcNs }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 1200
  template:
    spec:
      serviceAccountName: rhbk-iam-secret-sync
      restartPolicy: Never
      containers:
        - name: sync
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: KC_HOST
              value: {{ $kcHost | quote }}
            - name: KC_NAMESPACE
              value: {{ $kcNs | quote }}
            - name: USER_COUNT
              value: {{ $count | quote }}
            - name: REALMS
              value: {{ range $i, $r := .Values.realms }}{{ if $i }},{{ end }}{{ $r.name }}{{ end }}
            - name: PROVISIONER_ENABLED
              value: {{ .Values.backstageProvisioner.enabled | default true | quote }}
            - name: PROVISIONER_CLIENT_ID
              value: {{ .Values.backstageProvisioner.clientId | default "backstage-provisioner" | quote }}
            - name: PROVISIONER_FALLBACK_SECRET
              value: {{ .Values.backstageProvisioner.clientSecret | default "backstage-provisioner-poc-2026" | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail

              ADMIN_PASS=$(oc get secret keycloak-admin-user -n "$KC_NAMESPACE" \
                -o jsonpath='{.data.password}' | base64 -d)

              get_token() {
                local i body
                for i in $(seq 1 30); do
                  body=$(curl -sk -X POST "$KC_HOST/realms/master/protocol/openid-connect/token" \
                    -d "grant_type=password&client_id=admin-cli&username=admin&password=${ADMIN_PASS}" || true)
                  if echo "$body" | python3 -c "import json,sys; json.load(sys.stdin)['access_token']" >/dev/null 2>&1; then
                    echo "$body" | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])"
                    return 0
                  fi
                  echo "Waiting for Keycloak admin token (attempt $i/30)..." >&2
                  sleep 10
                done
                echo "ERROR: could not get Keycloak admin token from $KC_HOST" >&2
                exit 1
              }

              assert_realm_admin_api() {
                local realm="$1" token="$2" code body
                code=$(curl -sk -o /tmp/iam-sync-clients.json -w '%{http_code}' \
                  -H "Authorization: Bearer $token" \
                  "$KC_HOST/admin/realms/${realm}/clients?max=1" || echo "000")
                body=$(cat /tmp/iam-sync-clients.json 2>/dev/null || echo "")
                # 404 = realm not imported yet (retry). Only 403 is FGAP lockout.
                if [ "$code" = "403" ] || echo "$body" | grep -q '403 Forbidden'; then
                  echo "ERROR: FGAP lockout on realm $realm (Admin API HTTP $code). keycloak-fgap-heal should wipe+reimport." >&2
                  exit 1
                fi
              }

              sync_client() {
                local realm=$1 client_id=$2 secret=$3 token=$4
                local uuid current body
                body=$(curl -sk -H "Authorization: Bearer $token" \
                  "$KC_HOST/admin/realms/${realm}/clients?clientId=${client_id}")
                if echo "$body" | grep -q '403 Forbidden'; then
                  echo "ERROR: FGAP lockout listing $realm/$client_id" >&2
                  exit 1
                fi
                uuid=$(echo "$body" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['id'] if isinstance(d,list) and d else '')")
                if [ -z "$uuid" ]; then
                  echo "MISSING $realm/$client_id"
                  return 1
                fi

                current=$(curl -sk -H "Authorization: Bearer $token" \
                  "$KC_HOST/admin/realms/${realm}/clients/${uuid}/client-secret" \
                  | python3 -c "import json,sys; print(json.load(sys.stdin).get('value',''))")

                if [ "$current" = "$secret" ]; then
                  echo "OK $realm/$client_id"
                  return 0
                fi

                # Keycloak ignores PUT {"secret":"..."} alone — merge into full ClientRepresentation.
                curl -sk -H "Authorization: Bearer $token" \
                  "$KC_HOST/admin/realms/${realm}/clients/${uuid}" \
                  | SECRET="$secret" python3 -c 'import json,sys,os; c=json.load(sys.stdin); c["secret"]=os.environ["SECRET"]; json.dump(c, sys.stdout)' \
                  | curl -sk -X PUT -H "Authorization: Bearer $token" \
                    -H "Content-Type: application/json" \
                    "$KC_HOST/admin/realms/${realm}/clients/${uuid}" \
                    --data-binary @- >/dev/null
                echo "SYNCED $realm/$client_id"
                return 0
              }

              sync_all() {
                local token=$1 missing=0 realm client_id i SECRET_NAME SEC
                IFS=',' read -ra REALM_LIST <<< "$REALMS"
                for realm in "${REALM_LIST[@]}"; do
                  for i in $(seq 1 "$USER_COUNT"); do
                    SECRET_NAME="keycloak-client-${realm}-user${i}"
                    SEC=$(oc get secret "$SECRET_NAME" -n "$KC_NAMESPACE" \
                      -o jsonpath='{.data.clientSecret}' 2>/dev/null | base64 -d || true)
                    if [ -n "$SEC" ]; then
                      sync_client "$realm" "client-${realm}-user${i}" "$SEC" "$token" || missing=$((missing + 1))
                    fi
                  done
                done

                if [ "$PROVISIONER_ENABLED" = "true" ]; then
                  PROV_SEC=$(oc get secret keycloak-backstage-provisioner -n "$KC_NAMESPACE" \
                    -o jsonpath='{.data.clientSecret}' 2>/dev/null | base64 -d || true)
                  if [ -z "$PROV_SEC" ]; then
                    PROV_SEC="$PROVISIONER_FALLBACK_SECRET"
                  fi
                  if [ -n "$PROV_SEC" ]; then
                    sync_client "cv" "$PROVISIONER_CLIENT_ID" "$PROV_SEC" "$token" || missing=$((missing + 1))
                  else
                    echo "MISSING cv/$PROVISIONER_CLIENT_ID (secret not ready)"
                    missing=$((missing + 1))
                  fi
                fi
                return "$missing"
              }

              # PostSync can finish before KeycloakRealmImport creates realm clients.
              echo "Waiting for IAM realm clients + ESO secrets..."
              for i in $(seq 1 72); do
                TOKEN=$(get_token)
                # Probe cv (hosts backstage-provisioner); 403 = FGAP, not "missing".
                # 404 while realm is still importing is ignored by assert (only 403 fails).
                assert_realm_admin_api "cv" "$TOKEN"
                missing=0
                sync_all "$TOKEN" || missing=$?
                if [ "$missing" -eq 0 ]; then
                  echo "rhbk-iam client secret sync complete."
                  exit 0
                fi
                echo "attempt $i/72: $missing client(s) still missing or out of sync — retrying..."
                sleep 10
              done

              echo "ERROR: IAM client secrets not synced after 12 minutes" >&2
              exit 1
