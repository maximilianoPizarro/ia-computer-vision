clusterDomain: ""
keycloak:
  namespace: keycloak-system
  crName: keycloak
  # SSO alias route lives in developer-hub (sso.<apps-domain>); issuer uses this host.
  ssoHost: ""
  # Portable alternative to ssoHost above -- prefix only (default "sso"), so
  # overrides don't need to hardcode a full cluster domain. Must match
  # developer-hub.ssoHostPrefix (the chart that actually owns the Route) and
  # every other chart referencing this shared SSO hostname.
  ssoHostPrefix: "sso"

userCount: 30
defaultPassword: Welcome123!

vault:
  secretStore: vault-backend
  pathPrefix: secret/data/hub/keycloak/realms

backstageProvisioner:
  enabled: true
  clientId: backstage-provisioner
  vaultKey: secret/data/hub/keycloak/realms/cv/backstage-provisioner

realms:
  - name: neuroface
    displayName: NeuroFace API
    adminPermissionsEnabled: true
  - name: maas
    displayName: Model as a Service
    adminPermissionsEnabled: true
  - name: cv
    displayName: Computer Vision
    adminPermissionsEnabled: true
