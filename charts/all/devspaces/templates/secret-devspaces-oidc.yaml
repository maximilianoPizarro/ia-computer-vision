{{- if .Values.keycloakOidc.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: devspaces-oidc-secret
  namespace: devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "6"
type: Opaque
stringData:
  oAuthSecret: {{ .Values.keycloakOidc.clientSecret | default .Values.keycloakOidcClientSecret | default "CHANGEME-set-via-helm-or-sync-secret" | quote }}
{{- end }}
