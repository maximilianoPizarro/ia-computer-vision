apiVersion: batch/v1
kind: Job
metadata:
  name: devspaces-gitlab-credentials
  namespace: devspaces
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: devspaces-git-setup
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: registry.redhat.io/openshift4/ose-cli:latest
        env:
        - name: GITLAB_HOST
          {{- if include "devspaces.hubClusterDomain" . }}
          value: "gitlab.apps.{{ include "devspaces.hubClusterDomain" . }}"
          {{- else }}
          value: "gitlab.apps.{{ include "devspaces.clusterDomain" . }}"
          {{- end }}
        - name: USER_COUNT
          value: "{{ .Values.userCount | default 200 }}"
        - name: GITLAB_PASSWORD
          value: "Welcome123!"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Provisioning GitLab git credentials for DevSpaces users..."
          provision_user() {
            U="$1"
            NS="${U}-devspaces"
            if ! oc get namespace "$NS" &>/dev/null; then
              return
            fi
            SECRET_NAME="gitlab-git-credentials"
            if oc get secret "$SECRET_NAME" -n "$NS" &>/dev/null; then
              return
            fi
            CRED_LINE="https://${U}:${GITLAB_PASSWORD}@${GITLAB_HOST}"
            cat <<EOSECRET | oc apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${SECRET_NAME}
            namespace: ${NS}
            labels:
              controller.devfile.io/mount-to-devworkspace: "true"
              controller.devfile.io/watch-secret: "true"
            annotations:
              controller.devfile.io/mount-path: /etc/secret
              controller.devfile.io/mount-as: subpath
          type: Opaque
          stringData:
            credentials: "${CRED_LINE}"
          EOSECRET
            cat <<EOCONFIG | oc apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: devspaces-gitconfig
            namespace: ${NS}
            labels:
              controller.devfile.io/mount-to-devworkspace: "true"
              controller.devfile.io/watch-secret: "true"
            annotations:
              controller.devfile.io/mount-path: /home/user
              controller.devfile.io/mount-as: subpath
          type: Opaque
          stringData:
            .gitconfig: |
              [user]
                  name = ${U}
                  email = ${U}@developer-hub.local
              [credential]
                  helper = store --file /etc/secret/credentials
          EOCONFIG
            echo "Provisioned git credentials for $U in $NS"
          }
          provision_user admin
          for i in $(seq 1 $USER_COUNT); do
            provision_user "user${i}"
          done
          echo "Done provisioning GitLab git credentials."
