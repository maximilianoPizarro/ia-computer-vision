openapi: 3.0.3
info:
  title: MaaS LLM (dual auth - APIKEY or OIDC realm maas)
  description: |
    OpenAI-compatible chat completions via AI Gateway (HTTPRoute `ai-maas`), protected by a
    Kuadrant `AuthPolicy` that accepts **either** of two independent credentials -- pick
    whichever is easiest to obtain:

    * **API key** (`ApiKeyAuth`): request one from Developer Hub -- *Catalog* → this API →
      **Kuadrant** tab → *Request API key*. Send it as `Authorization: APIKEY <key>`.
    * **OIDC client credentials** (`OAuth2ClientCredentials`): click *Authorize* below and enter
      the `client_id`/`client_secret` for realm `maas` (pre-provisioned `client-maas-userN`, or
      your own client in that realm) -- Swagger UI fetches the token from Keycloak itself and
      attaches it as a Bearer token automatically.

    Both paths are validated by the same `ai-maas-auth` AuthPolicy and land on the same rate
    limit tiers (`free`/`gold` for API keys, `oidc` for JWTs).
  version: v1
servers:
  - url: https://ai-gateway.__HUB_APPS_DOMAIN__
    description: AI Gateway - HTTPRoute ai-maas (dual auth: APIKEY or OIDC realm maas)
security:
  - ApiKeyAuth: []
  - OAuth2ClientCredentials: []
  - BearerAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Kuadrant API key - format: `APIKEY <your-key>`. Request one in Developer Hub → Kuadrant tab."
    OAuth2ClientCredentials:
      type: oauth2
      description: >-
        Enter the client_id/client_secret for realm `maas`. Swagger UI exchanges them
        for a token directly against Keycloak.
      flows:
        clientCredentials:
          tokenUrl: https://__KEYCLOAK_HOSTNAME__/realms/maas/protocol/openid-connect/token
          scopes: {}
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Alternative: paste an already-issued Keycloak access token from realm `maas`
        directly, instead of using OAuth2ClientCredentials above.
  schemas:
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          example: llama-scout-17b
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
paths:
  /v1/chat/completions:
    post:
      summary: Chat completions (APIKEY or OIDC Bearer token on ai-maas route)
      operationId: maasChatCompletions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        "200":
          description: Completion response
        "401":
          description: Missing or invalid APIKEY / Bearer token
        "429":
          description: Rate limit exceeded (free/gold/oidc tier)
