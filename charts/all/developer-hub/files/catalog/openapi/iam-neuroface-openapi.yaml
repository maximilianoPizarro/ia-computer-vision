openapi: 3.0.3
info:
  title: NeuroFace API (OIDC — neuroface realm)
  description: |
    NeuroFace hub gateway API. Realm `neuroface` provides OIDC clients for service-to-service access.

    **Authentication**: JWT from Keycloak realm `neuroface` via client_credentials grant.
    Pre-provisioned client: `client-neuroface-userN`.
  version: v1
servers:
  - url: https://neuroface.__HUB_APPS_DOMAIN__
    description: RHCL Gateway — main NeuroFace route
security:
  - BearerAuth: []
  - {}
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak access token from realm `neuroface`
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        cluster:
          type: string
paths:
  /api/health:
    get:
      summary: Backend health
      operationId: neurofaceHealth
      security:
        - BearerAuth: []
        - {}
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
