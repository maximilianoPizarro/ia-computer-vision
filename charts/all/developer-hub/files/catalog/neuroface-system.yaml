apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ppe-detect-api
  title: NeuroFace PPE Detection API
  description: Backend REST API for PPE safety detection — proxies frames to KServe YOLO serving
  tags: [neuroface, ppe, openapi]
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: neuroface
  definition: |
    openapi: 3.0.3
    info:
      title: NeuroFace PPE Detection API
      version: 1.5.0
      description: PPE safety detection via webcam frames (base64 JPEG)
    servers:
      - url: https://neuroface.__HUB_APPS_DOMAIN__
        description: NeuroFace hub route
    paths:
      /api/ppe/status:
        get:
          summary: PPE serving status
          operationId: getPpeStatus
          responses:
            "200":
              description: PPE endpoint reachability and configuration
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      endpoint:
                        type: string
                      reachable:
                        type: boolean
                      kafka_enabled:
                        type: boolean
      /api/ppe/detect:
        post:
          summary: Detect PPE in image frame
          operationId: detectPpe
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [image]
                  properties:
                    image:
                      type: string
                      description: Base64-encoded JPEG frame
          responses:
            "200":
              description: PPE detection result
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      person_count:
                        type: integer
                      ppe_status:
                        type: string
                        enum: [compliant, violation, unknown]
                      missing_ppe:
                        type: array
                        items:
                          type: string
                      present_ppe:
                        type: array
                        items:
                          type: string
                      detections:
                        type: array
                        items:
                          type: object
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kserve-ppe-v2
  title: KServe YOLO PPE Inference API
  description: KServe v1/v2 predict endpoints for yolo-ppe InferenceService
  tags: [neuroface, kserve, yolo, openapi]
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: neuroface
  definition: |
    openapi: 3.0.3
    info:
      title: KServe YOLO PPE Inference API
      version: 1.5.0
      description: YOLO PPE model serving via KServe RawDeployment
    servers:
      - url: http://yolo-ppe-serving.neuroface.svc:8080
        description: In-cluster InferenceService
    paths:
      /v2/models/yolo-ppe/ready:
        get:
          summary: KServe v2 model readiness
          operationId: kserveReady
          responses:
            "200":
              description: Model is ready
      /v2/models/yolo-ppe/infer:
        post:
          summary: KServe v2 inference
          operationId: kserveInfer
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
          responses:
            "200":
              description: Inference output tensors
      /v1/predict:
        post:
          summary: Legacy v1 predict (base64 image)
          operationId: v1Predict
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    image:
                      type: string
                      description: Base64-encoded image
          responses:
            "200":
              description: YOLO detection results
