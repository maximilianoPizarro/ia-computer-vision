---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ppe-kafka-events
  title: PPE Kafka Events
  description: Async PPE violation and compliance events published by NeuroFace backend
  tags: [neuroface, kafka, asyncapi, ppe]
  links:
    - url: https://kafka-console.__HUB_APPS_DOMAIN__
      title: Kafka Console
      icon: dashboard
spec:
  type: asyncapi
  lifecycle: production
  owner: platform-engineering
  system: neuroface
  definition: |
    asyncapi: 2.6.0
    info:
      title: PPE Kafka Events
      version: 1.5.0
      description: PPE detection events from NeuroFace backend to east Kafka via Skupper
    defaultContentType: application/json
    servers:
      kafka-east:
        url: kafka-east-tst.service-interconnect.svc:9092
        protocol: kafka
        description: East spoke Kafka (Skupper federated)
    channels:
      cv.ppe.detections:
        description: PPE violation and compliance events
        publish:
          summary: NeuroFace backend producer
          message:
            name: PpeDetectionEvent
            payload:
              type: object
              required: [ppe_status, timestamp]
              properties:
                ppe_status:
                  type: string
                  enum: [compliant, violation, unknown]
                person_count:
                  type: integer
                missing_ppe:
                  type: array
                  items:
                    type: string
                present_ppe:
                  type: array
                  items:
                    type: string
                timestamp:
                  type: string
                  format: date-time
        subscribe:
          summary: ppe-kafka-mailpit consumer
          message:
            payload:
              $ref: "#/components/schemas/PpeDetectionEvent"
    components:
      schemas:
        PpeDetectionEvent:
          type: object
          properties:
            ppe_status:
              type: string
            person_count:
              type: integer
            missing_ppe:
              type: array
              items:
                type: string
            present_ppe:
              type: array
              items:
                type: string
            timestamp:
              type: string
              format: date-time
