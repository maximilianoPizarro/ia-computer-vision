apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: workshop-kuadrant-apis
  title: Workshop Kuadrant API Products
  description: |
    Dedicated **workshop-apis** and **ai-gateway** Gateways with Kuadrant API keys.

    1. Developer Hub → **Kuadrant** → **API Products** → click product name → **Request API key**
    2. Or open any **API** entity below → tab **Kuadrant** → **Request API key**
    3. Copy key from **Kuadrant → My API Keys**
    4. Call APIs with header `Authorization: APIKEY <key>`
  tags:
    - workshop
    - kuadrant
    - gateway-api
    - external-api
  links:
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/kuadrant
      title: Kuadrant — API Products & keys
      icon: catalog
spec:
  owner: platform-engineering
  domain: hub-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: workshop-apis-gateway
  title: Workshop APIs Gateway
  description: |
    Gateway API host `workshop-apis.__HUB_APPS_DOMAIN__` — httpbin, REST Countries, MCP.

    ```bash
    export KEY="<from Kuadrant → My API Keys>"
    curl -H "Authorization: APIKEY $KEY" https://workshop-apis.__HUB_APPS_DOMAIN__/httpbin/get
    curl -H "Authorization: APIKEY $KEY" https://workshop-apis.__HUB_APPS_DOMAIN__/countries/population/q?country=argentina
    ```
  annotations:
    backstage.io/kubernetes-namespace: workshop-kuadrant-apis
    backstage.io/kubernetes-cluster: hub
    backstage.io/kubernetes-id: workshop-apis-gateway
    argocd/app-name: workshop-kuadrant-apis
  links:
    - url: https://workshop-apis.__HUB_APPS_DOMAIN__/httpbin/get
      title: Gateway (401 without API key)
      icon: web
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/kuadrant
      title: Request API key
      icon: catalog
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  domain: hub-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ai-gateway-maas
  title: AI Gateway — MaaS LLM
  description: |
    OpenAI-compatible MaaS at `ai-gateway.__HUB_APPS_DOMAIN__`.

    ```bash
    export KEY="<from Kuadrant → My API Keys>"
    curl -sk -H "Authorization: APIKEY $KEY" -H "Content-Type: application/json" \
      -X POST "https://ai-gateway.__HUB_APPS_DOMAIN__/v1/chat/completions" \
      -d '{"model":"granite-3-2-8b-instruct","messages":[{"role":"user","content":"Hello"}],"max_tokens":50}'
    ```
  annotations:
    backstage.io/kubernetes-namespace: ai-gateway-system
    backstage.io/kubernetes-cluster: hub
    backstage.io/kubernetes-id: ai-gateway
    argocd/app-name: workshop-kuadrant-apis
    kuadrant.io/api-product: workshop-llm-tokens
  links:
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/kuadrant/api-products/ai-gateway-system/workshop-llm-tokens
      title: Request API key (MaaS LLM)
      icon: catalog
    - url: https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/workshop-maas-openapi
      title: OpenAPI / Swagger
      icon: docs
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: workshop-kuadrant-apis
  domain: hub-platform
  providesApis:
    - workshop-maas-openapi
---
