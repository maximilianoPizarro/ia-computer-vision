  name: rhdh-plugin-argocd
  title: Argo CD
  description: GitOps application status from OpenShift GitOps.
  tags: [rhdh, argocd, gitops]
spec:
  type: rhdh-dynamic-plugin
  lifecycle: production
  owner: platform-engineering
  system: rhdh-platform-plugins
