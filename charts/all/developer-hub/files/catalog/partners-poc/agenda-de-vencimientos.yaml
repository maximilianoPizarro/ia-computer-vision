---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: oidc-credentials-self-service-rapipago-poc
  title: OIDC credentials self-service (Agenda de Vencimientos)
  description: >
    Request OIDC client credentials for Agenda de Vencimientos protected by JWT AuthPolicy.
    Clients are created in Keycloak realm rapipago-poc via Admin REST API; secret shown once on task result.
  tags:
    - oidc
    - keycloak
    - iam
    - rapipago-poc
    - partners-poc
    - self-service
spec:
  owner: group:default/rapipago
  type: service
  parameters:
    - title: OIDC client request
      required:
        - apiName
        - clientLabel
        - grantType
        - requester
        - ownerGroup
      properties:
        apiName:
          title: Target API
          type: string
          description: Catalog API for Agenda de Vencimientos (realm rapipago-poc).
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - API
            defaultKind: API
            catalogFilter:
              - kind: API
                metadata.name: agenda-de-vencimientos
        clientLabel:
          title: Client label
          type: string
          description: "Derives clientId = client-{{apiName}}-{{clientLabel}}"
          pattern: "^[a-z0-9-]+$"
        grantType:
          title: Grant type
          type: string
          enum: [client_credentials, authorization_code]
          enumNames: [Client credentials (M2M), Authorization code (with redirect URI)]
          default: client_credentials
        requester:
          title: Requester
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds: [User]
        ownerGroup:
          title: Owner (group)
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds: [Group]
        planTier:
          title: Rate-limit plan tier
          type: string
          enum: [free, gold]
          enumNames: [Free, Gold]
          default: free
      dependencies:
        grantType:
          oneOf:
            - properties:
                grantType:
                  const: client_credentials
            - properties:
                grantType:
                  const: authorization_code
                redirectUri:
                  title: Redirect URI
                  type: string
                  format: uri
              required: [redirectUri]
  steps:
    - id: get-token
      name: Authenticate provisioner (realm rapipago-poc)
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/keycloak/realms/rapipago-poc/protocol/openid-connect/token
        headers:
          Content-Type: application/x-www-form-urlencoded
        body: grant_type=client_credentials&client_id=backstage-provisioner&client_secret=backstage-provisioner-poc-2026
    - id: create-client-cc
      name: Create OIDC client (client_credentials)
      if: ${{ parameters.grantType === "client_credentials" }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/keycloak/admin/realms/rapipago-poc/clients
        headers:
          Content-Type: application/json
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
        body:
          clientId: client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
          name: client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
          enabled: true
          publicClient: false
          serviceAccountsEnabled: true
          standardFlowEnabled: false
          directAccessGrantsEnabled: false
          protocol: openid-connect
          webOrigins: ["*"]
          attributes:
            owner: ${{ parameters.ownerGroup | parseEntityRef | pick('name') }}
            requestedBy: ${{ parameters.requester | parseEntityRef | pick('name') }}@developer-hub.local
            targetApi: ${{ parameters.apiName | parseEntityRef | pick('name') }}
            plan: ${{ parameters.planTier }}
          protocolMappers:
            - name: plan
              protocol: openid-connect
              protocolMapper: oidc-hardcoded-claim-mapper
              config:
                claim.name: plan
                claim.value: ${{ parameters.planTier }}
                jsonType.label: String
                access.token.claim: "true"
                id.token.claim: "true"
                userinfo.token.claim: "true"
    - id: create-client-ac
      name: Create OIDC client (authorization_code)
      if: ${{ parameters.grantType === "authorization_code" }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/keycloak/admin/realms/rapipago-poc/clients
        headers:
          Content-Type: application/json
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
        body:
          clientId: client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
          enabled: true
          publicClient: false
          standardFlowEnabled: true
          redirectUris:
            - ${{ parameters.redirectUri }}
          webOrigins:
            - "*"
          protocol: openid-connect
          attributes:
            plan: ${{ parameters.planTier }}
    - id: resolve-client
      name: Resolve Keycloak client UUID
      action: http:backstage:request
      input:
        method: GET
        path: /proxy/keycloak/admin/realms/rapipago-poc/clients?clientId=client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
        headers:
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
    - id: get-secret
      name: Retrieve client secret
      action: http:backstage:request
      input:
        method: GET
        path: /proxy/keycloak/admin/realms/rapipago-poc/clients/${{ steps['resolve-client'].output.body[0].id }}/client-secret
        headers:
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
  output:
    text:
      - title: OIDC credentials (shown once)
        content: |
          Target API: `${{ parameters.apiName | parseEntityRef | pick('name') }}` (realm rapipago-poc)
          Client ID: `client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}`
          Client Secret: `${{ steps['get-secret'].output.body.value }}`
          Token endpoint: `https://sso.__HUB_APPS_DOMAIN__/realms/rapipago-poc/protocol/openid-connect/token`
          Gateway: `https://agenda-de-vencimientos.__HUB_APPS_DOMAIN__/payment-schedule-api/v1`
    links:
      - title: API in catalog
        icon: catalog
        entityRef: ${{ parameters.apiName }}

