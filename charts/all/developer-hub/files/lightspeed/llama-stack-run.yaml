version: '2'
image_name: "llama-stack"
container_image: null
external_providers_dir: null
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: /tmp/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: /tmp/sql_store.db
    sql_files:
      type: sql_sqlite
      db_path: /rag-content/vector_db/rhdh_product_docs/1.9/files_metadata.db
    faiss_kv:
      type: kv_sqlite
      db_path: /rag-content/vector_db/rhdh_product_docs/1.9/faiss_store.db
  stores:
    metadata:
      namespace: registry
      backend: faiss_kv
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
registered_resources:
  models:
    - model_id: sentence-transformers/all-mpnet-base-v2
      metadata:
        embedding_dimension: 768
      model_type: embedding
      provider_id: sentence-transformers
      provider_model_id: /rag-content/embeddings_model
    - model_id: llama-guard3:8b
      provider_id: safety-guard
      provider_model_id: llama-guard3:8b
      model_type: llm
      metadata: {}
  shields:
    - shield_id: llama-guard-shield
      provider_id: llama-guard
      provider_shield_id: safety-guard/llama-guard3:8b
  tool_groups:
    - provider_id: rag-runtime
      toolgroup_id: builtin::rag
  vector_dbs:
    - vector_db_id: rhdh-product-docs-1_8
      embedding_model: sentence-transformers/all-mpnet-base-v2
      embedding_dimension: 768
      provider_id: faiss
apis:
  - inference
  - safety
  - tool_runtime
  - vector_io
  - files
inference_store:
  db_path: .llama/distributions/ollama/inference_store.db
  type: sqlite
metadata_store:
  db_path: .llama/distributions/ollama/registry.db
  namespace: null
  type: sqlite
models:
  - model_id: sentence-transformers/all-mpnet-base-v2
    metadata:
      embedding_dimension: 768
      model_type: embedding
    provider_id: sentence-transformers
    provider_model_id: "/app-root/embeddings_model"
providers:
  agents: []
  inference:
    - provider_id: vllm
      provider_type: remote::vllm
      config:
        url: ${env.VLLM_URL}
        api_token: ${env.VLLM_AUTH_PREFIX:=APIKEY} ${env.VLLM_API_KEY}
        max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
        tls_verify: ${env.VLLM_TLS_VERIFY:=false}
    - provider_id: sentence-transformers
      provider_type: inline::sentence-transformers
      config: {}
  safety:
    - provider_id: llama-guard
      provider_type: inline::llama-guard
      config:
        excluded_categories: []
  scoring: []
  telemetry: []
  tool_runtime:
    - provider_id: rag-runtime
      provider_type: inline::rag-runtime
      config: {}
  files:
    - provider_id: localfs
      provider_type: inline::localfs
      config:
        storage_dir: /tmp/llama-stack-files
        metadata_store:
          table_name: files_metadata
          backend: sql_files
  vector_io:
    - provider_id: faiss
      provider_type: inline::faiss
      config:
        persistence:
          namespace: vector_io::faiss
          backend: faiss_kv
    - provider_id: rhdh-docs
      provider_type: inline::faiss
      config:
        persistence:
          namespace: rhdh_docs::faiss
          backend: faiss_kv
scoring_fns: []
server:
  port: 8321
shields:
  - shield_id: llama-guard-shield
    provider_id: llama-guard
    provider_shield_id: safety-guard/llama-guard3:8b
tool_groups:
  - provider_id: rag-runtime
    toolgroup_id: builtin::rag
    description: "RHDH product documentation search."
    vector_dbs:
      - embedding_dimension: 768
        embedding_model: sentence-transformers/all-mpnet-base-v2
        provider_id: rhdh-docs
        vector_db_id: rhdh-product-docs-1_9
  - provider_id: mcp-gateway
    provider_type: remote::mcp
    config:
      url: ${env.MCP_GATEWAY_URL:=http://mcp-gateway-istio.mcp-system.svc.cluster.local:8080/mcp}
      timeout: 120
