apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: oidc-credentials-revoke
  title: Revoke OIDC client (Keycloak cv)
  description: >
    Delete an OIDC client previously created by the OIDC credentials self-service
    template in Keycloak realm cv. Identifies the client by the same apiName and
    clientLabel used at creation time (clientId = client-{api}-{label}).
  tags:
    - oidc
    - keycloak
    - iam
    - cv
    - self-service
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: OIDC client to revoke
      required:
        - apiName
        - clientLabel
      properties:
        apiName:
          title: Target API (OIDCPolicy)
          type: string
          description: >
            Same catalog API selected when the client was created. Together with
            clientLabel this resolves clientId = client-{apiName}-{clientLabel}.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - API
            defaultKind: API
            catalogFilter:
              - kind: API
                metadata.annotations.workshop/oidc-self-service-target: "true"
              - kind: API
                metadata.name: neuroface-cv-openapi
        clientLabel:
          title: Client label (consumer app)
          type: string
          description: "Same label used at creation (clientId = client-{apiName}-{clientLabel})"
          pattern: "^[a-z0-9-]+$"
          ui:help: "Lowercase letters, numbers, and hyphens only (e.g. my-app, team-a)"
  steps:
    - id: get-token
      name: Authenticate provisioner (realm cv)
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/keycloak-provisioner-token/realms/cv/protocol/openid-connect/token
        headers:
          Content-Type: application/x-www-form-urlencoded
        body: grant_type=client_credentials
    - id: resolve-client
      name: Resolve Keycloak client UUID
      action: http:backstage:request
      input:
        method: GET
        path: /proxy/keycloak/admin/realms/cv/clients?clientId=client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
        headers:
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
    - id: delete-client
      name: Delete OIDC client
      action: http:backstage:request
      input:
        method: DELETE
        path: /proxy/keycloak/admin/realms/cv/clients/${{ steps['resolve-client'].output.body[0].id }}
        headers:
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
  output:
    text:
      - title: OIDC client revoked
        content: |
          Deleted Keycloak client in realm **cv**:

          Client ID: `client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}`

          Target API: `${{ parameters.apiName | parseEntityRef | pick('name') }}`

          If the resolve step returned an empty list, the client did not exist and the
          delete step may have failed with 404 — check the task log for details.
