apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ai-computer-vision
  title: AI Computer Vision at the Edge
  description: >
    Deploy a personal NeuroFace instance on a spoke with RHBK biometric 2FA,
    OIDC-secured RHCL Gateway routing, GitLab ApplicationSet deployment,
    Tekton builds to the OpenShift internal registry, DevSpaces, and Swagger API docs.
  tags:
    - ai-cv
    - neuroface
    - computer-vision
    - kserve
    - ppe
    - edge
    - rhbk
    - oidc
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: AI CV instance
      required:
        - owner
        - spoke
        - hubClusterDomain
      properties:
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - User
          ui:autofocus: true
        spoke:
          title: Target spoke
          type: string
          enum: [east, west]
          enumNames: [East spoke, West spoke]
          default: east
        hubClusterDomain:
          title: Hub cluster domain
          type: string
          description: "Hub domain without apps. prefix (from oc get ingresses.config/cluster -o jsonpath='{.spec.domain}')"
          default: __HUB_CLUSTER_DOMAIN__
        maasEndpoint:
          title: MaaS chat endpoint
          type: string
          description: "OpenAI-compatible MaaS endpoint for NeuroFace chat"
          default: https://ai-gateway.apps.__HUB_CLUSTER_DOMAIN__/v1
      dependencies:
        spoke:
          oneOf:
            - properties:
                spoke:
                  const: east
                spokeClusterDomain:
                  title: East spoke domain
                  type: string
                  default: __EAST_SPOKE_DOMAIN__
                  description: "East spoke domain (without apps. prefix)"
            - properties:
                spoke:
                  const: west
                spokeClusterDomain:
                  title: West spoke domain
                  type: string
                  default: __WEST_SPOKE_DOMAIN__
                  description: "West spoke domain (without apps. prefix)"
  steps:
    - id: fetch
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./ai-cv-skeleton
        values:
          name: neuroface-${{ parameters.owner | parseEntityRef | pick('name') }}
          owner: ${{ parameters.owner | parseEntityRef | pick('name') }}
          namespace: neuroface-${{ parameters.owner | parseEntityRef | pick('name') }}
          spoke: ${{ parameters.spoke }}
          hubClusterDomain: ${{ parameters.hubClusterDomain }}
          spokeClusterDomain: ${{ parameters.spokeClusterDomain }}
          maasEndpoint: ${{ parameters.maasEndpoint }}
          repoUrl: https://gitlab.apps.${{ parameters.hubClusterDomain }}/ws-workshop/neuroface-${{ parameters.owner | parseEntityRef | pick('name') }}
    - id: publish
      name: Publish to GitLab
      action: publish:gitlab
      input:
        repoUrl: "gitlab.apps.${{ parameters.hubClusterDomain }}?owner=ws-workshop&repo=neuroface-${{ parameters.owner | parseEntityRef | pick('name') }}"
        defaultBranch: main
        settings:
          description: "NeuroFace ${{ parameters.owner | parseEntityRef | pick('name') }} on ${{ parameters.spoke }} spoke with RHBK biometric OIDC"
          visibility: public
    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: NeuroFace (OIDC Gateway)
        url: https://neuroface-spoke-gateway.${{ parameters.spokeClusterDomain }}/user/${{ parameters.owner | parseEntityRef | pick('name') }}/
      - title: RHBK Admin
        url: https://rhbk-neuroface-${{ parameters.owner | parseEntityRef | pick('name') }}.${{ parameters.spokeClusterDomain }}/admin
      - title: Open in DevSpaces
        url: https://devspaces.apps.${{ parameters.hubClusterDomain }}/#${{ steps.publish.output.remoteUrl }}
      - title: Catalog entity
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
