apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ai-computer-vision
  title: AI Computer Vision at the Edge
  description: >
    Deploy a personal NeuroFace instance — PPE detection via shared KServe YOLO,
    MaaS chat, and GitLab + DevSpaces developer workflow.
  tags:
    - ai-cv
    - neuroface
    - computer-vision
    - kserve
    - ppe
    - edge
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: AI CV instance
      required:
        - name
        - owner
        - clusterDomain
      properties:
        name:
          title: Instance name
          type: string
          default: neuroface
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - User
        clusterDomain:
          title: Hub apps domain
          type: string
          description: "e.g. apps.cluster-xyz.example.com"
          default: apps.cluster.example.com
  steps:
    - id: fetch
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          clusterDomain: ${{ parameters.clusterDomain }}
    - id: publish
      name: Publish to GitLab
      action: publish:github
      input:
        repoUrl: "gitlab.apps.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}"
        defaultBranch: main
        repoVisibility: public
    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in DevSpaces
        url: "https://devspaces.apps.${{ parameters.clusterDomain }}/#${{ steps.publish.output.remoteUrl }}"
      - title: Catalog entity
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
