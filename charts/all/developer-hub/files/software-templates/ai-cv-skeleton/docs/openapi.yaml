openapi: 3.0.3
info:
  title: NeuroFace Backend API (${{ values.owner }})
  description: |
    Personal NeuroFace instance on the ${{ values.spoke }} spoke.
    Access via RHCL Gateway at /user/${{ values.owner }}/ with RHBK OIDC authentication.
  version: v1.5.1
servers:
  - url: https://neuroface-spoke-gateway.${{ values.spokeClusterDomain }}/user/${{ values.owner }}
    description: RHCL Gateway (OIDC via RHBK biometric)
  - url: http://neuroface-backend.${{ values.namespace }}.svc.cluster.local:8080
    description: In-cluster backend service
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
  /api/v1/detect:
    post:
      summary: PPE detection on uploaded image
      operationId: detectPPE
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: PPE detections
        "401":
          description: OIDC authentication required at gateway
  /api/v1/chat:
    post:
      summary: AI chat about PPE and safety
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        "200":
          description: Chat response
  /api/images:
    post:
      summary: Upload facial images (RHBK biometric enrollment)
      operationId: uploadFaceImage
      responses:
        "200":
          description: Image stored
  /api/recognize:
    post:
      summary: Facial recognition (RHBK biometric 2FA)
      operationId: recognizeFace
      responses:
        "200":
          description: Recognition result
