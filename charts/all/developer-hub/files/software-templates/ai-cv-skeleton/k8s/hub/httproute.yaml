# Hub HTTPRoute: single DNS neuroface.apps.<hub> routes /user/<owner>/ to the spoke selected at scaffold time.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${{ values.name }}-user
  namespace: neuroface-gateway-system
  labels:
    app.kubernetes.io/part-of: neuroface-workshop
    app.kubernetes.io/component: user-route
spec:
  parentRefs:
    - name: neuroface-gateway
      namespace: neuroface-gateway-system
  hostnames:
    - neuroface.apps.${{ values.hubClusterDomain }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /user/${{ values.owner }}/
      backendRefs:
        - name: neuroface-app-${{ values.spoke }}
          port: 8080
          weight: 100
