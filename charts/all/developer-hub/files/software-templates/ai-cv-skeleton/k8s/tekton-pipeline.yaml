apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: neuroface-build
  namespace: ${{ values.namespace }}
spec:
  params:
    - name: image-tag
      type: string
      default: latest
  workspaces:
    - name: source
    - name: dockerconfig
  tasks:
    - name: build-backend
      taskRef:
        kind: ClusterTask
        name: buildah
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/${{ values.namespace }}/neuroface-backend:$(params.image-tag)
        - name: TLSVERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: dockerconfig
