apiVersion: v1
kind: Secret
metadata:
  name: rhbk-admin
  namespace: ${{ values.namespace }}
type: Opaque
stringData:
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: Welcome123!
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rhbk-env
  namespace: ${{ values.namespace }}
data:
  NEUROFACE_API_URL: http://neuroface-backend:8080
  NEUROFACE_CONFIDENCE_THRESHOLD: "65.0"
  NEUROFACE_MAX_ENROLLMENT_IMAGES: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rhbk-realm
  namespace: ${{ values.namespace }}
data:
  neuroface-realm.json: |
    {
      "realm": "neuroface",
      "displayName": "NeuroFace Biometric",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "resetPasswordAllowed": true,
      "requiredActions": [
        {
          "alias": "biometric-enrollment",
          "name": "Biometric Enrollment",
          "providerId": "biometric-enrollment",
          "enabled": true,
          "defaultAction": false,
          "priority": 100,
          "config": {}
        }
      ],
      "roles": {
        "realm": [
          { "name": "biometric-user", "description": "User with biometric enrollment completed" },
          { "name": "biometric-admin", "description": "Admin that can manage biometric enrollments" }
        ]
      },
      "groups": [
        { "name": "biometric-enrolled", "realmRoles": ["biometric-user"] }
      ],
      "users": [
        {
          "username": "${{ values.owner }}",
          "enabled": true,
          "emailVerified": true,
          "firstName": "${{ values.owner }}",
          "lastName": "Workshop",
          "email": "${{ values.owner }}@developer-hub.local",
          "credentials": [
            { "type": "password", "value": "Welcome123!", "temporary": false }
          ],
          "requiredActions": ["biometric-enrollment"],
          "realmRoles": ["default-roles-neuroface"]
        }
      ],
      "clients": [
        {
          "clientId": "neuroface-app",
          "name": "NeuroFace Application",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": [
            "https://neuroface.apps.${{ values.hubClusterDomain }}/user/${{ values.owner }}/*",
            "https://neuroface.apps.${{ values.hubClusterDomain }}/*"
          ],
          "webOrigins": ["+"],
          "protocol": "openid-connect",
          "attributes": { "pkce.code.challenge.method": "S256" }
        },
        {
          "clientId": "neuroface-backend",
          "name": "NeuroFace Backend Service",
          "enabled": true,
          "bearerOnly": true,
          "publicClient": false,
          "protocol": "openid-connect"
        }
      ],
      "authenticationFlows": [
        {
          "alias": "biometric browser",
          "description": "Browser login with biometric second factor via NeuroFace",
          "providerId": "basic-flow",
          "topLevel": true,
          "builtIn": false,
          "authenticationExecutions": [
            { "authenticator": "auth-cookie", "requirement": "ALTERNATIVE", "priority": 10 },
            { "authenticatorFlow": true, "requirement": "ALTERNATIVE", "priority": 20, "flowAlias": "biometric browser forms" }
          ]
        },
        {
          "alias": "biometric browser forms",
          "description": "Username/password + biometric 2FA",
          "providerId": "basic-flow",
          "topLevel": false,
          "builtIn": false,
          "authenticationExecutions": [
            { "authenticator": "auth-username-password-form", "requirement": "REQUIRED", "priority": 10 },
            { "authenticator": "biometric-authenticator", "requirement": "REQUIRED", "priority": 20 }
          ]
        }
      ],
      "browserFlow": "biometric browser",
      "attributes": {
        "neuroface.api.url": "http://neuroface-backend:8080",
        "neuroface.confidence.threshold": "65.0",
        "neuroface.max.enrollment.images": "5"
      }
    }
