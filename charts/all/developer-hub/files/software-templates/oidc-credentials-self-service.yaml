apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: oidc-credentials-self-service
  title: OIDC credentials self-service (Keycloak cv)
  description: >
    Request OIDC client credentials for APIs protected by RHCL OIDCPolicy.
    Clients are created in Keycloak realm cv via Admin REST API; credentials are
    delivered by email (Mailpit PoC). No custom Backstage plugin required.
  tags:
    - oidc
    - keycloak
    - iam
    - cv
    - self-service
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: OIDC client request
      required:
        - apiName
        - clientLabel
        - grantType
        - requester
        - ownerGroup
      properties:
        apiName:
          title: Target API (OIDCPolicy)
          type: string
          description: >
            Catalog API protected by RHCL OIDCPolicy. This PoC always issues the client
            in Keycloak realm cv; the selection identifies the target in clientId,
            attributes, and email.
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - API
            defaultKind: API
            catalogFilter:
              - kind: API
                metadata.annotations.workshop/oidc-self-service-target: "true"
        clientLabel:
          title: Client label (consumer app)
          type: string
          description: "Derives clientId = client-{apiName}-{clientLabel}"
          pattern: "^[a-z0-9-]+$"
          ui:help: "Lowercase letters, numbers, and hyphens only (e.g. my-app, team-a)"
        grantType:
          title: Grant type
          type: string
          enum:
            - client_credentials
            - authorization_code
          enumNames:
            - Client credentials (M2M)
            - Authorization code (with redirect URI)
          default: client_credentials
        requester:
          title: Credential recipient
          type: string
          description: >
            Catalog user who receives the email (must have spec.profile.email set,
            e.g. user1@developer-hub.local).
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - User
        ownerGroup:
          title: Owner (group)
          type: string
          description: Owner group stored as the owner attribute on the Keycloak client.
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
      dependencies:
        grantType:
          oneOf:
            - properties:
                grantType:
                  const: client_credentials
            - properties:
                grantType:
                  const: authorization_code
                redirectUri:
                  title: Redirect URI
                  type: string
                  description: Required for authorization_code
                  format: uri
              required:
                - redirectUri
  steps:
    - id: get-token
      name: Authenticate provisioner (realm cv)
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/keycloak/realms/cv/protocol/openid-connect/token
        headers:
          Content-Type: application/x-www-form-urlencoded
        body: grant_type=client_credentials&client_id=__KEYCLOAK_PROVISIONER_CLIENT_ID__&client_secret=__KEYCLOAK_PROVISIONER_CLIENT_SECRET__
    - id: create-client-cc
      name: Create OIDC client (client_credentials)
      if: ${{ parameters.grantType === "client_credentials" }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/keycloak/admin/realms/cv/clients
        headers:
          Content-Type: application/json
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
        body:
          clientId: client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
          name: client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
          enabled: true
          publicClient: false
          serviceAccountsEnabled: true
          standardFlowEnabled: false
          directAccessGrantsEnabled: false
          protocol: openid-connect
          attributes:
            owner: ${{ parameters.ownerGroup | parseEntityRef | pick('name') }}
            requestedBy: ${{ parameters.requester | parseEntityRef | pick('name') }}@developer-hub.local
            targetApi: ${{ parameters.apiName | parseEntityRef | pick('name') }}
    - id: create-client-ac
      name: Create OIDC client (authorization_code)
      if: ${{ parameters.grantType === "authorization_code" }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/keycloak/admin/realms/cv/clients
        headers:
          Content-Type: application/json
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
        body:
          clientId: client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
          name: client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
          enabled: true
          publicClient: false
          serviceAccountsEnabled: false
          standardFlowEnabled: true
          directAccessGrantsEnabled: false
          redirectUris:
            - ${{ parameters.redirectUri }}
          protocol: openid-connect
          attributes:
            owner: ${{ parameters.ownerGroup | parseEntityRef | pick('name') }}
            requestedBy: ${{ parameters.requester | parseEntityRef | pick('name') }}@developer-hub.local
            targetApi: ${{ parameters.apiName | parseEntityRef | pick('name') }}
    - id: resolve-client
      name: Resolve Keycloak client UUID
      action: http:backstage:request
      input:
        method: GET
        path: /proxy/keycloak/admin/realms/cv/clients?clientId=client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}
        headers:
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
    - id: get-secret
      name: Retrieve client secret
      action: http:backstage:request
      input:
        method: GET
        path: /proxy/keycloak/admin/realms/cv/clients/${{ steps['resolve-client'].output.body[0].id }}/client-secret
        headers:
          Authorization: Bearer ${{ steps['get-token'].output.body.access_token }}
    - id: send-credentials-email
      name: Send credentials by email
      action: http:backstage:request
      input:
        method: POST
        path: /notifications
        headers:
          Content-Type: application/json
        body:
          recipients:
            type: entity
            entityRef: ${{ parameters.requester }}
          payload:
            title: OIDC credentials ready for ${{ parameters.apiName | parseEntityRef | pick('name') }}
            description: >-
              Target API: ${{ parameters.apiName | parseEntityRef | pick('name') }} (Keycloak realm: cv).

              Client ID: client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}

              Client Secret: ${{ steps['get-secret'].output.body.value }}

              Token endpoint: __SSO_BASE_URL__/realms/cv/protocol/openid-connect/token

              Example curl (client_credentials):

              curl -sk -X POST '__SSO_BASE_URL__/realms/cv/protocol/openid-connect/token' \
                -d 'grant_type=client_credentials' \
                -d 'client_id=client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}' \
                -d 'client_secret=${{ steps['get-secret'].output.body.value }}'

              PoC ONLY — plain-text credential by email (Mailpit). In production use expiring delivery (e.g. Vault response-wrapping).
            severity: high
            topic: oidc-credentials
  output:
    text:
      - title: Result
        content: |
          Client created: `client-${{ parameters.apiName | parseEntityRef | pick('name') }}-${{ parameters.clientLabel }}`.

          Credentials sent by email to user `${{ parameters.requester | parseEntityRef | pick('name') }}`.
    links:
      - title: Mailpit (PoC inbox)
        url: https://mailpit.__HUB_APPS_DOMAIN__/
      - title: API in catalog
        icon: catalog
        entityRef: ${{ parameters.apiName }}
