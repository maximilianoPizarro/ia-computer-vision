clusterDomain: ""
dynamicPluginsStorage: 10Gi
userCount: 1
defaultPassword: "Welcome123!"
keycloak:
  namespace: keycloak-system
  crName: keycloak
  serviceName: keycloak-service-serving
keycloakOidcClientSecret: "rhdh-oidc-2026-ia-cv-pattern"
keycloakProvisioner:
  clientId: backstage-provisioner
  clientSecret: "backstage-provisioner-poc-2026"
  useVault: true
  vaultKey: secret/data/hub/keycloak/realms/cv/backstage-provisioner
oidcAuth:
  useVault: true
  vaultKey: secret/data/hub/developer-hub-secrets
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
devspacesOidcClientSecret: ""
gitlabToken: ""
sessionSecret: ""
gitlab:
  namespace: gitlab-system
quayDockerConfigJson: ""
rhacsApiToken: ""
pluginReadiness:
  enabled: true
  image: registry.redhat.io/ubi9/ubi-minimal:latest
  ghcrCheck:
    enabled: true
    image: registry.redhat.io/ubi9/skopeo:latest
spokeTokenSync:
  enabled: true
  clusters: "east,west"
  schedule: "0 */6 * * *"
  image: registry.redhat.io/ubi9/python-311:latest
kubernetesSpokes:
  enabled: true
  east:
    apiUrl: ""
  west:
    apiUrl: ""
techdocs:
  githubPagesUrl: "https://maximilianopizarro.github.io/ia-computer-vision/"
# Same schema as acm-hub-spoke — Pattern CR extraParameters spokeCredentials.clusters.*.apiUrl
# drives ACM import and AI CV software-template spoke domain defaults (no spokeDomains duplicate).
spokeCredentials:
  enabled: true
  mode: vault
  clusters:
    east:
      token: ""
      apiUrl: ""
    west:
      token: ""
      apiUrl: ""
applicationSet:
  enabled: true
  gitlabGroup: ws-workshop
  repositoryMatch: "^neuroface-"
  secretStoreName: vault-backend
  vaultKey: secret/data/hub/developer-hub-secrets
plugins:
  # OCI registry for community dynamic plugins (override for Quay mirror)
  registry: ""
  rbac:
    enabled: true
    policyAdminUser: platformadmin
  techdocs:
    enabled: true
  techRadar:
    enabled: false
  mcp:
    enabled: false
  kiali:
    enabled: true
    pluginTag: "bs_1.45.3__1.49.0"
    backendTag: "bs_1.45.3__1.28.0"
    endpoint: ""
  grafana:
    enabled: false
  techInsights:
    enabled: false
  quay:
    enabled: false
  acsSecurityInsights:
    enabled: false
  argocd:
    enabled: true
  gitlab:
    enabled: true
    pluginTag: "bs_1.45.3__6.13.0"
  tekton:
    enabled: true
  kuadrant:
    enabled: true
  ocm:
    enabled: true
    pluginTag: "bs_1.45.3__5.11.1"
    backendTag: "bs_1.45.3__5.12.2"
  topology:
    enabled: true
  keycloakCatalog:
    enabled: true
  lightspeed:
    enabled: false
  notificationsEmail:
    enabled: true

iamCatalog:
  enabled: true
  realms:
    - name: neuroface
      displayName: NeuroFace API
      componentName: neuroface-api
      apiName: neuroface-openapi
      kubernetesId: neuroface
      swaggerUrl: "https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/neuroface-openapi"
      openapiUrl: "https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/neuroface-openapi/definition"
    - name: cv
      displayName: Computer Vision API
      componentName: neuroface-cv-api
      apiName: neuroface-cv-openapi
      kubernetesId: neuroface-gateway
      swaggerUrl: "https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/neuroface-cv-openapi"
      openapiUrl: "https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/neuroface-cv-openapi/definition"
    - name: maas
      displayName: Model as a Service
      componentName: maas-api
      apiName: maas-openapi
      kubernetesId: ai-gateway
      swaggerUrl: "https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/maas-openapi"
      openapiUrl: "https://developer-hub.__HUB_APPS_DOMAIN__/catalog/default/api/maas-openapi/definition"

# Strimzi/Camel K aren't installed by default in this pattern. Gate the
# corresponding RHDH kubernetes-plugin customResources entries behind these
# so Topology doesn't 404 querying CRDs that don't exist on the cluster.
kafka:
  enabled: false
camel:
  enabled: false
