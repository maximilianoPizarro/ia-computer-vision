{{- $oa := .Values.oidcAuth | default dict -}}
{{- $store := $oa.secretStoreRef | default (dict "name" "vault-backend" "kind" "ClusterSecretStore") -}}
{{- if $oa.useVault | default true }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: developer-hub-oidc-auth
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: developer-hub-oidc-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        OIDC_CLIENT_SECRET: "{{`{{ .oidc_client_secret }}`}}"
        SESSION_SECRET: "{{`{{ .session_secret }}`}}"
        GITLAB_TOKEN: "{{`{{ .gitlab_token }}`}}"
        RHACS_API_TOKEN: {{ .Values.rhacsApiToken | default "" | quote }}
  data:
    - secretKey: oidc_client_secret
      remoteRef:
        key: {{ include "developer-hub.oidcAuthVaultKey" . | quote }}
        property: oidc-client-secret
    - secretKey: session_secret
      remoteRef:
        key: {{ include "developer-hub.oidcAuthVaultKey" . | quote }}
        property: session-secret
    - secretKey: gitlab_token
      remoteRef:
        key: {{ include "developer-hub.oidcAuthVaultKey" . | quote }}
        property: gitlab-token
{{- else }}
---
apiVersion: v1
kind: Secret
metadata:
  name: developer-hub-oidc-auth
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: {{ .Values.keycloakOidcClientSecret | default "CHANGEME-set-via-helm-or-sync-secret" | quote }}
  GITLAB_TOKEN: {{ .Values.gitlabToken | default "CHANGEME-create-token-in-gitlab-root" | quote }}
  SESSION_SECRET: {{ .Values.sessionSecret | default (randAlphaNum 32) | quote }}
  RHACS_API_TOKEN: {{ .Values.rhacsApiToken | default "" | quote }}
{{- end }}
