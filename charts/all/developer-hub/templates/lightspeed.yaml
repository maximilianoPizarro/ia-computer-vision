{{- if include "developer-hub.lightspeedEnabled" . | trim -}}
{{- $ls := .Values.plugins.lightspeed -}}
{{- $rootAi := .Values.aiModel | default dict -}}
{{- $ai := $ls.aiModel | default dict -}}
{{- if not $ai.apiURL -}}
{{- $ai = mergeOverwrite (dict) $rootAi $ai -}}
{{- end -}}
{{- if not $ai.apiURL -}}
{{- $hubDomain := include "developer-hub.clusterDomain" . -}}
{{- $ai = mergeOverwrite $ai (dict "apiURL" (printf "https://ai-gateway.%s/v1/chat/completions" $hubDomain)) -}}
{{- end -}}
{{- if not $ai.model -}}
{{- $ai = mergeOverwrite $ai (dict "model" "llama-scout-17b") -}}
{{- end -}}
{{- $vllmURL := include "developer-hub.vllmBaseUrl" (dict "apiURL" $ai.apiURL) -}}
{{- $model := $ai.model | default "llama-scout-17b" -}}
{{- $tag := $ls.pluginTag | default "bs_1.45.3__1.2.3" -}}
{{- $vaultKey := $ls.vaultPlatformApiKeyPath | default "secret/data/hub/ai-gateway-platform-keys" -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-stack
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    rhdh.redhat.com/backstage-name: developer-hub
data:
  lightspeed-stack.yaml: |
    name: Lightspeed Core Service (LCS)
    service:
      host: 0.0.0.0
      auth_enabled: false
      workers: 1
      color_log: true
      access_log: true
    llama_stack:
      use_as_library_client: false
      url: http://localhost:8321
    user_data_collection:
      feedback_enabled: true
      feedback_storage: "/tmp/data/feedback"
      transcripts_enabled: true
      transcripts_storage: "/tmp/data/transcripts"
    authentication:
      module: "noop"
    conversation_cache:
      type: sqlite
      sqlite:
        db_path: "/tmp/data/conversations/lcs_cache.db"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-app-config
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    rhdh.redhat.com/backstage-name: developer-hub
data:
  app-config-lightspeed.yaml: |
    backend:
      csp:
        upgrade-insecure-requests: false
        img-src:
          - "'self'"
          - "data:"
          - https://avatars.githubusercontent.com
          - https://secure.gravatar.com
        script-src:
          - "'self'"
          - "'unsafe-eval'"
          - https://cdn.jsdelivr.net
    lightspeed:
      servers:
        - id: "${LLM_SERVER_ID}"
          url: "${LLM_SERVER_URL}"
          token: "${LLM_SERVER_TOKEN}"
      prompts:
        - title: Getting Started with Red Hat Developer Hub
          message: Can you guide me through exploring the Software Catalog and onboarding in this platform?
        - title: Hub and spoke with ACM
          message: How does this Developer Hub instance integrate with ACM and spoke clusters?
        - title: Kairos and platform automation
          message: What is Kairos in this workshop and how does it relate to observability and remediation?
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-config
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    rhdh.redhat.com/backstage-name: developer-hub
data:
  run.yaml: |
{{ .Files.Get "files/lightspeed/llama-stack-run.yaml" | indent 4 }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lightspeed-ai-gateway-key
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: lightspeed-ai-gateway-key
    creationPolicy: Owner
  data:
    - secretKey: VLLM_API_KEY
      remoteRef:
        key: {{ $vaultKey | quote }}
        property: platformApiKey
---
apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-secrets
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  ENABLE_VLLM: "true"
  VLLM_URL: {{ $vllmURL | quote }}
  VLLM_AUTH_PREFIX: {{ $ls.vllmAuthPrefix | default "APIKEY" | quote }}
  VLLM_MAX_TOKENS: {{ $ls.vllmMaxTokens | default "4096" | quote }}
  VLLM_TLS_VERIFY: {{ $ls.vllmTlsVerify | default "false" | quote }}
  VALIDATION_PROVIDER: "vllm"
  VALIDATION_MODEL_NAME: {{ $model | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: lightspeed-secrets
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  LIGHTSPEED_SERVER_ID: {{ $model | quote }}
  LIGHTSPEED_SERVICE_PORT: "8080"
  LIGHTSPEED_QUESTION_VALIDATION: "true"
  LLM_SERVER_ID: {{ $model | quote }}
  LLM_SERVER_URL: "http://localhost:8080"
  LLM_SERVER_TOKEN: ""
{{- end }}
