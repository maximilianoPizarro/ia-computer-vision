{{- $kp := .Values.keycloakProvisioner | default dict -}}
{{- $store := .Values.oidcAuth.secretStoreRef | default (dict "name" "vault-backend" "kind" "ClusterSecretStore") -}}
{{- /* No `| default true`: Sprig's default() treats boolean false as
       empty and silently replaces it with the fallback. This chart's own
       values.yaml already defaults useVault to true. */ -}}
{{- if $kp.useVault }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-provisioner-credentials
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: keycloak-provisioner-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        KEYCLOAK_PROVISIONER_CLIENT_ID: {{ $kp.clientId | default "backstage-provisioner" | quote }}
        KEYCLOAK_PROVISIONER_CLIENT_SECRET: "{{`{{ .clientSecret }}`}}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: {{ $kp.vaultKey | default "secret/data/hub/keycloak/realms/cv/backstage-provisioner" | quote }}
        property: clientSecret
{{- else }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-provisioner-credentials
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  KEYCLOAK_PROVISIONER_CLIENT_ID: {{ $kp.clientId | default "backstage-provisioner" | quote }}
  KEYCLOAK_PROVISIONER_CLIENT_SECRET: {{ $kp.clientSecret | default "backstage-provisioner-poc-2026" | quote }}
{{- end }}
