{{- $kp := .Values.keycloakProvisioner | default dict -}}
{{- $store := .Values.oidcAuth.secretStoreRef | default (dict "name" "vault-backend" "kind" "ClusterSecretStore") -}}
{{- /* No `| default true`: Sprig's default() treats boolean false as
       empty and silently replaces it with the fallback. This chart's own
       values.yaml already defaults useVault to true. */ -}}
{{- if $kp.useVault }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-provisioner-credentials
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: keycloak-provisioner-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        KEYCLOAK_PROVISIONER_CLIENT_ID: {{ $kp.clientId | default "backstage-provisioner" | quote }}
        KEYCLOAK_PROVISIONER_CLIENT_SECRET: "{{`{{ .clientSecret }}`}}"
        # HTTP Basic credentials for the /proxy/keycloak-provisioner-token
        # endpoint (configmap-app-config-rhdh.yaml), so the OIDC self-service
        # scaffolder templates never bake a client_secret into a git-tracked
        # ConfigMap -- they read this env var at task-execution time instead,
        # always matching whatever Vault/ESO currently holds for this client
        # (the *same* remoteRef this ExternalSecret pulls from), instead of a
        # static chart-default string that only matched Keycloak's live
        # secret by coincidence and drifted the moment Vault held a real
        # value. ArgoCD's selfHeal would instantly revert any attempt to
        # patch this secret into the ConfigMap post-render, so it must never
        # be embedded in a chart-rendered resource -- only read live from
        # this Secret's env var.
        KEYCLOAK_PROVISIONER_BASIC_AUTH: '{{`{{ printf "%s:%s" "`}}{{ $kp.clientId | default "backstage-provisioner" }}{{`" .clientSecret | b64enc }}`}}'
  data:
    - secretKey: clientSecret
      remoteRef:
        key: {{ $kp.vaultKey | default "secret/data/hub/keycloak/realms/cv/backstage-provisioner" | quote }}
        property: clientSecret
{{- else }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-provisioner-credentials
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  KEYCLOAK_PROVISIONER_CLIENT_ID: {{ $kp.clientId | default "backstage-provisioner" | quote }}
  KEYCLOAK_PROVISIONER_CLIENT_SECRET: {{ $kp.clientSecret | default "backstage-provisioner-poc-2026" | quote }}
  KEYCLOAK_PROVISIONER_BASIC_AUTH: {{ printf "%s:%s" ($kp.clientId | default "backstage-provisioner") ($kp.clientSecret | default "backstage-provisioner-poc-2026") | b64enc | quote }}
{{- end }}
