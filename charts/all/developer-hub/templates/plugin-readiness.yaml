{{- /* No `| default true`: Sprig's default() treats boolean false as
       empty and silently replaces it with the fallback, making an
       explicit pluginReadiness.enabled=false override a no-op. This
       chart's own values.yaml already defaults it to true. */ -}}
{{- if .Values.pluginReadiness.enabled }}
{{- $ocmEnabled := include "developer-hub.pluginEnabled" (dict "Values" .Values "plugin" "ocm" "default" true) -}}
{{- $kialiEnabled := include "developer-hub.pluginEnabled" (dict "Values" .Values "plugin" "kiali" "default" true) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: developer-hub-plugin-readiness
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900
  template:
    spec:
      serviceAccountName: developer-hub
      restartPolicy: OnFailure
      containers:
        - name: check
          image: {{ .Values.pluginReadiness.image | default "registry.redhat.io/ubi9/ubi-minimal:latest" | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              BASE="https://developer-hub.{{ include "developer-hub.clusterDomain" . }}"
              echo "Checking Developer Hub health at $BASE/healthcheck"
              for i in $(seq 1 40); do
                if curl -sk -o /dev/null -w "%{http_code}" "$BASE/healthcheck" | grep -qE '200|401'; then
                  echo "Healthcheck OK"
                  break
                fi
                if [ "$i" -eq 40 ]; then
                  echo "Healthcheck failed"
                  exit 1
                fi
                sleep 10
              done
              if [ ! -f /opt/app-root/src/rbac-policy.csv ]; then
                echo "WARNING: rbac-policy.csv not mounted (Topology/OCM RBAC may fail)"
              else
                echo "rbac-policy.csv present"
              fi
              if ! grep -q kubernetes.clusters.read /opt/app-root/src/rbac-policy.csv 2>/dev/null; then
                echo "WARNING: kubernetes.clusters.read missing from RBAC CSV"
              fi
              {{- if include "developer-hub.lightspeedEnabled" . | trim }}
              if curl -sk -o /dev/null -w "%{http_code}" "$BASE/lightspeed" | grep -qE '200|302'; then
                echo "Lightspeed route reachable"
              else
                echo "WARNING: /lightspeed not reachable (check plugin + AI Gateway key sync)"
              fi
              KEY="$(oc get secret lightspeed-ai-gateway-key -n developer-hub -o jsonpath='{.data.VLLM_API_KEY}' 2>/dev/null | base64 -d 2>/dev/null || true)"
              if [ -z "$KEY" ]; then
                echo "WARNING: lightspeed-ai-gateway-key missing VLLM_API_KEY — run load-secrets and verify ExternalSecret sync"
              else
                echo "Lightspeed AI Gateway key present (lightspeed-ai-gateway-key)"
              fi
              {{- end }}
              {{- if eq $ocmEnabled "true" }}
              echo "Checking OCM route ${BASE}/ocm"
              if curl -sk -o /dev/null -w "%{http_code}" "$BASE/ocm" | grep -qE '200|401'; then
                echo "OCM route OK"
              else
                echo "ERROR: /ocm not reachable"
                exit 1
              fi
              {{- end }}
              {{- if eq $kialiEnabled "true" }}
              KIALI_URL="{{ include "developer-hub.kialiEndpoint" . }}"
              echo "Waiting for Kiali route ${KIALI_URL}..."
              for i in $(seq 1 30); do
                CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${KIALI_URL}/" || echo "000")
                if [ "${CODE}" = "200" ] || [ "${CODE}" = "302" ] || [ "${CODE}" = "401" ]; then
                  echo "Kiali route reachable (HTTP ${CODE})"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "ERROR: Kiali route not reachable (last HTTP ${CODE})"
                  exit 1
                fi
                sleep 10
              done
              echo "Checking Kiali plugin route ${BASE}/kiali"
              if curl -sk -o /dev/null -w "%{http_code}" "$BASE/kiali" | grep -qE '200|401'; then
                echo "Kiali plugin route OK"
              else
                echo "ERROR: /kiali not reachable"
                exit 1
              fi
              {{- end }}
              echo "Plugin readiness checks complete"
          volumeMounts:
            - name: rhdh-rbac-policy
              mountPath: /opt/app-root/src/rbac-policy.csv
              subPath: rbac-policy.csv
              readOnly: true
      volumes:
        - name: rhdh-rbac-policy
          configMap:
            name: rhdh-rbac-policy
            optional: true
{{- end }}
