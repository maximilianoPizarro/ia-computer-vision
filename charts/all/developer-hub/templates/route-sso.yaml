{{- /*
  Shared SSO alias for Developer Hub / DevSpaces / catalog. Keycloak CR
  hostname must be the same host (values-hub: keycloak.ingress.hostname =
  sso.<apps-domain>) so OIDC discovery does not advertise keycloak.<domain>
  while this Route is the only Admitted endpoint.

  When the upstream rhbk chart also creates an Ingress for the same host,
  OpenShift admits that Ingress Route first and this Route stays
  HostAlreadyClaimed (Degraded). SSO still works via the Ingress Route;
  ignore-healthcheck keeps Argo from aborting the rest of developer-hub
  (Backstage CR never applied).
*/ -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sso
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  host: {{ include "developer-hub.ssoHost" . | quote }}
  to:
    kind: Service
    name: {{ include "developer-hub.keycloakServiceName" . }}
    weight: 100
  port:
    targetPort: 8443
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
