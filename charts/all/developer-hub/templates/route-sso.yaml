{{- /*
  RHBK exposes keycloak.<apps-domain>; Developer Hub, DevSpaces, and catalog plugins
  expect sso.<apps-domain>. This alias route keeps hybrid-mesh URLs working.
*/ -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sso
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  host: {{ include "developer-hub.ssoHost" . | quote }}
  to:
    kind: Service
    name: {{ include "developer-hub.keycloakServiceName" . }}
    weight: 100
  port:
    targetPort: 8443
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
