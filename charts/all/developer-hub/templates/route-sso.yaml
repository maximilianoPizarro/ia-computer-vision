{{- /*
  Shared SSO alias for Developer Hub / DevSpaces / catalog. Keycloak CR
  hostname must be the same host (values-hub: keycloak.ingress.hostname =
  sso.<apps-domain>) so OIDC discovery does not advertise keycloak.<domain>
  while this Route is the only Admitted endpoint.
*/ -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sso
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  host: {{ include "developer-hub.ssoHost" . | quote }}
  to:
    kind: Service
    name: {{ include "developer-hub.keycloakServiceName" . }}
    weight: 100
  port:
    targetPort: 8443
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
