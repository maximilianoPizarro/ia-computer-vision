{{- /*
  Backstage realm on the cluster Keycloak instance (namespace keycloak-system).
  All clients that share the RHDH OIDC secret (developer-hub, developer-hub-catalog,
  devspaces) resolve it via the $(OIDC_CLIENT_SECRET) placeholder, backed by the
  developer-hub-oidc-client Secret (ESO/Vault: secret/hub/developer-hub-secrets#oidc-client-secret).
  This must be the SAME Vault value used to populate developer-hub-oidc-auth (RHDH runtime secret),
  otherwise login fails with "unauthorized_client (Invalid client or Invalid client credentials)".
  NOTE: KeycloakRealmImport only applies on first import — if the realm already exists in the
  cluster, edit the client secret directly via the Admin REST API (or delete+reimport the realm).
  Workshop users user1..userN share password with htpasswd/GitLab (default Welcome123!).
*/ -}}
{{- $count := int (.Values.userCount | default 50) }}
{{- $password := .Values.defaultPassword | default "Welcome123!" }}
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: backstage-realm
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  keycloakCRName: {{ include "developer-hub.keycloakCrName" . }}
  placeholders:
    OIDC_CLIENT_SECRET:
      secret:
        name: developer-hub-oidc-client
        key: OIDC_CLIENT_SECRET
  realm:
    realm: backstage
    enabled: true
    displayName: Developer Hub
    loginWithEmailAllowed: true
    registrationAllowed: false
    sslRequired: external
    # Explicit false (Keycloak/RHBK 26 defaults new realms to Fine-Grained Admin
    # Permissions v2 when this is omitted). With FGAP on, the master bootstrap
    # admin loses its classic implicit cross-realm access to THIS realm's
    # clients/users (Admin REST API silently returns a truncated
    # RealmRepresentation and 403s on /clients, /users, DELETE) unless someone
    # explicitly grants it fine-grained view/manage-realm permissions -- which
    # nothing in this pattern does. This breaks developer-hub-sync-backstage-realm-secrets.yaml
    # (its own admin-cli/master-password-grant sync job) and manual secret
    # recovery alike, surfacing as a persistent OIDC "unauthorized_client
    # (Invalid client or Invalid client credentials)" Developer Hub login error
    # that survives realm re-imports. Keep false to match the classic
    # admin model used by rhbk-iam's cv/maas/neuroface realms.
    adminPermissionsEnabled: false
    roles:
      realm:
        - name: platform-engineer
          description: Platform engineering — full catalog, scaffolder, RBAC
        - name: developer
          description: Developer — create from templates, view topology
    groups:
      - name: platform-engineering
        path: /platform-engineering
      - name: developers
        path: /developers
    clients:
      - clientId: developer-hub
        name: Developer Hub
        enabled: true
        clientAuthenticatorType: client-secret
        secret: $(OIDC_CLIENT_SECRET)
        redirectUris:
          - "https://developer-hub.{{ include "developer-hub.clusterDomain" . }}/api/auth/oidc/handler/frame"
        webOrigins:
          - "https://developer-hub.{{ include "developer-hub.clusterDomain" . }}"
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        publicClient: false
        protocol: openid-connect
        fullScopeAllowed: true
        defaultClientScopes:
          - profile
          - email
          - roles
          - basic
      - clientId: developer-hub-catalog
        name: Developer Hub Catalog Sync
        enabled: true
        clientAuthenticatorType: client-secret
        secret: $(OIDC_CLIENT_SECRET)
        serviceAccountsEnabled: true
        standardFlowEnabled: false
        directAccessGrantsEnabled: true
        publicClient: false
        protocol: openid-connect
        fullScopeAllowed: true
      - clientId: devspaces
        name: DevSpaces
        enabled: true
        clientAuthenticatorType: client-secret
        secret: $(OIDC_CLIENT_SECRET)
        redirectUris:
          - "https://devspaces.{{ include "developer-hub.clusterDomain" . }}/api/oauth/callback"
          - "https://devspaces.{{ include "developer-hub.clusterDomain" . }}/api/oauth/che/callback"
        webOrigins:
          - "https://devspaces.{{ include "developer-hub.clusterDomain" . }}"
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        publicClient: false
        protocol: openid-connect
        fullScopeAllowed: true
        defaultClientScopes:
          - profile
          - email
          - roles
          - basic
      - clientId: neuroface
        name: NeuroFace AI Computer Vision
        enabled: true
        publicClient: true
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        redirectUris:
          - "https://neuroface.{{ include "developer-hub.clusterDomain" . }}/*"
          - "https://neuroface-cv.{{ include "developer-hub.clusterDomain" . }}/*"
        webOrigins:
          - "https://neuroface.{{ include "developer-hub.clusterDomain" . }}"
          - "https://neuroface-cv.{{ include "developer-hub.clusterDomain" . }}"
        protocol: openid-connect
        defaultClientScopes:
          - openid
          - profile
          - email
    users:
      # Service account for KeycloakOrgEntityProvider — needs realm-management roles to list users/groups
      - username: service-account-developer-hub-catalog
        enabled: true
        serviceAccountClientId: developer-hub-catalog
        clientRoles:
          realm-management:
            - view-users
            - view-realm
      - username: platformadmin
        enabled: true
        emailVerified: true
        firstName: Platform
        lastName: Admin
        email: platformadmin@redhat.local
        credentials:
          - type: password
            value: {{ $password | quote }}
            temporary: false
        realmRoles:
          - platform-engineer
        groups:
          - platform-engineering
      - username: admin
        enabled: true
        emailVerified: true
        firstName: Workshop
        lastName: Admin
        email: admin@developer-hub.local
        credentials:
          - type: password
            value: {{ $password | quote }}
            temporary: false
        realmRoles:
          - developer
        groups:
          - developers
{{- range $i := until $count }}
      - username: {{ printf "user%d" (add $i 1) | quote }}
        enabled: true
        emailVerified: true
        firstName: Workshop
        lastName: {{ printf "User %d" (add $i 1) | quote }}
        email: {{ printf "user%d@developer-hub.local" (add $i 1) | quote }}
        credentials:
          - type: password
            value: {{ $password | quote }}
            temporary: false
        realmRoles:
          - developer
        groups:
          - developers
{{- end }}
