{{- $argoNs := "vp-gitops" -}}
{{- if .Values.global -}}
{{- $argoNs = .Values.global.vpArgoNamespace | default $argoNs -}}
{{- end -}}
{{- $as := .Values.applicationSet | default dict -}}
{{- $gitlabGroup := $as.gitlabGroup | default "ws-workshop" -}}
{{- $gitlabHost := include "developer-hub.gitlabHost" . -}}
{{- /*
Do NOT wrap in `| default true`: Sprig's default() treats boolean false as
empty and silently replaces it with the fallback, making
applicationSet.enabled=false overrides (e.g. values-hub-only.yaml) a no-op.
This chart's values.yaml already defaults applicationSet.enabled to true.
*/ -}}
{{- if $as.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-scm-token
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $as.secretStoreName | default "vault-backend" }}
  target:
    name: gitlab-scm-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ $as.vaultKey | default "secret/data/hub/developer-hub-secrets" }}
        property: gitlab-token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-https-repo-creds
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $as.secretStoreName | default "vault-backend" }}
  target:
    name: gitlab-https-repo-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: git
        url: "https://{{ $gitlabHost }}"
        username: oauth2
        password: "{{`{{ .gitlab_token }}`}}"
  data:
    - secretKey: gitlab_token
      remoteRef:
        key: {{ $as.vaultKey | default "secret/data/hub/developer-hub-secrets" }}
        property: gitlab-token
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: user-neuroface-apps
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - scmProvider:
              gitlab:
                group: {{ $as.gitlabGroup | default "ws-workshop" | quote }}
                cloneProtocol: https
                api: {{ include "developer-hub.gitlabApiUrl" . | quote }}
                tokenRef:
                  secretName: gitlab-scm-token
                  key: token
              filters:
                - repositoryMatch: {{ $as.repositoryMatch | default "^neuroface-" | quote }}
          - git:
              repoURL: "https://{{ $gitlabHost }}/{{ $gitlabGroup }}/{{`{{ .repository }}`}}.git"
              revision: HEAD
              files:
                - path: k8s/target-cluster.yaml
  template:
    metadata:
      name: "{{`{{ .repository }}`}}"
      labels:
        app.kubernetes.io/part-of: neuroface-workshop
    spec:
      project: ai
      source:
        repoURL: "https://{{ $gitlabHost }}/{{ $gitlabGroup }}/{{`{{ .repository }}`}}.git"
        targetRevision: HEAD
        path: k8s
      destination:
        name: "{{`{{ .cluster }}`}}"
        namespace: "{{`{{ .repository }}`}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
{{- end }}
