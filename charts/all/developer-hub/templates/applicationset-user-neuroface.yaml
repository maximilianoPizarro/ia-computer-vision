{{- $argoNs := "vp-gitops" -}}
{{- if .Values.global -}}
{{- $argoNs = .Values.global.argoNamespace | default $argoNs -}}
{{- end -}}
{{- $as := .Values.applicationSet | default dict -}}
{{- if $as.enabled | default true }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-scm-token
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $as.secretStoreName | default "vault-backend" }}
  target:
    name: gitlab-scm-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ $as.vaultKey | default "secret/data/hub/developer-hub-secrets" }}
        property: gitlab-token
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: user-neuroface-apps
  namespace: {{ $argoNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - scmProvider:
              gitlab:
                group: {{ $as.gitlabGroup | default "ws-workshop" | quote }}
                cloneProtocol: https
                api: {{ include "developer-hub.gitlabApiUrl" . | quote }}
                tokenRef:
                  secretName: gitlab-scm-token
                  key: token
              filters:
                - repositoryMatch: {{ $as.repositoryMatch | default "^neuroface-" | quote }}
          - git:
              repoURL: "{{`{{ .url }}`}}"
              revision: HEAD
              files:
                - path: k8s/target-cluster.yaml
  template:
    metadata:
      name: "{{`{{ .repository }}`}}"
      labels:
        app.kubernetes.io/part-of: neuroface-workshop
    spec:
      project: ai
      source:
        repoURL: "{{`{{ .url }}`}}"
        targetRevision: HEAD
        path: k8s
      destination:
        name: "{{`{{ .cluster }}`}}"
        namespace: "{{`{{ .repository }}`}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
{{- end }}
