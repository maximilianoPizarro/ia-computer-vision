{{- /* No `| default true`: Sprig's default() treats boolean false as
       empty and silently replaces it with the fallback, making an
       explicit iamCatalog.enabled=false override a no-op. This chart's
       own values.yaml already defaults it to true. */ -}}
{{- if .Values.iamCatalog.enabled }}
{{- $hub := include "developer-hub.clusterDomain" . }}
{{- $catalog := .Files.Get "files/catalog/iam-realms.yaml" | replace "__HUB_APPS_DOMAIN__" $hub }}
{{- $neurofaceSpec := include "developer-hub.workshopOpenAPISpec" (dict "root" $ "file" "files/catalog/openapi/iam-neuroface-openapi.yaml" "hub" $hub) | nindent 4 }}
{{- $cvSpec := include "developer-hub.workshopOpenAPISpec" (dict "root" $ "file" "files/catalog/openapi/iam-cv-openapi.yaml" "hub" $hub) | nindent 4 }}
{{- $maasSpec := include "developer-hub.workshopOpenAPISpec" (dict "root" $ "file" "files/catalog/openapi/iam-maas-openapi.yaml" "hub" $hub) | nindent 4 }}
{{- $catalog = $catalog | replace "__IAM_NEUROFACE_OPENAPI_SPEC__" $neurofaceSpec }}
{{- $catalog = $catalog | replace "__IAM_CV_OPENAPI_SPEC__" $cvSpec }}
{{- $catalog = $catalog | replace "__IAM_MAAS_OPENAPI_SPEC__" $maasSpec }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-iam-realms
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  iam-realms.yaml: |
{{ $catalog | nindent 4 }}
{{- end }}
