{{- /*
  PostSync Job: keeps the embedded client_secret in the bundled
  oidc-credentials-self-service / oidc-credentials-revoke scaffolder
  templates in sync with whatever secret Keycloak's backstage-provisioner
  client ACTUALLY has.

  Why this exists: catalog-software-template-manifests.yaml bakes
  __KEYCLOAK_PROVISIONER_CLIENT_SECRET__ into the ConfigMap at Helm-render
  time using .Values.keycloakProvisioner.clientSecret (a static chart
  default). rhbk-iam's job-sync-client-secrets.yaml separately pushes
  whatever value is in Vault (secret/data/hub/keycloak/realms/cv/backstage-provisioner)
  into Keycloak, falling back to the same hardcoded default only when Vault
  has no value yet. These two only match by coincidence -- if Vault ever
  holds a real (rotated/generated) secret, Keycloak ends up with that value
  while this chart's ConfigMap still embeds the old hardcoded default,
  and every self-service/revoke run 401s with unauthorized_client.

  Fix: treat Keycloak's live client secret as the single source of truth.
  After every sync, read it back via the Admin API and patch it into the
  already-rendered ConfigMap, regardless of where Keycloak's value came
  from. No subPath is used on this ConfigMap's volume mount, so kubelet
  propagates the update to the running pod without a restart.
*/ -}}
{{- $kp := .Values.keycloakProvisioner | default dict -}}
{{- $kcNs := include "developer-hub.keycloakNamespace" . -}}
{{- $kcHost := printf "https://%s.%s.svc:8443" (include "developer-hub.keycloakServiceName" .) $kcNs -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-hub-sync-provisioner-template-secret
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "6"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["developer-hub-catalog-software-template-manifests"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-hub-sync-provisioner-template-secret
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "6"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: developer-hub-sync-provisioner-template-secret
subjects:
  - kind: ServiceAccount
    name: rhbk-iam-secret-sync
    namespace: {{ $kcNs }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: developer-hub-sync-provisioner-template-secret
  namespace: {{ $kcNs }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "7"
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: rhbk-iam-secret-sync
      restartPolicy: Never
      containers:
        - name: sync
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: KC_HOST
              value: {{ $kcHost | quote }}
            - name: KC_NAMESPACE
              value: {{ $kcNs | quote }}
            - name: KC_REALM
              value: "cv"
            - name: KC_CLIENT_ID
              value: {{ $kp.clientId | default "backstage-provisioner" | quote }}
            - name: TEMPLATE_CONFIGMAP
              value: developer-hub-catalog-software-template-manifests
            - name: TEMPLATE_NAMESPACE
              value: developer-hub
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail

              ADMIN_PASS=$(oc get secret keycloak-admin-user -n "$KC_NAMESPACE" \
                -o jsonpath='{.data.password}' | base64 -d)

              TOKEN=$(curl -sk -X POST "$KC_HOST/realms/master/protocol/openid-connect/token" \
                -d "grant_type=password&client_id=admin-cli&username=admin&password=${ADMIN_PASS}" \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")

              UUID=$(curl -sk -H "Authorization: Bearer $TOKEN" \
                "$KC_HOST/admin/realms/${KC_REALM}/clients?clientId=${KC_CLIENT_ID}" \
                | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['id'] if d else '')")

              if [ -z "$UUID" ]; then
                echo "SKIP: client ${KC_REALM}/${KC_CLIENT_ID} not found in Keycloak yet"
                exit 0
              fi

              SECRET=$(curl -sk -H "Authorization: Bearer $TOKEN" \
                "$KC_HOST/admin/realms/${KC_REALM}/clients/${UUID}/client-secret" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('value',''))")

              if [ -z "$SECRET" ]; then
                echo "SKIP: could not read current client secret from Keycloak"
                exit 0
              fi

              set +e
              oc get configmap "$TEMPLATE_CONFIGMAP" -n "$TEMPLATE_NAMESPACE" -o json \
                | SECRET="$SECRET" python3 -c '
              import json, os, re, sys
              cm = json.load(sys.stdin)
              secret = os.environ["SECRET"]
              pattern = re.compile(r"client_secret=[^&\s\x27]*")
              changed = False
              for key in ("oidc-credentials-self-service.yaml", "oidc-credentials-revoke.yaml"):
                  content = cm.get("data", {}).get(key)
                  if content is None:
                      continue
                  new_content, count = pattern.subn("client_secret=" + secret, content)
                  if count and new_content != content:
                      cm["data"][key] = new_content
                      changed = True
              if changed:
                  json.dump(cm, sys.stdout)
              else:
                  sys.exit(3)
              ' > /tmp/patched-cm.json 2>/tmp/patch.log
              RC=$?
              set -e

              if [ "$RC" -eq 3 ]; then
                echo "OK: ${TEMPLATE_CONFIGMAP} already has the current provisioner secret"
              elif [ "$RC" -ne 0 ]; then
                cat /tmp/patch.log
                exit "$RC"
              else
                oc apply -f /tmp/patched-cm.json >/dev/null
                echo "SYNCED: ${TEMPLATE_CONFIGMAP} provisioner client_secret updated from live Keycloak value"
              fi
