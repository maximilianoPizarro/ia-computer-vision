{{- $oa := .Values.oidcAuth | default dict -}}
{{- $store := $oa.secretStoreRef | default (dict "name" "vault-backend" "kind" "ClusterSecretStore") -}}
{{- /* No `| default true`: Sprig's default() treats boolean false as
       empty and silently replaces it with the fallback. This chart's own
       values.yaml already defaults useVault to true. */ -}}
{{- if $oa.useVault }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: developer-hub-oidc-client
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: developer-hub-oidc-client
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: {{ include "developer-hub.oidcAuthVaultKey" . | quote }}
        property: oidc-client-secret
{{- else }}
---
apiVersion: v1
kind: Secret
metadata:
  name: developer-hub-oidc-client
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: {{ .Values.keycloakOidcClientSecret | default "CHANGEME-set-via-helm-or-sync-secret" | quote }}
{{- end }}
