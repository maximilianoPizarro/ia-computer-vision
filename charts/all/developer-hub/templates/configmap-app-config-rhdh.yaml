apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  app-config.yaml: |
    app:
      title: Developer Hub
      baseUrl: https://developer-hub.{{ include "developer-hub.clusterDomain" . }}
    backend:
      baseUrl: https://developer-hub.{{ include "developer-hub.clusterDomain" . }}
      # Limit per-plugin DB pools — many dynamic plugins exhaust default PostgreSQL max_connections.
      database:
        knexConfig:
          pool:
            min: 0
            max: 4
            idleTimeoutMillis: 10000
            acquireTimeoutMillis: 30000
      auth:
        dangerouslyDisableDefaultAuthPolicy: true
      cors:
        origin: https://developer-hub.{{ include "developer-hub.clusterDomain" . }}
      reading:
        allow:
          - host: "*.redhatworkshops.io"
          - host: "*.github.io"
          - host: raw.githubusercontent.com
          - host: github.com
          - host: {{ include "developer-hub.gitlabHost" . | quote }}
          - host: petstore3.swagger.io
          - host: httpbin.org
          - host: catfact.ninja
          - host: restcountries.com
          - host: jsonplaceholder.typicode.com
{{- if .Values.plugins.mcp.enabled | default false }}
      actions:
        pluginSources:
          - software-catalog-mcp-tool
          - techdocs-mcp-tool
{{- end }}
    enabled:
      kubernetes: true
      argocd: true
{{- if .Values.plugins.ocm.enabled | default false }}
      ocm: true
{{- end }}
      kuadrant: true
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: hub
              url: https://kubernetes.default.svc.cluster.local:443
              authProvider: serviceAccount
              serviceAccountToken: ${K8S_SA_TOKEN}
              skipTLSVerify: true
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
{{- if .Values.kubernetesSpokes.enabled | default false }}
            - name: east
              url: ${EAST_API_URL}
              authProvider: serviceAccount
              serviceAccountToken: ${EAST_SA_TOKEN}
              skipTLSVerify: true
            - name: west
              url: ${WEST_API_URL}
              authProvider: serviceAccount
              serviceAccountToken: ${WEST_SA_TOKEN}
              skipTLSVerify: true
{{- end }}
      customResources:
        - group: route.openshift.io
          apiVersion: v1
          plural: routes
        - group: gateway.networking.k8s.io
          apiVersion: v1
          plural: gateways
        - group: gateway.networking.k8s.io
          apiVersion: v1
          plural: httproutes
        - group: gateway.networking.k8s.io
          apiVersion: v1
          plural: grpcroutes
{{- if .Values.kafka.enabled }}
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkas
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkatopics
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkausers
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkaconnects
{{- end }}
        - group: operators.coreos.com
          apiVersion: v1alpha1
          plural: subscriptions
        - group: argoproj.io
          apiVersion: v1alpha1
          plural: applications
        - group: kuadrant.io
          apiVersion: v1
          plural: authpolicies
        - group: kuadrant.io
          apiVersion: v1
          plural: ratelimitpolicies
        - group: kuadrant.io
          # NOTE: only v1alpha1 is served by this CRD today (v1 exists in the
          # schema but served: false), unlike authpolicies/ratelimitpolicies
          # which are already on v1. Querying v1 here 404s against the API
          # server and shows up as a spurious Topology error.
          apiVersion: v1alpha1
          plural: tokenratelimitpolicies
        - group: devportal.kuadrant.io
          apiVersion: v1alpha1
          plural: apiproducts
        - group: devportal.kuadrant.io
          apiVersion: v1alpha1
          plural: apikeys
        - group: extensions.kuadrant.io
          apiVersion: v1alpha1
          plural: oidcpolicies
{{- if .Values.camel.enabled }}
        - group: camel.apache.org
          apiVersion: v1
          plural: integrations
        - group: camel.apache.org
          apiVersion: v1
          plural: kamelets
        - group: camel.apache.org
          apiVersion: v1
          plural: pipes
{{- end }}
    catalog:
      import:
        entityFilename: catalog-info.yaml
      rules:
        - allow: [Component, System, API, Resource, Location, Template, User, Group, Domain]
      locations:
        - type: file
          target: /opt/app-root/src/catalog-data/users.yaml
          rules:
            - allow: [User, Group]
        - type: file
          target: /opt/app-root/src/catalog-data/software-templates/software-templates.yaml
          rules:
            - allow: [Template, Location]
        - type: file
          target: /opt/app-root/src/catalog-data/neuroface-cv/neuroface-cv-system.yaml
          rules:
            - allow: [System, Component, API]
        - type: file
          target: /opt/app-root/src/catalog-data/neuroface/neuroface-system.yaml
          rules:
            - allow: [System, Component, API, Resource]
        - type: file
          target: /opt/app-root/src/catalog-data/kuadrant-apis/workshop-kuadrant-apis.yaml
          rules:
            - allow: [System, Component, API]
        - type: file
          target: /opt/app-root/src/catalog-data/iam-realms/iam-realms.yaml
          rules:
            - allow: [System, Component, API]
        - type: file
          target: /opt/app-root/src/catalog-data/public-apis/public-apis.yaml
          rules:
            - allow: [System, Component, API]
        - type: file
          target: /opt/app-root/src/catalog-data/rhdh-plugins/rhdh-plugins.yaml
          rules:
            - allow: [System, Resource]
{{- if .Values.partnersPoc.enabled }}
        - type: file
          target: /opt/app-root/src/catalog-data/partners-poc/aura-conecta.yaml
          rules:
            - allow: [System, Component, API, Group, Domain, Template]
        - type: file
          target: /opt/app-root/src/catalog-data/partners-poc/agenda-de-vencimientos.yaml
          rules:
            - allow: [System, Component, API, Group, Domain, Template]
{{- end }}
      providers:
        gitlab:
          default:
            host: gitlab.{{ include "developer-hub.clusterDomain" . }}
            orgEnabled: false
            skipTLSVerify: true
            owner: group:platform-engineering
            schedule:
              frequency: { minutes: 15 }
              timeout: { minutes: 10 }
        keycloakOrg:
          default:
            baseUrl: {{ include "developer-hub.ssoBaseUrl" . }}
            loginRealm: backstage
            clientId: developer-hub-catalog
            clientSecret: ${OIDC_CLIENT_SECRET}
            schedule:
              frequency: { minutes: 30 }
              timeout: { minutes: 3 }
{{- if and (kindIs "bool" .Values.plugins.ocm.enabled) .Values.plugins.ocm.enabled }}
        ocm:
          default:
            name: hub
            kubernetesPluginRef: hub
            url: https://kubernetes.default.svc.cluster.local:443
            skipTLSVerify: true
            owner: group:platform-engineering
            schedule:
              frequency: { minutes: 15 }
              timeout: { minutes: 10 }
{{- end }}
{{- if and (kindIs "bool" .Values.plugins.kiali.enabled) .Values.plugins.kiali.enabled }}
    kiali:
      providers:
        - name: hub
          url: {{ include "developer-hub.kialiEndpoint" . | quote }}
          skipTLSVerify: true
          serviceAccountToken: ${KIALI_SA_TOKEN}
          sessionTime: 60
{{- end }}
    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: default
              url: https://openshift-gitops-server-openshift-gitops.{{ include "developer-hub.clusterDomain" . }}
              token: ${K8S_SA_TOKEN}
{{- if .Values.plugins.quay.enabled | default false }}
    quay:
      baseUrl: https://quay-registry.{{ include "developer-hub.clusterDomain" . }}
      dangerouslyAllowInsecureConnections: true
      skipTLSVerify: true
      uiUrl: https://quay-registry.{{ include "developer-hub.clusterDomain" . }}
      apiUrl: https://quay-registry.{{ include "developer-hub.clusterDomain" . }}
      readOnly: false
      defaultVisibility: public
      allowedRegistries: ['quay-registry.{{ include "developer-hub.clusterDomain" . }}']
      allowedRepositories: ['workshop/*']
      allowedTags: ['latest', 'stable']
{{- end }}
    techdocs:
      builder: local
      publisher:
        type: local
{{- if eq (include "developer-hub.pluginEnabled" (dict "Values" .Values "plugin" "techRadar" "default" false)) "true" }}
    techRadar:
      url: https://raw.githubusercontent.com/backstage/community/master/plugins/tech-radar-common/src/sampleTechRadarResponse.json
{{- end }}
{{- if .Values.plugins.mcp.enabled | default false }}
    mcpActions:
      servers:
        catalog:
          pluginSources:
            - software-catalog-mcp-tool
        techdocs:
          pluginSources:
            - techdocs-mcp-tool
{{- end }}
    permission:
      enabled: {{ .Values.plugins.rbac.enabled | default false }}
      rbac:
        admin:
          users:
            - name: user:default/{{ .Values.plugins.rbac.policyAdminUser | default "platformadmin" }}
        pluginsWithPermission:
          - catalog
          - scaffolder
          - permission
          - kubernetes
          - ocm
          - kiali
          - techdocs
          - notifications
          - argocd
          - kuadrant
          - adoption-insights
{{- if include "developer-hub.lightspeedEnabled" . }}
          - lightspeed
{{- end }}
{{- if .Values.plugins.rbac.enabled | default false }}
        policies-csv-file: /opt/app-root/src/rbac-policy.csv
        policyFileReload: true
{{- end }}
    signInPage: oidc
    proxy:
      endpoints:
        '/rhacs':
          target: https://central.stackrox.svc:443
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            Authorization: Bearer ${RHACS_API_TOKEN}
        '/gitlab':
          target: https://{{ include "developer-hub.gitlabHost" . }}/api/v4
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            PRIVATE-TOKEN: ${GITLAB_TOKEN}
{{- if .Values.plugins.quay.enabled | default false }}
        '/quay':
          target: https://quay-registry.{{ include "developer-hub.clusterDomain" . }}/api/v1
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH']
          changeOrigin: true
{{- end }}
        '/k8s-api':
          target: https://kubernetes.default.svc
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH']
          headers:
            Authorization: Bearer ${K8S_SA_TOKEN}
          changeOrigin: true
        '/keycloak':
          target: {{ include "developer-hub.ssoBaseUrl" . | quote }}
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH']
          # Backstage's proxy only forwards "CORS-safe" headers by default and
          # silently drops Authorization otherwise (it tries to consume it for
          # its own backend auth instead). The OIDC self-service scaffolder
          # template sends a Keycloak-issued bearer token meant for the
          # upstream target on the create/resolve/get-secret steps -- without
          # this, Keycloak's Admin REST API sees no Authorization header at
          # all and returns a real (not Backstage's) 401.
          allowedHeaders: ['Authorization']
          changeOrigin: true
    integrations:
      gitlab:
        - host: {{ include "developer-hub.gitlabHost" . }}
          apiBaseUrl: https://{{ include "developer-hub.gitlabHost" . }}/api/v4
          token: ${GITLAB_TOKEN}
      github:
        - host: github.com
          apiBaseUrl: https://api.github.com
          rawBaseUrl: https://raw.githubusercontent.com
    gitlab:
      default:
        baseUrl: https://{{ include "developer-hub.gitlabHost" . }}
        token: ${GITLAB_TOKEN}
    # -- Azure DevOps integration (uncomment when AZURE_TOKEN and AZURE_ORG are set) --
    # integrations:
    #   azure:
    #     - host: dev.azure.com
    #       credentials:
    #         - personalAccessToken: ${AZURE_TOKEN}
    # azureDevOps:
    #   host: dev.azure.com
    #   organization: ${AZURE_ORG}
