{{- if .Values.oidcClientSecretSync.enabled | default true }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oidc-client-secret-sync
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oidc-client-secret-sync
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - keycloak-admin-user
      - developer-hub-oidc-client
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc-client-secret-sync
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oidc-client-secret-sync
subjects:
  - kind: ServiceAccount
    name: oidc-client-secret-sync
    namespace: {{ include "developer-hub.keycloakNamespace" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-client-secret-sync-script
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
data:
  sync.py: |
    #!/usr/bin/env python3
    """Align Keycloak OIDC client secrets with Vault/ESO (developer-hub-oidc-client)."""
    import base64
    import json
    import os
    import ssl
    import sys
    import urllib.error
    import urllib.parse
    import urllib.request
    from pathlib import Path

    SSO_URL = os.environ["SSO_URL"].rstrip("/")
    REALM = os.environ.get("REALM", "backstage")
    CLIENTS = [c.strip() for c in os.environ.get("CLIENTS", "developer-hub,developer-hub-catalog,devspaces").split(",") if c.strip()]
    NS = os.environ["NAMESPACE"]
    SA_TOKEN_PATH = Path("/var/run/secrets/kubernetes.io/serviceaccount/token")
    SA_CA_PATH = Path("/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")
    API_HOST = os.environ.get("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
    API_PORT = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
    API_BASE = f"https://{API_HOST}:{API_PORT}"

    def api_request(method, path, body=None):
        token = SA_TOKEN_PATH.read_text().strip()
        ctx = ssl.create_default_context(cafile=str(SA_CA_PATH))
        headers = {"Authorization": f"Bearer {token}"}
        data = None
        if body is not None:
            data = json.dumps(body).encode()
            headers["Content-Type"] = "application/json"
        req = urllib.request.Request(f"{API_BASE}{path}", data=data, method=method, headers=headers)
        with urllib.request.urlopen(req, context=ctx, timeout=60) as resp:
            raw = resp.read().decode()
            return json.loads(raw) if raw else {}

    def read_secret(name, key):
        secret = api_request("GET", f"/api/v1/namespaces/{NS}/secrets/{name}")
        value = (secret.get("data") or {}).get(key)
        if not value:
            raise RuntimeError(f"secret {name} missing key {key}")
        return base64.b64decode(value).decode()

    def sso_request(method, path, token, body=None):
        ctx = ssl.create_default_context()
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        headers = {"Authorization": f"Bearer {token}"}
        data = None
        if body is not None:
            data = json.dumps(body).encode()
            headers["Content-Type"] = "application/json"
        req = urllib.request.Request(f"{SSO_URL}{path}", data=data, method=method, headers=headers)
        with urllib.request.urlopen(req, context=ctx, timeout=60) as resp:
            raw = resp.read().decode()
            return json.loads(raw) if raw else {}

    def admin_token():
        user = read_secret("keycloak-admin-user", "username")
        password = read_secret("keycloak-admin-user", "password")
        form = urllib.parse.urlencode(
            {
                "client_id": "admin-cli",
                "username": user,
                "password": password,
                "grant_type": "password",
            }
        ).encode()
        ctx = ssl.create_default_context()
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        req = urllib.request.Request(
            f"{SSO_URL}/realms/master/protocol/openid-connect/token",
            data=form,
            method="POST",
            headers={"Content-Type": "application/x-www-form-urlencoded"},
        )
        with urllib.request.urlopen(req, context=ctx, timeout=60) as resp:
            payload = json.loads(resp.read().decode())
        token = payload.get("access_token")
        if not token:
            raise RuntimeError(f"admin token request failed: {payload}")
        return token

    def update_client(token, client_id, secret):
        clients = sso_request(
            "GET",
            f"/admin/realms/{REALM}/clients?clientId={urllib.parse.quote(client_id)}",
            token,
        )
        if not clients:
            print(f"skip {client_id}: not found in realm {REALM}")
            return
        internal_id = clients[0]["id"]
        current = clients[0].get("secret")
        if current == secret:
            print(f"ok {client_id}: secret already aligned")
            return
        sso_request(
            "PUT",
            f"/admin/realms/{REALM}/clients/{internal_id}",
            token,
            {"secret": secret},
        )
        print(f"updated {client_id}")

    def main():
        oidc_secret = read_secret("developer-hub-oidc-client", "OIDC_CLIENT_SECRET")
        if not oidc_secret or oidc_secret.startswith("CHANGEME"):
            raise RuntimeError("developer-hub-oidc-client secret is not ready")
        token = admin_token()
        for client_id in CLIENTS:
            update_client(token, client_id, oidc_secret)
        print("OIDC client secret sync complete")

    if __name__ == "__main__":
        try:
            main()
        except Exception as exc:
            print(f"ERROR: {exc}", file=sys.stderr)
            sys.exit(1)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: oidc-client-secret-sync
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: oidc-client-secret-sync
      restartPolicy: OnFailure
      containers:
        - name: sync
          image: {{ .Values.oidcClientSecretSync.image | default "registry.redhat.io/ubi9/python-311:latest" | quote }}
          env:
            - name: SSO_URL
              value: {{ include "developer-hub.ssoBaseUrl" . | quote }}
            - name: NAMESPACE
              value: {{ include "developer-hub.keycloakNamespace" . | quote }}
            - name: REALM
              value: backstage
            - name: CLIENTS
              value: developer-hub,developer-hub-catalog,devspaces
          command: ["python3", "/scripts/sync.py"]
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: oidc-client-secret-sync-script
            defaultMode: 0555
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: oidc-client-secret-sync
  namespace: {{ include "developer-hub.keycloakNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: oidc-client-secret-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: {{ .Values.oidcClientSecretSync.image | default "registry.redhat.io/ubi9/python-311:latest" | quote }}
              env:
                - name: SSO_URL
                  value: {{ include "developer-hub.ssoBaseUrl" . | quote }}
                - name: NAMESPACE
                  value: {{ include "developer-hub.keycloakNamespace" . | quote }}
                - name: REALM
                  value: backstage
                - name: CLIENTS
                  value: developer-hub,developer-hub-catalog,devspaces
              command: ["python3", "/scripts/sync.py"]
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: oidc-client-secret-sync-script
                defaultMode: 0555
{{- end }}
