# OpenShift Connectivity Link DevPortal reads APIProduct.status.openapi.raw for the
# "Definition" tab Swagger view. Backstage catalog /definition URLs return HTML (SPA
# shell), so we embed the same OpenAPI fragments used by Developer Hub and patch status
# directly after each developer-hub sync.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer-hub-sync-apiproduct-openapi
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: developer-hub-sync-apiproduct-openapi
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apiproducts"]
    verbs: ["get", "list"]
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apiproducts/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: developer-hub-sync-apiproduct-openapi
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: developer-hub-sync-apiproduct-openapi
subjects:
  - kind: ServiceAccount
    name: developer-hub-sync-apiproduct-openapi
    namespace: developer-hub
---
apiVersion: batch/v1
kind: Job
metadata:
  name: developer-hub-sync-apiproduct-openapi
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: developer-hub-sync-apiproduct-openapi
      containers:
        - name: sync
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
            - |
              python3 <<'PY'
              import json, os, subprocess, tempfile
              from datetime import datetime, timezone

              def oc(*args):
                  return subprocess.check_output(["oc", *args], universal_newlines=True)

              cm = json.loads(
                  oc(
                      "get", "configmap", "developer-hub-apiproduct-openapi-specs",
                      "-n", "developer-hub", "-o", "json",
                  )
              )["data"]
              mapping = json.loads(cm["mapping.yaml"])
              now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              synced = 0
              for ref, filename in mapping.items():
                  ns, name = ref.split("/", 1)
                  raw = cm.get(filename)
                  if not raw:
                      print(f"SKIP {ref}: missing {filename}", flush=True)
                      continue
                  try:
                      subprocess.run(
                          ["oc", "get", "apiproduct", name, "-n", ns],
                          check=True,
                          stdout=subprocess.DEVNULL,
                          stderr=subprocess.DEVNULL,
                      )
                  except subprocess.CalledProcessError:
                      print(f"SKIP {ref}: APIProduct not found", flush=True)
                      continue
                  patch_body = {"status": {"openapi": {"raw": raw, "lastSyncTime": now}}}
                  with tempfile.NamedTemporaryFile(
                      mode="w", encoding="utf-8", suffix=".json", delete=False,
                  ) as patch_file:
                      json.dump(patch_body, patch_file, ensure_ascii=False)
                      patch_path = patch_file.name
                  try:
                      subprocess.run(
                          [
                              "oc", "patch", "apiproduct", name, "-n", ns,
                              "--type=merge", "--subresource=status",
                              "--patch-file", patch_path,
                          ],
                          check=True,
                      )
                  finally:
                      os.unlink(patch_path)
                  print(f"OK {ref}", flush=True)
                  synced += 1
              print(f"Synced OpenAPI to {synced} APIProduct(s)", flush=True)
              PY
