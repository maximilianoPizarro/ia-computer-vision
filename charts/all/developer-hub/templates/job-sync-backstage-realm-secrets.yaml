{{- /*
  PostSync Job: ensures Keycloak backstage realm clients have the correct
  secret from Vault/ESO. KeycloakRealmImport only resolves placeholders on
  first creation — if the Secret didn't exist yet or the realm was already
  imported, the client secret stays as the literal placeholder string.
  This Job idempotently syncs the real secret from the K8s Secret into
  Keycloak via Admin REST API after every ArgoCD sync.

  Prefer the public SSO route (sso.<apps-domain>). The in-cluster
  keycloak-service-serving:8443 endpoint often fails TLS/SNI against the
  Keycloak CR hostname (keycloak.<apps-domain>), returning empty bodies and
  KeyError:0 in get_token — leaving OIDC clients on placeholder secrets.
*/ -}}
{{- $kcNs := include "developer-hub.keycloakNamespace" . -}}
{{- $kcHost := include "developer-hub.ssoBaseUrl" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: developer-hub-sync-backstage-realm-secrets
  namespace: {{ $kcNs }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "6"
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: rhbk-iam-secret-sync
      restartPolicy: Never
      containers:
        - name: sync
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: KC_HOST
              value: {{ $kcHost | quote }}
            - name: KC_NAMESPACE
              value: {{ $kcNs | quote }}
            - name: OIDC_SECRET_NAME
              value: developer-hub-oidc-client
            - name: OIDC_SECRET_KEY
              value: OIDC_CLIENT_SECRET
            - name: CLIENTS
              value: "developer-hub,developer-hub-catalog,devspaces"
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail

              ADMIN_PASS=$(oc get secret keycloak-admin-user -n "$KC_NAMESPACE" \
                -o jsonpath='{.data.password}' | base64 -d)

              get_token() {
                local i body
                for i in $(seq 1 30); do
                  body=$(curl -sk -X POST "$KC_HOST/realms/master/protocol/openid-connect/token" \
                    -d "grant_type=password&client_id=admin-cli&username=admin&password=${ADMIN_PASS}" || true)
                  if echo "$body" | python3 -c "import json,sys; json.load(sys.stdin)['access_token']" >/dev/null 2>&1; then
                    echo "$body" | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])"
                    return 0
                  fi
                  echo "Waiting for Keycloak admin token (attempt $i/30)..." >&2
                  sleep 10
                done
                echo "ERROR: could not get Keycloak admin token from $KC_HOST" >&2
                exit 1
              }

              TOKEN=$(get_token)

              SECRET=$(oc get secret "$OIDC_SECRET_NAME" -n "$KC_NAMESPACE" \
                -o jsonpath="{.data.$OIDC_SECRET_KEY}" 2>/dev/null | base64 -d || true)

              if [ -z "$SECRET" ]; then
                echo "WARN: $OIDC_SECRET_NAME not ready yet — skipping sync"
                exit 0
              fi

              IFS=',' read -ra CLIENT_LIST <<< "$CLIENTS"
              for client_id in "${CLIENT_LIST[@]}"; do
                UUID=$(curl -sk -H "Authorization: Bearer $TOKEN" \
                  "$KC_HOST/admin/realms/backstage/clients?clientId=${client_id}" \
                  | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['id'] if isinstance(d,list) and d else '')")
                if [ -z "$UUID" ]; then
                  echo "SKIP backstage/$client_id (not found)"
                  continue
                fi

                CURRENT=$(curl -sk -H "Authorization: Bearer $TOKEN" \
                  "$KC_HOST/admin/realms/backstage/clients/${UUID}/client-secret" \
                  | python3 -c "import json,sys; print(json.load(sys.stdin).get('value',''))")

                if [ "$CURRENT" = "$SECRET" ]; then
                  echo "OK backstage/$client_id"
                else
                  # Keycloak ignores PUT body {"secret":"..."} alone — merge into the
                  # full ClientRepresentation or the secret never changes (OIDC
                  # unauthorized_client against Vault/ESO).
                  curl -sk -H "Authorization: Bearer $TOKEN" \
                    "$KC_HOST/admin/realms/backstage/clients/${UUID}" \
                    | SECRET="$SECRET" python3 -c 'import json,sys,os; c=json.load(sys.stdin); c["secret"]=os.environ["SECRET"]; json.dump(c, sys.stdout)' \
                    | curl -sk -X PUT -H "Authorization: Bearer $TOKEN" \
                      -H "Content-Type: application/json" \
                      "$KC_HOST/admin/realms/backstage/clients/${UUID}" \
                      --data-binary @- >/dev/null
                  echo "SYNCED backstage/$client_id"
                fi
              done

              echo "developer-hub backstage realm secret sync complete."
