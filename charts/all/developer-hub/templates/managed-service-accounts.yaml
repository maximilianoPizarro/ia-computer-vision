{{- $clusters := list "east" "west" }}
{{- range $cluster := $clusters }}
---
apiVersion: authentication.open-cluster-management.io/v1beta1
kind: ManagedServiceAccount
metadata:
  name: developer-hub
  namespace: {{ $cluster }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  rotation: {}
---
apiVersion: rbac.open-cluster-management.io/v1alpha1
kind: ClusterPermission
metadata:
  name: developer-hub-read
  namespace: {{ $cluster }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterRole:
    rules:
      - apiGroups: ["metrics.k8s.io"]
        resources:
          - pods
          - nodes
        verbs: [get, list]
      - apiGroups: ["", "apps", "batch", "tekton.dev", "route.openshift.io", "networking.k8s.io", "autoscaling", "gateway.networking.k8s.io", "kafka.strimzi.io", "operators.coreos.com", "packages.operators.coreos.com", "argoproj.io", "networking.istio.io", "security.istio.io", "sailoperator.io", "camel.apache.org"]
        resources:
          - pods
          - pods/log
          - services
          - configmaps
          - limitranges
          - resourcequotas
          - serviceaccounts
          - namespaces
          - persistentvolumeclaims
          - replicationcontrollers
          - endpoints
          - events
          - deployments
          - replicasets
          - statefulsets
          - daemonsets
          - jobs
          - cronjobs
          - pipelines
          - pipelineruns
          - taskruns
          - routes
          - ingresses
          - networkpolicies
          - horizontalpodautoscalers
          - gateways
          - httproutes
          - grpcroutes
          - referencegrants
          - kafkas
          - kafkatopics
          - kafkausers
          - kafkaconnects
          - subscriptions
          - clusterserviceversions
          - installplans
          - operatorgroups
          - packagemanifests
          - applications
          - virtualservices
          - destinationrules
          - serviceentries
          - authorizationpolicies
          - peerauthentications
          - istios
          - integrations
          - kamelets
          - pipes
        verbs: [get, list, watch]
      # Kuadrant CRDs are registered cluster-wide (shared RHCL/Kuadrant
      # operator subscription across hub+spokes) even though actual policy
      # instances are hub-only -- the kubernetes-plugin's customResources
      # list (configmap-app-config-rhdh.yaml) queries every configured CRD
      # for every entity's namespace on every cluster regardless, so spoke
      # components like edge-ppe-east/west (namespace neuroface-cv) still
      # need read access here or every Topology/Error-Reporting view for
      # them shows spurious 403s for these types (matches the hub-side
      # clusterrole-backstage-kubernetes-plugin.yaml grants).
      - apiGroups: ["kuadrant.io"]
        resources:
          - authpolicies
          - ratelimitpolicies
          - tokenratelimitpolicies
          - dnspolicies
          - tlspolicies
        verbs: [get, list, watch]
      - apiGroups: ["extensions.kuadrant.io"]
        resources:
          - planpolicies
          - oidcpolicies
        verbs: [get, list, watch]
      - apiGroups: ["devportal.kuadrant.io"]
        resources:
          - apiproducts
          - apikeys
        verbs: [get, list, watch]
  clusterRoleBinding:
    subject:
      kind: ServiceAccount
      name: developer-hub
      namespace: open-cluster-management-agent-addon
{{- end }}
