{{- $templates := list "ai-computer-vision" -}}
{{- $hubBase := include "developer-hub.clusterDomainBase" . -}}
{{- $east := include "developer-hub.spokeDomainEast" . -}}
{{- $west := include "developer-hub.spokeDomainWest" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-catalog-software-template-manifests
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
{{- range $name := $templates }}
  {{ $name }}.yaml: |
{{ $.Files.Get (printf "files/software-templates/%s.yaml" $name)
   | replace "__HUB_CLUSTER_DOMAIN__" $hubBase
   | replace "__EAST_SPOKE_DOMAIN__" $east
   | replace "__WEST_SPOKE_DOMAIN__" $west
   | indent 4 }}
{{- end }}
