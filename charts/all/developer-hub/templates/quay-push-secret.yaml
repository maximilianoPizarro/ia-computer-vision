{{- /*
  Pipeline ServiceAccount for Tekton buildah — pushes to OpenShift internal registry.
  Uses the default pipeline builder SA pattern; no external Quay credentials required.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: pipeline-dockercfg
secrets:
  - name: pipeline-dockercfg
