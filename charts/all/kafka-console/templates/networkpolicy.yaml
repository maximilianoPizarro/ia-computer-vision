apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-console-to-kafka
  namespace: {{ .Values.kafkaNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: {{ .Values.kafkaClusterName }}
      strimzi.io/kind: Kafka
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: kafka-console
      ports:
        - port: 9092
          protocol: TCP
        - port: 9093
          protocol: TCP
