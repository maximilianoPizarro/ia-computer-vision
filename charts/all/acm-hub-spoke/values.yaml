# GitOpsCluster registers ACM spokes (east/west) with the hub Argo CD instance.
# placementNamespace must match charts/all/acm-hub-spoke/templates/placement.yaml metadata.namespace.
gitOpsCluster:
  argoNamespace: vp-gitops
  placementNamespace: openshift-gitops
  placementName: hub-spoke-placement

# Managed clusters for ACM auto-import.
# Leave apiUrl/token empty to use spoke-credentials from Vault (ExternalSecret + sync Job).
# Set apiUrl and token here only for sandbox/demo without Vault.
managedClusters:
  east:
    apiUrl: ""
    domain: ""
    token: ""
  west:
    apiUrl: ""
    domain: ""
    token: ""

# Spoke credential injection modes:
#   vault  — ESO ExternalSecret pulls from Vault (default VP flow)
#   inline — K8s Secret created from spokeCredentials.clusters.* values
#            (pass via Pattern CR extraParameters, no Vault needed)
#   secret — user pre-creates the K8s Secret; chart just reads it
#
# When managedClusters.*.token is set, ALL modes are bypassed and the
# Helm-tokens path renders ManagedCluster + auto-import-secret directly.
spokeCredentials:
  enabled: true
  mode: vault
  secretName: spoke-credentials
  vaultKey: ""
  # mode=inline: set these via Pattern CR extraParameters
  clusters:
    east:
      token: ""
      apiUrl: ""
    west:
      token: ""
      apiUrl: ""
