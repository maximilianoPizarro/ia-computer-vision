{{- if and .Values.spokeCredentials.enabled (eq (include "acm-hub-spoke.useHelmTokens" .) "false") }}
{{- $sc := .Values.spokeCredentials -}}
{{- $store := include "acm-hub-spoke.secretStoreRef" . | fromYaml -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spoke-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: {{ $sc.secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: {{ include "acm-hub-spoke.spokeCredentialsVaultKey" . | quote }}
{{- end }}
