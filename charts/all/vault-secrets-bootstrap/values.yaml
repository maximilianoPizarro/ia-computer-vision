vault:
  namespace: vault
  serviceName: vault
  port: 8200
  # No authRole here: this cluster's Vault has no "kubernetes/" auth mount
  # configured, so the bootstrap job authenticates with the root token
  # from imperative/vaultkeys instead of a Kubernetes-auth login. See
  # templates/job-vault-secrets-bootstrap.yaml.

bootstrap:
  enabled: true
  # ubi9/ubi-minimal has no curl/jq preinstalled and `microdnf install`
  # cannot reliably provide them in this environment (no working repo
  # config without an entitled subscription) -- python-311 already ships
  # curl, and the job's own script uses Python's json module in place of
  # jq. Matches the image already used by spoke-neuroface-cv/hub-interconnect
  # job-model-seed.yaml for the identical Vault-over-HTTPS pattern.
  image: registry.redhat.io/ubi9/python-311:latest
  checkPath: secret/data/hub/rhbk-credentials
  # Must match the userCount override used for rhbk-iam/platform-users/etc
  # (e.g. values-hub-single-node.yaml sets 5) -- keycloak-realm-clients needs
  # one clientSecret per user per realm (cv, maas, neuroface), or rhbk-iam's
  # ExternalSecrets for any user beyond what's seeded here fail with
  # "could not get secret data from provider".
  userCount: 30

rhbkEsoRetry:
  argoNamespace: vp-gitops
  applicationName: rhbk
  keycloakNamespace: keycloak-system
  esoNamespace: external-secrets
  image: registry.redhat.io/openshift4/ose-cli:latest
