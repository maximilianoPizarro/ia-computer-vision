{{- if .Values.bootstrap.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secrets-bootstrap
  namespace: {{ .Values.vault.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-secrets-bootstrap
  namespace: {{ .Values.vault.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-secrets-bootstrap
      containers:
        - name: bootstrap
          # NOTE: this is registry.redhat.io/ubi9/python-311, NOT the
          # ubi9/ubi-minimal image .Values.bootstrap.image still defaults to.
          # ubi-minimal has no curl/jq preinstalled and `microdnf install`
          # silently fails to provide them in this environment (no working
          # repo config without an entitled subscription) -- confirmed live:
          # the previous bash+curl+jq version of this script always hit
          # "jq: command not found" after the swallowed (`|| true`) install
          # failure. python-311 already ships curl (verified: this is the
          # same image spoke-neuroface-cv/hub-interconnect's job-model-seed.yaml
          # uses for the identical Vault-over-HTTPS pattern), and Python's own
          # json module replaces the jq dependency entirely.
          image: {{ .Values.bootstrap.image | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              python3 <<'PY'
              import json
              import os
              import random
              import string
              import subprocess
              import sys
              import time

              # Vault's listener has TLS enabled (self-signed cert) even on the
              # port named "http" in the Service object -- the port name is
              # cosmetic and does not reflect the server's actual tls_disable
              # setting. A plain http:// request gets rejected outright
              # ("Client sent an HTTP request to an HTTPS server"). Every
              # other Vault-bootstrap job in this repo already learned this
              # (spoke-neuroface-cv/hub-interconnect job-model-seed.yaml).
              VAULT_ADDR = "https://{{ .Values.vault.serviceName }}.{{ .Values.vault.namespace }}.svc:{{ .Values.vault.port }}"
              TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
              CHECK_PATH = "{{ .Values.bootstrap.checkPath }}"
              USER_COUNT = int("{{ .Values.bootstrap.userCount | default 30 }}")
              AUTH_ROLE = "{{ .Values.vault.authRole }}"

              def rand(n=24):
                  return "".join(random.choices(string.ascii_letters + string.digits, k=n))

              def curl(*args):
                  return subprocess.run(["curl", "-sk", *args], capture_output=True, text=True, check=False)

              def wait_vault():
                  for i in range(1, 61):
                      r = curl("-f", f"{VAULT_ADDR}/v1/sys/health?standbyok=true")
                      if r.returncode == 0:
                          return
                      print(f"Waiting for Vault... ({i}/60)", flush=True)
                      time.sleep(5)
                  print("Vault not ready", file=sys.stderr)
                  sys.exit(1)

              def vault_login():
                  with open(TOKEN_PATH) as f:
                      sa_token = f.read().strip()
                  r = curl(
                      "-f", "-X", "POST", f"{VAULT_ADDR}/v1/auth/kubernetes/login",
                      "-H", "Content-Type: application/json",
                      "-d", json.dumps({"role": AUTH_ROLE, "jwt": sa_token}),
                  )
                  r.check_returncode()
                  return json.loads(r.stdout)["auth"]["client_token"]

              def secret_exists(token):
                  r = curl("-o", "/dev/null", "-w", "%{http_code}", "-H", f"X-Vault-Token: {token}", f"{VAULT_ADDR}/v1/{CHECK_PATH}")
                  return r.stdout.strip() == "200"

              def kv_put_json(token, path, data):
                  r = curl(
                      "-f", "-X", "POST", f"{VAULT_ADDR}/v1/{path}",
                      "-H", f"X-Vault-Token: {token}",
                      "-H", "Content-Type: application/json",
                      "-d", json.dumps({"data": data}),
                  )
                  r.check_returncode()
                  print(f"Seeded {path}", flush=True)

              wait_vault()
              token = vault_login()
              if secret_exists(token):
                  print(f"Vault already has {CHECK_PATH} -- skipping bootstrap", flush=True)
                  sys.exit(0)

              kv_put_json(token, "secret/data/hub/gitlab-credentials",
                          {"root-password": rand(24), "runner-token": rand(32)})
              kv_put_json(token, "secret/data/hub/rhbk-credentials",
                          {"admin-password": rand(24), "db-password": rand(24)})
              kv_put_json(token, "secret/data/hub/developer-hub-secrets",
                          {"oidc-client-secret": rand(32), "session-secret": rand(32),
                           "gitlab-token": "placeholder-until-gitlab-token-setup"})
              kv_put_json(token, "secret/data/hub/minio-credentials",
                          {"accesskey": rand(16), "secretkey": rand(24)})
              kv_put_json(token, "secret/data/hub/maas-credentials",
                          {"api-key": "placeholder-maas-api-key"})
              kv_put_json(token, "secret/data/hub/workshop-registration",
                          {"adminToken": rand(24)})
              kv_put_json(token, "secret/data/hub/ai-gateway-platform-keys",
                          {"platformApiKey": rand(32)})
              kv_put_json(token, "secret/data/hub/models-as-a-service-db",
                          {"username": "maas", "password": rand(24), "database": "maas"})
              kv_put_json(token, "secret/data/hub/argocd-mcp-tokens",
                          {"hub-token": rand(32), "hub-url": "https://placeholder-hub",
                           "east-token": rand(32), "east-url": "https://placeholder-east",
                           "west-token": rand(32), "west-url": "https://placeholder-west"})
              # rhbk-iam's ExternalSecrets (charts/all/rhbk-iam/templates/
              # externalsecret-realm-clients.yaml) read one Vault secret PER
              # user PER realm at secret/data/hub/keycloak/realms/<realm>/user<N>
              # (NOT a single flat secret/hub/keycloak-realm-clients object --
              # that path in values-secret.yaml.template is stale/unused by
              # the current chart).
              for realm in ("neuroface", "maas", "cv"):
                  for i in range(1, USER_COUNT + 1):
                      kv_put_json(token, f"secret/data/hub/keycloak/realms/{realm}/user{i}",
                                  {"clientSecret": rand(24)})
              kv_put_json(token, "secret/data/hub/keycloak/realms/cv/backstage-provisioner",
                          {"clientSecret": rand(24)})

              print("Vault secret/hub bootstrap complete", flush=True)
              PY
{{- end }}
