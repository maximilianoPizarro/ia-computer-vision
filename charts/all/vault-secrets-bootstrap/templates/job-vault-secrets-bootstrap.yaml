{{- if .Values.bootstrap.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secrets-bootstrap
  namespace: {{ .Values.vault.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-secrets-bootstrap
  namespace: {{ .Values.vault.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-secrets-bootstrap
      containers:
        - name: bootstrap
          image: {{ .Values.bootstrap.image | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              microdnf install -y curl jq >/dev/null 2>&1 || true
              VAULT_ADDR="http://{{ .Values.vault.serviceName }}.{{ .Values.vault.namespace }}.svc:{{ .Values.vault.port }}"
              TOKEN_PATH="/var/run/secrets/kubernetes.io/serviceaccount/token"
              CHECK_PATH="{{ .Values.bootstrap.checkPath }}"
              USER_COUNT="{{ .Values.bootstrap.userCount | default 30 }}"

              rand() { tr -dc 'a-zA-Z0-9' </dev/urandom | head -c "${1:-24}"; }

              wait_vault() {
                for i in $(seq 1 60); do
                  curl -sf "${VAULT_ADDR}/v1/sys/health?standbyok=true" >/dev/null && return 0
                  echo "Waiting for Vault... (${i}/60)"
                  sleep 5
                done
                echo "Vault not ready" >&2
                exit 1
              }

              vault_login() {
                local jwt sa_token resp
                sa_token="$(cat "${TOKEN_PATH}")"
                resp="$(curl -sf -X POST "${VAULT_ADDR}/v1/auth/kubernetes/login" \
                  -H "Content-Type: application/json" \
                  -d "{\"role\":\"{{ .Values.vault.authRole }}\",\"jwt\":\"${sa_token}\"}")"
                echo "${resp}" | jq -r '.auth.client_token'
              }

              secret_exists() {
                local code
                code="$(curl -sk -o /dev/null -w '%{http_code}' \
                  -H "X-Vault-Token: ${VAULT_TOKEN}" \
                  "${VAULT_ADDR}/v1/${CHECK_PATH}")"
                [ "${code}" = "200" ]
              }

              kv_put_json() {
                local path="$1"
                local payload="$2"
                curl -sf -X POST "${VAULT_ADDR}/v1/${path}" \
                  -H "X-Vault-Token: ${VAULT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "${payload}" >/dev/null
                echo "Seeded ${path}"
              }

              wait_vault
              VAULT_TOKEN="$(vault_login)"
              if secret_exists; then
                echo "Vault already has ${CHECK_PATH} — skipping bootstrap"
                exit 0
              fi

              kv_put_json secret/data/hub/gitlab-credentials \
                "{\"data\":{\"root-password\":\"$(rand 24)\",\"runner-token\":\"$(rand 32)\"}}"
              kv_put_json secret/data/hub/rhbk-credentials \
                "{\"data\":{\"admin-password\":\"$(rand 24)\",\"db-password\":\"$(rand 24)\"}}"
              kv_put_json secret/data/hub/developer-hub-secrets \
                "{\"data\":{\"oidc-client-secret\":\"$(rand 32)\",\"session-secret\":\"$(rand 32)\",\"gitlab-token\":\"placeholder-until-gitlab-token-setup\"}}"
              kv_put_json secret/data/hub/minio-credentials \
                "{\"data\":{\"accesskey\":\"$(rand 16)\",\"secretkey\":\"$(rand 24)\"}}"
              kv_put_json secret/data/hub/maas-credentials \
                "{\"data\":{\"api-key\":\"placeholder-maas-api-key\"}}"
              kv_put_json secret/data/hub/workshop-registration \
                "{\"data\":{\"adminToken\":\"$(rand 24)\"}}"
              kv_put_json secret/data/hub/ai-gateway-platform-keys \
                "{\"data\":{\"platformApiKey\":\"$(rand 32)\"}}"
              kv_put_json secret/data/hub/models-as-a-service-db \
                "{\"data\":{\"username\":\"maas\",\"password\":\"$(rand 24)\",\"database\":\"maas\"}}"
              kv_put_json secret/data/hub/argocd-mcp-tokens \
                "{\"data\":{\"hub-token\":\"$(rand 32)\",\"hub-url\":\"https://placeholder-hub\",\"east-token\":\"$(rand 32)\",\"east-url\":\"https://placeholder-east\",\"west-token\":\"$(rand 32)\",\"west-url\":\"https://placeholder-west\"}}"
              realm_clients_json="{"
              first=1
              for realm in neuroface maas cv; do
                for i in $(seq 1 "${USER_COUNT}"); do
                  [ "${first}" -eq 1 ] || realm_clients_json+=","
                  realm_clients_json+="\"${realm}.user${i}.clientSecret\":\"$(rand 24)\""
                  first=0
                done
              done
              realm_clients_json+="}"
              kv_put_json secret/data/hub/keycloak-realm-clients \
                "{\"data\":${realm_clients_json}}"
              kv_put_json secret/data/hub/keycloak/realms/cv/backstage-provisioner \
                "{\"data\":{\"clientSecret\":\"$(rand 24)\"}}"

              echo "Vault secret/hub bootstrap complete"
{{- end }}
