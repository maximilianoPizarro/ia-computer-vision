{{- $uwmNs := "openshift-user-workload-monitoring" }}
{{- $promSa := "prometheus-user-workload" }}
{{- /*
  neuroface-gateway-system only exists on the hub (values-hub.yaml); neuroface
  and neuroface-cv only exist on spokes (values-east.yaml / values-west.yaml).
  These namespace sets are mutually exclusive per cluster role — never concat
  them, or the spoke rendering tries to create a PodMonitor/RoleBinding in a
  namespace ("neuroface-gateway-system") that does not exist on that cluster.
*/}}
{{- $meshNamespaces := list "neuroface-gateway-system" }}
{{- if .Values.clusterSuffix }}
{{- $meshNamespaces = list "neuroface-cv" "neuroface" }}
{{- end }}
{{- $rbacNamespaces := concat (list "istio-system" "ztunnel") $meshNamespaces }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istiod-monitor
  namespace: istio-system
  labels:
    app: istiod
    release: openshift-user-workload-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  selector:
    matchLabels:
      app: istiod
  endpoints:
    - port: http-monitoring
      interval: 15s
      path: /metrics
      scheme: http
---
{{- range $meshNamespaces }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-mesh-metrics
  namespace: {{ . }}
  labels:
    release: openshift-user-workload-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  selector:
    matchExpressions:
      - key: gateway.istio.io/managed
        operator: Exists
  podMetricsEndpoints:
    - port: http-envoy-prom
      interval: 15s
      path: /stats/prometheus
      scheme: http
---
{{- end }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ztunnel-metrics
  namespace: ztunnel
  labels:
    release: openshift-user-workload-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  selector:
    matchLabels:
      app: ztunnel
  podMetricsEndpoints:
    - port: ztunnel-stats
      interval: 15s
      path: /stats/prometheus
      scheme: http
---
{{- range $rbacNamespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-user-workload
  namespace: {{ . }}
  annotations:
    argocd.argoproj.io/sync-wave: "8"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-k8s
subjects:
  - kind: ServiceAccount
    name: {{ $promSa }}
    namespace: {{ $uwmNs }}
---
{{- end }}
